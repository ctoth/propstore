[project]
name = "propstore"
version = "0.1.0"
description = "Propositional knowledge store compiler"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
    "linkml>=1.8",
    "msgspec>=0.19.0",
    "pyyaml>=6.0",
    "rich>=13.7",
    "lark>=1.2.2",
    "sympy>=1.14.0",
    "z3-solver>=4.12",
    "graphviz>=0.20",
    "ast-equiv @ git+https://github.com/ctoth/ast-equiv@9033d045b9c8076a13b3430a364416379312166b",
    "formal-argumentation",
    "bridgman @ git+https://github.com/ctoth/bridgman@35c88af379178d6571f60a6e9450cd61d40d52d1",
    "pint>=0.25.3",
    "dulwich>=1.1.0",
    "gunray",
    "quire",
]

[project.optional-dependencies]
embeddings = [
    "litellm>=1.0",
    "sqlite-vec>=0.1",
]

[project.scripts]
pks = "propstore.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["propstore"]

[tool.pyright]
typeCheckingMode = "basic"
venvPath = "."
venv = ".venv"
strict = [
    "propstore/core/literal_keys.py",
    "propstore/core/labels.py",
    "propstore/core/graph_types.py",
    "propstore/core/results.py",
    "propstore/belief_set/__init__.py",
    "propstore/belief_set/af_revision.py",
    "propstore/belief_set/agm.py",
    "propstore/belief_set/core.py",
    "propstore/belief_set/entrenchment.py",
    "propstore/belief_set/ic_merge.py",
    "propstore/belief_set/iterated.py",
    "propstore/belief_set/language.py",
    "propstore/conflict_detector/models.py",
    "propstore/opinion.py",
    "propstore/aspic_bridge.py",
]

[tool.pytest.ini_options]
# Hypothesis profiles: HYPOTHESIS_PROFILE=overnight for thorough runs (see tests/conftest.py)
timeout = 300
timeout_method = "thread"
markers = [
    "unit: focused unit-level contract tests",
    "property: property-based or metamorphic tests",
    "differential: differential or oracle-comparison tests",
    "e2e: minimally mocked end-to-end workflow tests",
    "migration: temporary migration or cutover protection tests",
    "slow: intentionally slow tests or suites",
]

[tool.uv.sources]
ast-equiv = { path = "../ast-equiv", editable = true }
bridgman = { path = "../bridgman", editable = true }
formal-argumentation = { path = "../argumentation", editable = true }
gunray = { path = "../gunray", editable = true }
quire = { path = "../quire", editable = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=6.0",
    "pytest-xdist>=3.8.0",
    "pytest-timeout>=2.3",
    "hypothesis>=6.0",
    "rope>=1.14.0",
    "libcst>=1.8.6",
    "import-linter>=2.11",
]
