[project]
name = "propstore"
version = "0.1.0"
description = "Propositional knowledge store compiler"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
    "linkml>=1.8",
    "pyyaml>=6.0",
    "jsonschema>=4.0",
    "sympy>=1.14.0",
    "z3-solver>=4.12",
    "graphviz>=0.20",
    "ast-equiv",
    "bridgman",
]

[project.optional-dependencies]
embeddings = [
    "litellm>=1.0",
    "sqlite-vec>=0.1",
]

[project.scripts]
pks = "propstore.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["propstore"]

[tool.pyright]
venvPath = "."
venv = ".venv"

[tool.uv.sources]
ast-equiv = { path = "../ast-equiv" }
bridgman = { git = "https://github.com/ctoth/bridgman" }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "hypothesis>=6.0",
    "rope>=1.14.0",
]
