[project]
name = "propstore"
version = "0.1.0"
description = "Propositional knowledge store compiler"
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "linkml>=1.8",
    "pyyaml>=6.0",
    "jsonschema>=4.0",
    "sympy>=1.14.0",
    "z3-solver>=4.12",
    "graphviz>=0.20",
]

[project.scripts]
pks = "compiler.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["compiler"]

[tool.pyright]
venvPath = "."
venv = ".venv"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "hypothesis>=6.0",
]
