[project]
name = "propstore"
version = "0.1.0"
description = "Propositional knowledge store compiler"
requires-python = ">=3.13"
dependencies = [
    "linkml>=1.8",
    "pyyaml>=6.0",
    "jsonschema>=4.0",
    "sympy>=1.14.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "hypothesis>=6.0",
]
