[project]
name = "propstore"
version = "0.1.0"
description = "Propositional knowledge store compiler"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
    "linkml>=1.8",
    "pyyaml>=6.0",
    "jsonschema>=4.0",
    "sympy>=1.14.0",
    "z3-solver>=4.12",
    "graphviz>=0.20",
    "ast-equiv @ git+https://github.com/ctoth/ast-equiv",
    "bridgman @ git+https://github.com/ctoth/bridgman",
    "pint>=0.25.3",
    "dulwich>=1.1.0",
]

[project.optional-dependencies]
embeddings = [
    "litellm>=1.0",
    "sqlite-vec>=0.1",
]

[project.scripts]
pks = "propstore.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["propstore"]

[tool.pyright]
typeCheckingMode = "basic"
venvPath = "."
venv = ".venv"
strict = [
    "propstore/core/labels.py",
    "propstore/core/graph_types.py",
    "propstore/core/results.py",
    "propstore/conflict_detector/models.py",
    "propstore/dung.py",
    "propstore/opinion.py",
    "propstore/aspic.py",
]

[tool.pytest.ini_options]
timeout = 300
timeout_method = "thread"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-xdist>=3.8.0",
    "pytest-timeout>=2.3",
    "hypothesis>=6.0",
    "rope>=1.14.0",
]
