# Concept Registry Schema
#
# LinkML schema for concept identity, aliasing, and
# parameterization relationships.
#
# Concepts are the true names. Claims bind to concept IDs, not to
# paper-local variable names. The registry grows as papers are read.
#
# Generates: JSON Schema (validation), Python dataclasses (compiler),
# optionally RDF (sidecar query layer).
#
# Design decisions documented inline as comments.

id: https://propstore.local/schema/concept-registry
name: concept_registry
title: Propositional Knowledge Store — Concept Registry
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  propstore: https://propstore.local/schema/
  skos: http://www.w3.org/2004/02/skos/core#
  qudt: http://qudt.org/vocab/unit/
  prov: http://www.w3.org/ns/prov#

imports:
  - linkml:types

default_range: string


# ═══════════════════════════════════════════════════════════════════════
# Enumerations
# ═══════════════════════════════════════════════════════════════════════

enums:

  ConceptStatus:
    description: >
      Lifecycle state. Concepts are born proposed, reviewed to accepted,
      and never deleted — only deprecated with a successor link.
    permissible_values:
      proposed:
        description: >
          Extracted by LLM or noted by human. Not yet reviewed.
          Claims MAY reference proposed concepts. Compiler emits a
          warning, not an error — you need to be able to work before
          everything is reviewed, but the warnings accumulate as debt.
      accepted:
        description: >
          Reviewed and confirmed as a distinct, well-defined concept.
          This is the normal state for concepts in active use.
      deprecated:
        description: >
          Superseded or found to be a duplicate. MUST have replaced_by.
          Claims referencing deprecated concepts get compiler warnings
          with the replacement suggested. Old claims are not rewritten
          automatically — that's a migration step the human initiates.

  # DESIGN DECISION: start with 6 relationship types. Adding types to
  # an enum is safe; removing them isn't. Start narrow, grow when a
  # real concept needs a type that doesn't exist.
  #
  # v0.2 RESERVED (add when a real concept needs them):
  #   exact_match, close_match, has_component, specialization_of,
  #   approximation_of, drives, opposes, modulates, enables

  RelationshipType:
    permissible_values:
      broader:
        description: "Target is a more general concept (SKOS broader)"
      narrower:
        description: "Target is a more specific concept (SKOS narrower)"
      related:
        description: "Associative, non-hierarchical (SKOS related)"
      component_of:
        description: "This concept is a part/component of the target"
      derived_from:
        description: "This concept is computable/derivable from the target"
      contested_definition:
        description: >
          Same term, genuinely different meaning across traditions.
          Both concepts retain first-class status. The edge documents
          the dispute, not a resolution. MUST have a note.

  FormulaExactness:
    description: >
      Whether a parameterization relationship is definitional or empirical.
      This distinction matters because exact relationships can be chained
      by the compiler (algebraic substitution). Approximate ones cannot —
      chaining regressions is statistically invalid.
    permissible_values:
      exact:
        description: "Algebraic identity, holds by definition"
      approximate:
        description: "Empirical regression or simplifying assumption"
      conditional:
        description: >
          Exact under stated conditions, approximate otherwise.
          MUST have conditions field populated.

  UnitConversionType:
    permissible_values:
      multiplicative:
        description: "target = source * multiplier"
      affine:
        description: "target = source * multiplier + offset"


# ═══════════════════════════════════════════════════════════════════════
# Classes
# ═══════════════════════════════════════════════════════════════════════

classes:

  # ── The core entity ──────────────────────────────────────────────────

  Concept:
    description: >
      A true-named quantity, phenomenon, or structural category.
      One YAML file per concept. Filename matches canonical_name.
    tree_root: true
    attributes:

      id:
        description: >
          Stable identifier. Format: domain prefix + sequential integer.
          Examples: speech_0012, narr_0001. The prefix is a short domain
          tag, not a full namespace — keeps IDs readable in YAML.
          MUST be unique across all domains in the store.
          MUST NOT be reused after deprecation.
        range: string
        required: true
        # DESIGN DECISION: prefixed integers over UUIDs or URIs.
        # UUIDs are unreadable in YAML. Full URIs are verbose.
        # Prefixed integers are readable, greppable, and the prefix
        # gives you domain context at a glance. The compiler maintains
        # a simple max-ID counter per domain prefix.

      canonical_name:
        description: >
          The preferred human-readable name. Lowercase, underscored.
          This is the "true name" — the one the system uses when
          talking about this concept. Filename MUST match this.
        range: string
        required: true
        # DESIGN DECISION: canonical_name is the filename stem.
        # concepts/subglottal_pressure.yaml has canonical_name:
        # subglottal_pressure. Redundant but greppable and means
        # you can find a concept file from its name without an index.

      status:
        range: ConceptStatus
        required: true
        # DESIGN DECISION: required, not defaulted. Forces the human
        # or LLM to make an explicit choice. "proposed" is easy to
        # type and honest about the state.

      definition:
        description: >
          One to three sentences. What IS this thing, precisely enough
          to distinguish it from near-neighbors. The definition is the
          concept's identity — two concepts with the same definition
          should be merged.
        range: string
        required: true
        # DESIGN DECISION: required, not optional. A concept without
        # a definition is a label, not a concept. The definition is
        # what the LLM matches against during alignment. Without it,
        # alignment degrades to string matching on aliases.

      definition_source:
        description: >
          Paper directory name where the definition is drawn from.
          Not necessarily the paper that first used the term — the
          paper that best defines it.
        range: string
        recommended: true

      domain:
        description: >
          Short domain tag. Derived from the prefix of the concept ID
          (speech_0012 → speech). Present in the file for readability
          but the compiler treats the ID prefix as authoritative. If
          domain and ID prefix disagree, that's a compiler error.
          NOT a semantic field — don't agonize over whether
          "fundamental frequency" is speech or acoustics or physics.
          It's whatever prefix you assigned. Use broader/narrower edges
          for real taxonomic relationships.
        range: string
        # DESIGN DECISION: domain is derived from ID prefix, not the
        # other way around. It's here for human readability. The ID
        # prefix is the source of truth. This avoids the "what domain
        # is F0" problem — the answer is "whatever you put in the ID"
        # and it doesn't matter because cross-domain links are just
        # relationship edges.

      created_date:
        description: >
          ISO 8601 date when the concept was first added. Set by CLI
          on creation. Git has this too, but having it in the file
          means the compiler can answer "show me all concepts added
          this month" without shelling out to git.
        range: date

      last_modified:
        description: >
          ISO 8601 date of last substantive edit. Updated by CLI.
          "Substantive" means definition, status, or relationship
          changes — not whitespace or note edits.
        range: date

      replaced_by:
        description: >
          Concept ID of the successor. REQUIRED when status=deprecated.
          The compiler uses this to suggest fixes for claims that
          reference deprecated concepts.
        range: string

      aliases:
        description: "All known names for this concept across the literature"
        range: Alias
        multivalued: true
        inlined_as_list: true
        # The alias list is the primary input to the alignment pipeline.
        # When a new paper uses a term, exact match against all aliases
        # is step 1 before embeddings or LLM evaluation.

      kind:
        description: >
          The concept's type signature. What kind of value does this
          concept take? This is the interface the concept presents to
          the CEL expression evaluator and the type-checker.
          
          Quantity: numeric with unit, dimension, range.
          Category: enumerated string values.
          Boolean: true/false.
          Structural: no values — a node type, not a variable.
            Cannot appear in CEL condition expressions.
        range: ConceptKind
        inlined: true
        required: true
        # DESIGN DECISION: kind is required. Every concept must declare
        # what kind of thing it is. This replaces the optional unit
        # field with a mandatory type declaration. "structural" is the
        # escape hatch for concepts that don't take values (like
        # "focalization" as a narrative category — it has sub-types,
        # not values).

      relationships:
        description: "Typed edges to other concepts"
        range: ConceptRelationship
        multivalued: true
        inlined_as_list: true

      parameterization_relationships:
        description: >
          Algebraic/functional relationships to other parameterizations
          of the same phenomenon. This is the novel piece — no existing
          system captures these.
        range: ParameterizationRelationship
        multivalued: true
        inlined_as_list: true

      notes:
        description: >
          Free-text notes. For anything that doesn't fit the schema.
          Not indexed or queried — just human-readable context.
        range: string

    rules:
      - postconditions:
          description: "deprecated concepts must have replaced_by"
          # Enforced by compiler: if status == deprecated and
          # replaced_by is null, emit error.

      - postconditions:
          description: "approximation_of relationships must have a note"
          # Enforced by compiler: if any relationship has type
          # approximation_of and note is null, emit error.


  # ── Supporting classes ───────────────────────────────────────────────

  Alias:
    description: >
      A name used for this concept in a specific paper or tradition.
      Aliases are how the registry absorbs terminological variation
      without losing provenance.
    attributes:

      name:
        description: >
          The name as it appears in the source. Case-preserved.
          Can be a symbol (Ps), an abbreviation (MFDR), or a phrase
          ("maximum flow declination rate").
        range: string
        required: true

      source:
        description: >
          Paper directory name where this alias is used.
          If the alias is widespread with no single origin, use
          "common" or "multiple".
        range: string
        required: true

      note:
        description: >
          Clarification when the alias doesn't mean exactly the same
          thing. "approximate; includes tracheal losses" for
          lung_pressure as an alias of subglottal_pressure.
        range: string

      # DESIGN DECISION: no "primary" flag on aliases. The
      # canonical_name IS the primary. Aliases are all equal —
      # they're just names other people used. Ordering in the
      # YAML list implies nothing.


  ConceptKind:
    description: >
      The concept's type signature — what kind of value it takes.
      This is the interface the concept presents to CEL condition
      expressions and to the compiler's type checker.
      
      Exactly one of the variant fields (quantity, category, boolean,
      structural) must be populated. The compiler enforces this.
    attributes:

      quantity:
        description: >
          Numeric values with physical or dimensionless units.
          The concept can appear in CEL arithmetic expressions.
        range: QuantityKind
        inlined: true

      category:
        description: >
          Enumerated string values. The concept can appear in CEL
          equality expressions and the value set is type-checked.
        range: CategoryKind
        inlined: true

      boolean:
        description: >
          True/false. The concept can appear in CEL as a bare
          variable (truthy) or in equality checks.
        range: BooleanKind
        inlined: true

      structural:
        description: >
          No values — this concept is a node type, not a variable.
          It has sub-types and relationships but cannot appear in
          CEL condition expressions. Examples: focalization,
          narrative voice, coarticulation.
        range: StructuralKind
        inlined: true

    # DESIGN DECISION: tagged union via optional fields rather than
    # inheritance. LinkML supports both; optional fields are simpler
    # in YAML (no discriminator syntax) and the compiler validates
    # exactly-one-populated.


  QuantityKind:
    description: "Type signature for numeric concepts"
    attributes:

      unit:
        description: >
          Human-readable unit label. Always populated.
          Examples: "Pa", "Hz", "%", "dimensionless".
        range: string
        required: true

      qudt_uri:
        description: >
          QUDT unit URI. Examples: qudt:PA, qudt:HZ, qudt:SEC.
          Leave empty for dimensionless quantities or domain-specific
          units not in QUDT.
        range: uri

      dimension:
        description: >
          Physical dimension string. Examples: "pressure", "frequency",
          "dimensionless ratio", "time". Informal — not a formal
          dimensional analysis tag. Human readability and basic sanity.
        range: string

      range:
        description: >
          Plausible value bounds [min, max]. Not hard constraints —
          values outside range trigger compiler warnings, not errors.
          Useful for catch "is this value in the right ballpark" checks.
        range: float
        multivalued: true  # exactly 2 elements: [min, max]

      common_alternatives:
        description: "Other units this quantity is commonly expressed in"
        range: UnitConversion
        multivalued: true
        inlined_as_list: true


  CategoryKind:
    description: "Type signature for enumerated/categorical concepts"
    attributes:

      values:
        description: >
          The valid value set. CEL expressions that compare this concept
          against a string not in this set trigger compiler warnings.
          The set grows as new papers introduce new values — additions
          are safe, removals are not.
        range: string
        multivalued: true
        required: true

      extensible:
        description: >
          If true, the compiler warns on unrecognized values but does
          not error. If false, unrecognized values are errors.
          Default true — most categorical concepts discover new values
          as papers are processed.
        range: boolean


  BooleanKind:
    description: >
      Type signature for boolean concepts. Exists as a class rather
      than a bare flag so that all kinds have the same shape.
    attributes:

      default:
        description: >
          Default value when not specified in conditions. Optional.
          Example: phonation_present defaults to true for vowels.
        range: boolean


  StructuralKind:
    description: >
      Type signature for concepts that are node types, not variables.
      They have sub-types and relationships but no values. They cannot
      appear in CEL condition expressions — the compiler errors if they
      do. Examples: focalization, narrative_voice, coarticulation_model.
    attributes:

      note:
        description: >
          Why this concept is structural rather than valued. Optional
          but useful for documentation.
        range: string


  UnitConversion:
    description: >
      A conversion from an alternative unit to the concept's primary unit.
      Covers multiplicative and affine (temperature-style, dB-reference)
      conversions. Does NOT cover parameterization relationships — those
      are a separate, richer structure.
    attributes:

      unit:
        description: "The alternative unit label"
        range: string
        required: true

      type:
        range: UnitConversionType
        required: true

      multiplier:
        range: float
        required: true

      offset:
        description: "Only for affine conversions"
        range: float


  # No Condition class. Conditions are CEL expressions.
  # See ConceptRelationship.conditions and ParameterizationRelationship.conditions.


  ConceptRelationship:
    description: >
      A typed, sourced edge to another concept. Direction is always
      "this concept [type] target concept."
    attributes:

      type:
        range: RelationshipType
        required: true

      target:
        description: "Concept ID of the related concept"
        range: string
        required: true

      source:
        description: >
          Paper that establishes this relationship. Use "definitional"
          for relationships that follow from the concepts' definitions
          rather than from a specific paper's finding.
        range: string

      note:
        description: >
          Free text. REQUIRED for contested_definition type.
          Optional for others.
        range: string

      conditions:
        description: >
          CEL expressions defining when this relationship holds.
          Empty list means unconditional. Each expression evaluates
          against a context object built from the concept store.
          All conditions must be true simultaneously (implicit AND).
          
          Examples:
            - "population == 'adult_male'"
            - "F1 / F0 > 3.0"
            - "speaking_rate > 3.0 && task == 'singing'"
            - "framework == 'genette'"
            - "methodology == 'inverse_filtering'"
          
          Concept names in expressions reference canonical_names from
          the registry. The compiler validates that referenced names
          exist. CEL evaluation uses cel2js at compile time and native
          CEL at query time.
        range: string
        multivalued: true
        # DESIGN DECISION: CEL over structured Condition types.
        # Qlatt already uses CEL in its YAML rule system. cel2js
        # already exists. CEL uniformly handles categorical checks,
        # numeric ranges, AND ratio conditions (F1/F0 > 3) that a
        # structured type couldn't express without special-casing.
        # The φ-node discriminator is just an expression evaluation.

      # DESIGN DECISION: no strength/confidence score on relationships.
      # The claim store handles evidentiary weight. The concept registry
      # captures structural relationships between concepts, not how
      # much evidence supports them. "Ps drives voicing_amplitude" is
      # a structural fact about the domain — it's not probabilistic.
      # How MUCH Ps drives it, under what conditions — those are claims.


  ParameterizationRelationship:
    description: >
      An algebraic or functional relationship between different
      parameterizations of the same underlying phenomenon. This is the
      novel contribution — no existing system captures these.
      
      The compiler can chain exact relationships by algebraic
      substitution. Approximate relationships cannot be chained
      (statistically invalid). Conditional relationships can be
      chained only within their stated conditions.
    attributes:

      formula:
        description: >
          Human-readable formula string.
          Example: "gobl_ra = fant_Ra / T0"
        range: string
        required: true

      sympy:
        description: >
          SymPy-parseable expression for mechanical verification.
          Example: "Eq(gobl_ra, fant_Ra / T0)"
          Optional in proposed status, required for accepted concepts
          that have parameterization relationships.
        range: string
        recommended: true
        # DESIGN DECISION: SymPy over MathML. SymPy is Python-native,
        # the compiler is Python, and SymPy can actually do algebraic
        # simplification and substitution. MathML is a serialization
        # format, not a CAS. CellML uses MathML because it targets
        # simulation engines; we target a Python compiler.

      inputs:
        description: >
          Concept IDs of all quantities appearing in the formula.
          The compiler uses these to build the dependency graph and
          to check that all referenced concepts exist in the registry.
        range: string
        multivalued: true
        required: true

      exactness:
        range: FormulaExactness
        required: true

      conditions:
        description: >
          CEL expressions defining when this relationship holds.
          Required for conditional exactness. Same format as
          ConceptRelationship conditions.
        range: string
        multivalued: true

      source:
        description: "Paper establishing this relationship"
        range: string
        required: true

      bidirectional:
        description: >
          Whether the formula can be solved in both directions.
          Algebraic identities are usually bidirectional.
          Regression-derived relationships are usually not.
        range: boolean
        required: true

      fit_statistics:
        description: >
          For approximate relationships: r, r², RMSE, etc.
          Free-form because statistical metadata varies wildly.
          Only meaningful when exactness is 'approximate'.
        range: string

      note:
        range: string


# ═══════════════════════════════════════════════════════════════════════
# Compiler Contract
# ═══════════════════════════════════════════════════════════════════════
#
# The schema above defines what a valid concept file looks like.
# The compiler's obligations are specified here as prose because
# LinkML rules can't fully express them.
#
# FUNDAMENTAL INVARIANT:
#   The compiler NEVER produces output from an invalid state.
#   If any concept file, relationship, parameterization formula,
#   or CEL expression fails validation, the entire compilation
#   fails. No partial sidecar. No "compiled what we could."
#   The store is consistent or it doesn't exist.
#
#   This is not a convenience — it's a safety property. The claim
#   store's φ-node resolution depends on conditions being well-typed.
#   The parameterization checker depends on all inputs being quantity
#   kind. The explain system depends on all provenance links resolving.
#   A partially valid store is worse than no store because it gives
#   wrong answers silently.
#
# VALIDATION (compile-time errors — hard stop, no output produced):
#
#   ── Schema integrity ──
#   - id is unique across all concept files in the store
#   - id prefix matches domain field (if domain is present)
#   - canonical_name matches the filename stem
#   - exactly one kind variant populated per concept (tagged union)
#   - kind is present (required field)
#   - deprecated concepts have non-null replaced_by
#   - replaced_by target exists and is not itself deprecated
#   - no circular deprecation chains (A replaced_by B replaced_by A)
#   - relationship targets exist in the registry
#   - parameterization_relationship inputs all exist in the registry
#   - parameterization_relationship inputs are all quantity kind
#     (you can't put a category or structural concept in an equation)
#   - contested_definition relationships have notes
#   - conditional exactness on parameterization_relationships: conditions non-empty
#
#   ── CEL type checking (the core invariant) ──
#
#   Every CEL condition expression is parsed, resolved, and type-checked
#   against the concept registry. The registry IS the type environment.
#   No expression that references an undefined name or performs an
#   invalid operation passes compilation.
#
#   Resolution:
#   - Every bare name in a CEL expression must resolve to a concept's
#     canonical_name in the registry. No magic variables. No implicit
#     context. If it's in an expression, it's a concept.
#   - If a name doesn't resolve → HARD ERROR, concept not found
#
#   Kind-based type rules:
#
#   quantity concepts:
#     - MAY appear in arithmetic: +, -, *, /
#     - MAY appear in comparisons: ==, !=, <, >, <=, >=
#     - MAY appear in compound expressions: F1 / F0 > 3.0
#     - comparison against non-numeric literal → ERROR
#     - the compiler does NOT do dimensional analysis on arithmetic
#       (that's physgen's job; here we just check numeric vs non-numeric)
#
#   category concepts:
#     - MAY appear in equality: ==, !=
#     - MAY appear in 'in' expressions: task in ['speech', 'singing']
#     - MUST NOT appear in arithmetic: +, -, *, / → ERROR
#     - MUST NOT appear in ordering: <, >, <=, >= → ERROR
#     - string literal compared against value set:
#       - if value not in set AND extensible == false → ERROR
#       - if value not in set AND extensible == true → WARNING
#       - if value not in set AND extensible not set → WARNING (default extensible)
#
#   boolean concepts:
#     - MAY appear as bare truthy: "phonation_present"
#     - MAY appear in equality: phonation_present == true
#     - MUST NOT appear in arithmetic → ERROR
#     - MUST NOT appear in ordering comparisons → ERROR
#     - comparison against non-boolean literal → ERROR
#
#   structural concepts:
#     - MUST NOT appear in ANY CEL expression → ERROR
#     - "focalization > 3" → ERROR: structural concept in expression
#     - "focalization == 'internal'" → ERROR: structural concept in expression
#     - structural concepts exist for relationships and taxonomy only
#
#   Literals:
#     - numeric literals are valid with quantity concepts
#     - string literals are valid with category concepts
#     - boolean literals are valid with boolean concepts
#     - type mismatch (string literal with quantity concept) → ERROR
#
#   Operators:
#     - && and || combine sub-expressions; each sub-expression is
#       independently type-checked
#     - ! (negation) is valid on boolean sub-expressions
#     - ternary (? :) is valid; both branches must type-check
#
#   The compiler MUST reject any expression that fails type checking.
#   There is no "warn and continue" for type errors. A malformed
#   condition expression means the φ-node discriminator is broken,
#   which means contradictions can't be resolved, which means the
#   entire claim store's integrity is compromised.
#
# VALIDATION (compile-time warnings — output produced, issues reported):
#   - proposed concepts referenced by accepted claims
#   - concepts with zero claims referencing them (orphans)
#   - aliases that match another concept's canonical_name (collision risk)
#   - parameterization_relationships without sympy expressions
#   - concepts without created_date (CLI should always set this)
#   - category value not in value set but extensible == true
#
# RENAME (via CLI only):
#   Renaming a concept's canonical_name is a three-step atomic operation:
#     1. Update canonical_name field in the YAML
#     2. Rename the file to match (git mv for history preservation)
#     3. The ID does NOT change — this is the whole point of having IDs
#   Claims and relationships reference concepts by ID, never by
#   canonical_name, so renames don't cascade. The only thing that breaks
#   is a human who was navigating by filename and expects the old name.
#   The CLI should print the old→new mapping for the commit message.
#   Hand-editing renames is not supported — too easy to forget the
#   file rename and end up with filename/canonical_name mismatch
#   (which the compiler would catch, but prevention beats detection).
#
# INDEXING (what the compiler produces for the sidecar):
#   - concept table: id, canonical_name, status, domain, definition,
#     created_date, last_modified, kind_type (quantity|category|boolean|structural)
#   - alias table: concept_id, alias_name, source (for reverse lookup)
#   - relationship table: source_id, type, target_id, conditions_cel (JSON array)
#   - parameterization table: concept_ids[], formula, sympy, exactness,
#     conditions_cel (JSON array)
#   - derived_parameterization table: same schema, populated by chaining
#     exact relationships via SymPy (compiled output, not source)
#   - conflicts table: concept_id, claim_a_id, claim_b_id, warning_class
#     (CONFLICT|OVERLAP|PARAM_CONFLICT), conditions_a (JSON), conditions_b (JSON),
#     value_a, value_b, derivation_chain (for PARAM_CONFLICT, null otherwise)
#   - FTS5 index over: canonical_name, aliases, definition, condition strings
#   - embedding vectors over: definition text (for alignment pipeline)
#
# CEL EVALUATION:
#   The concept registry IS the CEL type environment. There are no
#   implicit variables, no ambient context, no magic names. Every
#   name in an expression resolves to a concept. Every concept's kind
#   determines what operations are legal on it.
#
#   At compile time: parse, resolve, type-check. Reject on any error.
#   At query time: evaluate against a concrete context to filter
#   claims/relationships by scope.
#
#   The context object maps concept canonical_names to values:
#     { "fundamental_frequency": 220.0,
#       "task": "singing",
#       "population": "adult_male",
#       "phonation_present": true }
#
#   Evaluation: each CEL condition expression evaluates to boolean.
#   A claim/relationship is in scope when ALL its conditions evaluate
#   true (implicit AND across the list).
#
#   cel2js for client-side evaluation. Native CEL for Python/Go.
#   Both use the same concept registry for type resolution.
#
# CONFLICT DETECTION:
#   When a new claim enters the store, the compiler checks it against
#   all existing claims that bind to the same concept. Conflicts are
#   DATA, not errors. The store is always valid even with conflicts
#   in it. Suppressing conflicts would hide the most valuable signal
#   the system produces.
#
#   The compiler classifies every same-concept claim pair into one of
#   four states:
#
#   1. COMPATIBLE — values are consistent (within tolerance or
#      non-overlapping ranges that don't conflict). No action needed.
#
#   2. φ-NODE (different scope) — values differ but conditions differ.
#      "ra = 2-3% when population == 'adult'" and
#      "ra = 5-10% when population == 'child'" are not in conflict.
#      The compiler records this as a conditional fork. Both claims
#      coexist. This is the common case — most apparent contradictions
#      in the literature are really different scopes.
#
#      Detection: the compiler compares CEL condition lists between
#      the two claims. If ANY condition expression differs between
#      the claims → φ-node. The compiler does NOT evaluate whether
#      the conditions are mutually exclusive — that would require
#      a constraint solver. It simply observes that the scopes are
#      different.
#
#   3. CONFLICT (same scope) — values differ and conditions are
#      identical (same CEL expression lists, or both unconditional).
#      Same concept, same scope, different values. This is a real
#      disagreement.
#
#      The compiler:
#      - records a conflicts_with edge between the two claims
#      - emits a WARNING (not error — the store is still valid)
#      - adds both claims to the conflicts report
#      - does NOT resolve the conflict (that's the human's job or
#        the reconcile pass's job)
#
#      Resolution options (all human-initiated):
#      - one claim gets a superseded_by stance → conflict resolved
#      - conditions are refined on one or both claims to differentiate
#        scope → downgrades to φ-node
#      - one claim is retracted (source paper had an error) → removed
#      - both claims stand as a genuine open dispute → conflict remains,
#        and that's fine — it's a fact about the field
#
#   4. OVERLAP (partially overlapping scope) — values differ and
#      conditions overlap but aren't identical.
#      "ra = 2-5% when population == 'adult'" and
#      "ra = 8-10% when task == 'singing'".
#      An adult singer falls in both scopes and gets contradictory values.
#
#      The compiler:
#      - records an overlapping_conflict edge between the two claims
#      - emits a WARNING with a different warning class than same-scope
#        conflicts (OVERLAP vs CONFLICT)
#      - adds both to the conflicts report with the overlapping
#        conditions highlighted
#
#      This is the most valuable diagnostic the system produces.
#      Overlapping conditions often mean the claim extraction missed
#      a narrowing condition, or the original paper's scope was
#      ambiguous. The human adds the missing condition and the
#      overlap resolves to a φ-node.
#
#   Conflict detection is transitive within concepts: if claim A
#   conflicts with claim B and claim B conflicts with claim C,
#   all three appear in the conflicts report for that concept.
#
#   Conflict detection across parameterization relationships:
#   If claim A says "ra = 5%" and claim B says "ta = 0.001s" and
#   claim C says "T0 = 0.01s", and the parameterization chain says
#   "ra = ta / T0", then the compiler can DERIVE that claims B+C
#   imply ra = 10%, which conflicts with claim A. This is a
#   compile-time diagnostic. The derived value is reported in the
#   conflicts report alongside the chain that produced it.
#
#   This cross-parameterization conflict check requires:
#   - all involved concepts are quantity kind (enforced by
#     parameterization type checking)
#   - all parameterization relationships in the chain are exact
#     (approximate relationships are not evaluated for conflict)
#   - SymPy can solve the substitution (the compiler reports a
#     warning if SymPy can't simplify, does not error)
#
#   WARNING CLASSES (all conflicts are warnings, never errors):
#     CONFLICT      — same concept, same scope, different values
#     OVERLAP       — same concept, overlapping scope, different values
#     PARAM_CONFLICT — conflict detected via parameterization chain
#
#   The conflicts report is a compiled artifact in the sidecar:
#   - concept_id, claim_a_id, claim_b_id, warning_class,
#     conditions_a (CEL[]), conditions_b (CEL[]),
#     value_a, value_b, chain (for PARAM_CONFLICT)
#   - queryable: "show me all conflicts" / "show me all conflicts
#     for concept X" / "show me all OVERLAP warnings"
#
# PARAMETERIZATION CHAINING:
#   The compiler builds a directed graph of parameterization relationships.
#
#   Type invariant: ALL inputs to a parameterization relationship must be
#   quantity kind. This is checked at compile time (see validation errors).
#   You cannot have an equation relating a category to a quantity.
#
#   SymPy validation: the compiler parses each sympy expression, verifies
#   it's well-formed, and checks that every symbol in the expression maps
#   to a concept ID in the inputs list. Missing symbol → ERROR. Symbol
#   not in inputs list → ERROR. Input ID not in registry → ERROR.
#
#   Chaining rules:
#   - exact + bidirectional: compiler MAY derive transitive relationships
#     via SymPy algebraic substitution
#   - exact + unidirectional: compiler MAY chain in the defined direction only
#   - approximate: compiler MUST NOT chain (statistically invalid)
#   - conditional: compiler MAY chain only when conditions are identical
#     (string equality on CEL expressions, not semantic equivalence)
#
#   Example: if ra = ta/T0 (exact) and ta = 1/(2π·Fa) (exact), the
#   compiler can derive ra = 1/(2π·Fa·T0) without anyone stating it.
#
#   Derived relationships are stored in the sidecar index, not written
#   back to YAML source files. They're compiled output, not source.
#
# LIFECYCLE:
#   proposed → accepted: human changes status field, commits
#   accepted → deprecated: human changes status, adds replaced_by, commits
#   deprecated → accepted: NOT ALLOWED — compiler rejects this transition
#   proposed → deprecated: ALLOWED (bad extraction, never should have existed)
#
#   The compiler validates lifecycle transitions. If a concept's status
#   changes between git commits, the compiler checks the transition is
#   legal. Illegal transitions are HARD ERRORS.
#
#   The compiler does NOT auto-transition states. All transitions are
#   human-initiated via file edits or CLI commands.
#
# IDENTITY RULES:
#   When does an alias become a separate concept?
#
#   Decision procedure:
#   1. Same definition, same units, same or trivially convertible values
#      → alias on existing concept
#   2. Same term, different definition → contested_definition edge,
#      two separate concepts (e.g., Genette focalization vs Bal focalization)
#   3. Same phenomenon, different normalization/parameterization
#      → alias on existing concept + parameterization_relationship
#      (e.g., Gobl ra vs Fant Ra: same concept, different scale)
#   4. Related but distinct measurement → separate concept with
#      'related' edge + note explaining the approximation. When
#      approximation_of is added in v0.2, migrate these edges.
#   5. Genuinely different quantity that happens to share a symbol
#      → separate concept, no relationship edge
#
#   The LLM proposes; the human decides. Borderline cases are the
#   whole point of the "proposed" state.
#
# NAMESPACE:
#   IDs use domain prefix + underscore + zero-padded integer.
#   Counter file per domain: concepts/.counters/speech.next = 87
#   New concept in speech domain gets speech_0087, counter increments.
#   Prefix is 2-8 lowercase chars matching the domain field.
#   Cross-domain concepts pick origin domain. exact_match edges
#   create the cross-links.
#
# FILE LAYOUT:
#   concepts/
#     .counters/
#       speech.next          # just an integer: 87
#       narr.next            # just an integer: 4
#     subglottal_pressure.yaml
#     fundamental_frequency.yaml
#     focalization.yaml
#     ...
#
#   One file per concept. Filename = canonical_name + .yaml.
#   Counter files are the only non-YAML files in the directory.
#   The compiler validates filename matches canonical_name on every run.
