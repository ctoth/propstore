source:
  paper: Prakken_2012_AppreciationJohnPollock'sWork
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: Prakken_2012_AppreciationJohnPollock'sWork:claim1
  type: observation
  statement: 'Pollock distinguishes two types of defeat: rebutting defeat (an argument
    for the negation of a conclusion) and undercutting defeat (an argument that the
    connection between premises and conclusion does not hold).

    '
  concepts:
  - rebutting_defeater
  - undercutting_defeater
  - defeasible_reasoning
- id: Prakken_2012_AppreciationJohnPollock'sWork:claim2
  type: observation
  statement: 'Pollock''s arguments are structured as inference graphs rather than
    trees, where nodes represent propositions supported by inference steps and subarguments
    can be shared across multiple arguments.

    '
  concepts:
  - inference_graph
  - defeasible_reasoning
- id: Prakken_2012_AppreciationJohnPollock'sWork:claim3
  type: observation
  statement: 'A partial defeat status assignment maps a subset of nodes in an inference
    graph to in (undefeated) or out (defeated), where a node is in if all its defeaters
    are out, and a node is out if it has a defeater that is in.

    '
  concepts:
  - defeat_status
  - inference_graph
- id: Prakken_2012_AppreciationJohnPollock'sWork:claim4
  type: observation
  statement: 'Self-defeating arguments (both parallel and serial forms) must not be
    able to defeat non-self-defeating arguments; Pollock''s semantics handles this
    by preventing self-defeating arguments from being ultimately undefeated.

    '
  concepts:
  - self_defeating_argument
  - defeat_status
- id: Prakken_2012_AppreciationJohnPollock'sWork:claim5
  type: observation
  statement: 'In even defeat cycles, where two arguments defeat each other symmetrically,
    neither argument should be ultimately undefeated and both should be assigned undecided
    status.

    '
  concepts:
  - defeat_status
  - argumentation_framework
- id: Prakken_2012_AppreciationJohnPollock'sWork:claim6
  type: observation
  statement: 'Pollock''s defeasible inference rules (perception, memory, induction,
    statistical syllogism, temporal persistence) are domain-specific epistemic rules
    that serve as precursors to modern argumentation schemes.

    '
  concepts:
  - defeasible_reasoning
  - argumentation_scheme
- id: Prakken_2012_AppreciationJohnPollock'sWork:claim7
  type: observation
  statement: 'Argument strength in Pollock''s system propagates such that the degree
    of justification of a conclusion cannot exceed the minimum strength of its supporting
    inference lines.

    '
  concepts:
  - argument_strength
  - defeasible_reasoning
- id: Prakken_2012_AppreciationJohnPollock'sWork:claim8
  type: observation
  statement: 'Pollock never clearly separated attack from defeat; in modern structured
    argumentation (ASPIC+), attack is the abstract relation while defeat is the result
    of applying preferences to resolve attacks.

    '
  concepts:
  - attack_relation
  - aspic_plus
  - defeasible_reasoning
- id: Prakken_2012_AppreciationJohnPollock'sWork:claim9
  type: observation
  statement: 'Pollock''s system is better understood as a structured argumentation
    framework generating Dung-style abstract argumentation frameworks than as a non-monotonic
    logic, since it constructs arguments from rules and evaluates them via defeat
    relations.

    '
  concepts:
  - argumentation_framework
  - defeasible_reasoning
  - aspic_plus
- id: Prakken_2012_AppreciationJohnPollock'sWork:claim10
  type: observation
  statement: 'Argumentation schemes are stereotypical non-deductive patterns of reasoning
    with associated critical questions; they connect to Pollock''s defeasible inference
    rules by providing the same rebutting and undercutting defeat distinctions in
    a more general framework.

    '
  concepts:
  - argumentation_scheme
  - rebutting_defeater
  - undercutting_defeater
