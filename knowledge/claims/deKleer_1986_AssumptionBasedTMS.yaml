source:
  paper: deKleer_1986_AssumptionBasedTMS
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: deKleer_1986_AssumptionBasedTMS:claim1
  type: observation
  statement: 'The Assumption-based Truth Maintenance System (ATMS) labels every datum
    with the sets of assumptions under which it holds, enabling simultaneous exploration
    of multiple problem-solving contexts without backtracking or retraction.

    '
  concepts:
  - assumption_based_tms
  - label
  - environment
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 127
    section: Abstract
- id: deKleer_1986_AssumptionBasedTMS:claim2
  type: observation
  statement: 'Conventional justification-based TMSs maintain a single consistent database
    state, suffering from seven limitations: single-state problem, overzealous contradiction
    avoidance, difficult state switching, dominance of justifications, cumbersome
    machinery, unouting, and circular support.

    '
  concepts:
  - truth_maintenance_system
  - assumption_based_tms
  - context_switching
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 138
    section: Limitations of conventional TMSs
- id: deKleer_1986_AssumptionBasedTMS:claim3
  type: observation
  statement: 'An ATMS label satisfies four properties: consistency (no inconsistent
    environments appear), soundness (every label environment entails the node), completeness
    (every derivable consistent environment is covered), and minimality (no environment
    is a superset of another in the same label).

    '
  concepts:
  - label_consistency
  - label_soundness
  - label_completeness
  - label_minimality
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 144
    section: Labels
- id: deKleer_1986_AssumptionBasedTMS:claim4
  type: observation
  statement: 'An environment is a set of assumptions that defines a possible problem-solving
    context. Environments form a lattice under subset relationships, where the empty
    environment represents universal truth and larger environments represent more
    specific contexts.

    '
  concepts:
  - environment
  - assumption
  - context
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 143
    section: ATMS fundamentals
- id: deKleer_1986_AssumptionBasedTMS:claim5
  type: observation
  statement: 'A nogood is an environment that has been determined to be inconsistent.
    Once an environment is identified as nogood, all its supersets are also inconsistent.
    Only minimal nogoods need be stored.

    '
  concepts:
  - nogood
  - environment
  - assumption_based_tms
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 148
    section: Nogoods
- id: deKleer_1986_AssumptionBasedTMS:claim6
  type: observation
  statement: 'The ATMS has three primitive operations: create a node, create an assumption,
    and add a justification. Results are insensitive to the order of assumption and
    justification introduction.

    '
  concepts:
  - assumption_based_tms
  - justification
  - assumption
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 150
    section: Basic ATMS operations
- id: deKleer_1986_AssumptionBasedTMS:claim7
  type: observation
  statement: 'Label updates are computed by taking the cross-product of antecedent
    labels (union of one environment from each antecedent), removing inconsistent
    environments and subsumed environments, then propagating changes to consequent
    nodes.

    '
  concepts:
  - label
  - environment
  - justification
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 151
    section: Label update
- id: deKleer_1986_AssumptionBasedTMS:claim8
  type: observation
  statement: 'Circular justifications (a implies b and b implies a) are harmless in
    the ATMS because both nodes start with empty labels and the circular propagation
    adds no new environments. No special mechanism for detecting or preventing circular
    support is needed.

    '
  concepts:
  - assumption_based_tms
  - well_founded_justification
  - justification
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 155
    section: Circular support
- id: deKleer_1986_AssumptionBasedTMS:claim9
  type: observation
  statement: 'The ATMS eliminates context switching costs because all contexts exist
    simultaneously. Examining a different set of assumptions requires no retraction
    or reassertion of beliefs.

    '
  concepts:
  - context_switching
  - assumption_based_tms
  - context
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 154
    section: Limitations removed
- id: deKleer_1986_AssumptionBasedTMS:claim10
  type: observation
  statement: 'ATMS efficiency is proportional to the number of environments actually
    considered, not the total space size. With n assumptions, there are 2^n potential
    environments, but most are inconsistent in practice, so label sizes remain manageable.

    '
  concepts:
  - assumption_based_tms
  - environment
  - label
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 152
    section: Complexity
- id: deKleer_1986_AssumptionBasedTMS:claim11
  type: observation
  statement: 'Environments are implemented as bit-vectors where each assumption has
    a unique bit position. Union is bitwise OR, subset test is (set1 AND NOT set2)
    == 0, and a hash table keyed by bit-vectors provides O(1) environment lookup.

    '
  concepts:
  - environment
  - assumption_based_tms
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 157
    section: Implementation
- id: deKleer_1986_AssumptionBasedTMS:claim12
  type: observation
  statement: 'Direct retraction of justifications in the ATMS is expensive (isomorphic
    to garbage collection). The preferred approach is to conjoin an extra defeasibility
    assumption with the justification and contradict that assumption to effect retraction.

    '
  concepts:
  - justification
  - assumption_based_tms
  - assumption
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 153
    section: Retraction
- id: deKleer_1986_AssumptionBasedTMS:claim13
  type: observation
  statement: 'The ATMS serves as an intelligent cache: every inference ever made is
    recorded so it need not be repeated. A rule examined by the problem solver need
    never be examined again on the same data because it is compiled within the TMS
    as a justification.

    '
  concepts:
  - assumption_based_tms
  - justification
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 129
    section: Introduction
- id: deKleer_1986_AssumptionBasedTMS:claim14
  type: observation
  statement: 'Each ATMS context implicitly partitions nodes into four categories:
    true (hold in every consistent context, grows monotonically), in (hold in some
    contexts, grows non-monotonically), out (hold in no known context, grows non-monotonically),
    and false (hold in no context ever, grows monotonically).

    '
  concepts:
  - context
  - support_status
  - assumption_based_tms
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 145
    section: Node categories
- id: deKleer_1986_AssumptionBasedTMS:claim15
  type: observation
  statement: 'Approximately 30% of assumptions can typically be garbage collected
    when their singleton environment is nogood or all their consequent nodes are universally
    true or false. Bit-vector positions are recycled after collection.

    '
  concepts:
  - assumption
  - assumption_based_tms
  - nogood
  provenance:
    paper: deKleer_1986_AssumptionBasedTMS
    page: 158
    section: Garbage collection
