source:
  paper: Reiter_1980_DefaultReasoning
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: Reiter_1980_DefaultReasoning:claim1
  type: observation
  statement: 'A default rule has the form alpha : M*beta_1, ..., M*beta_m / w, where
    alpha is the prerequisite, beta_1 through beta_m are the justifications (prefixed
    with the consistency operator M meaning "it is consistent to assume"), and w is
    the consequent.

    '
  concepts:
  - default_rule
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 88
    section: Default Rules
- id: Reiter_1980_DefaultReasoning:claim2
  type: observation
  statement: 'A default theory is a pair (D, W) where D is a set of default rules
    and W is a set of first-order axioms. Default rules are meta-rules that extend
    an incomplete first-order theory, not object-level sentences.

    '
  concepts:
  - default_theory
  - default_rule
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 88
    section: Default Theories
- id: Reiter_1980_DefaultReasoning:claim3
  type: observation
  statement: 'An extension of a default theory is a fixed point of the operator Gamma,
    which closes a set of axioms under first-order consequence and applicable defaults.
    An extension represents a self-supporting, deductively closed set of beliefs.

    '
  concepts:
  - extension
  - default_theory
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 89
    section: Definition 1
- id: Reiter_1980_DefaultReasoning:claim4
  type: observation
  statement: 'A normal default has the form alpha : Mw / w, where the single justification
    equals the consequent. Normal defaults form the tractable core of default logic,
    covering all standard examples of default reasoning.

    '
  concepts:
  - normal_default
  - default_rule
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 95
    section: Normal Defaults
- id: Reiter_1980_DefaultReasoning:claim5
  type: observation
  statement: 'Every closed normal default theory with consistent axioms W has at least
    one extension.

    '
  concepts:
  - normal_default
  - extension
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 95
    section: Theorem 3.1
- id: Reiter_1980_DefaultReasoning:claim6
  type: observation
  statement: 'Distinct extensions of a closed normal default theory are orthogonal:
    their union is inconsistent.

    '
  concepts:
  - extension
  - normal_default
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 98
    section: Theorem 3.3
- id: Reiter_1980_DefaultReasoning:claim7
  type: observation
  statement: 'A consistent closed normal default theory where W union CONSEQUENTS(D)
    is consistent has a unique extension.

    '
  concepts:
  - extension
  - normal_default
  - default_theory
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 98
    section: Corollary 3.4
- id: Reiter_1980_DefaultReasoning:claim8
  type: observation
  statement: 'Adding normal defaults to a normal default theory can never reduce the
    number of extensions (semi-monotonicity).

    '
  concepts:
  - semi_monotonicity
  - normal_default
  - extension
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 96
    section: Theorem 3.2
- id: Reiter_1980_DefaultReasoning:claim9
  type: observation
  statement: 'The proof theory for closed normal default theories is complete: a formula
    beta is in some extension E if and only if beta has a default proof with respect
    to the default theory.

    '
  concepts:
  - default_proof
  - extension
  - normal_default
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 103
    section: Theorem 4.8
- id: Reiter_1980_DefaultReasoning:claim10
  type: observation
  statement: 'The extension membership problem for closed normal default theories
    is not semi-decidable: no algorithm can enumerate all beliefs of an arbitrary
    extension.

    '
  concepts:
  - extension
  - normal_default
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 104
    section: Theorem 4.9
- id: Reiter_1980_DefaultReasoning:claim11
  type: observation
  statement: 'A general (non-normal) default theory may have no extensions, as demonstrated
    by the theory with D = {:MA / not-A} and W = empty set.

    '
  concepts:
  - extension
  - default_theory
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 91
    section: Example 2.6
- id: Reiter_1980_DefaultReasoning:claim12
  type: observation
  statement: 'Multiple extensions from a single default theory are not a defect but
    reflect genuine ambiguity: defaults can sanction different sets of beliefs about
    the world.

    '
  concepts:
  - extension
  - default_theory
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 86
    section: Design Rationale
- id: Reiter_1980_DefaultReasoning:claim13
  type: observation
  statement: 'The closed world assumption is a special case of default logic, where
    the default schema concludes the negation of a predicate when the predicate cannot
    be proved, unifying database query answering with default reasoning.

    '
  concepts:
  - closed_world_assumption
  - default_logic
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 84
    section: Closed World Assumption
- id: Reiter_1980_DefaultReasoning:claim14
  type: observation
  statement: 'Derived beliefs safely persist under new observations if the union of
    their default supports remains consistent. When consistency fails, belief revision
    is needed.

    '
  concepts:
  - belief_revision
  - default_proof
  - default_theory
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 113
    section: 'Section 6: Belief Revision'
- id: Reiter_1980_DefaultReasoning:claim15
  type: observation
  statement: 'The extension membership problem is decidable for the sentential case
    (all defaults and W are sentential wffs) and for the monadic predicate calculus
    case.

    '
  concepts:
  - extension
  - default_theory
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 105
    section: Decidability
- id: Reiter_1980_DefaultReasoning:claim16
  type: observation
  statement: 'First-order logic is monotonic: adding new information never invalidates
    previous conclusions. Default reasoning is inherently non-monotonic, requiring
    a logic where new information can retract previously derived beliefs.

    '
  concepts:
  - monotonic_reasoning
  - non_monotonic_reasoning
  - default_logic
  provenance:
    paper: Reiter_1980_DefaultReasoning
    page: 85
    section: Problem Addressed
