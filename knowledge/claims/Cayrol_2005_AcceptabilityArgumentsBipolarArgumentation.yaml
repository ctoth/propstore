source:
  paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_def_baf
  type: observation
  statement: 'A bipolar argumentation framework (BAF) is a tuple (A, R_def, R_sup)
    where A is a finite set of arguments, R_def is a defeat relation, and R_sup is
    an independent support relation, both binary relations on A.

    '
  concepts:
  - bipolar_argumentation_framework
  - attack_relation
  - support_relation
  reference: Definition 1
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_supported_defeat
  type: observation
  statement: 'A supported defeat for argument B is a sequence where support edges
    lead to a final defeat edge: A1 supports A2 supports ... supports An-1 defeats
    B. This propagates defeat through chains of support.

    '
  concepts:
  - supported_defeat
  - support_relation
  - attack_relation
  reference: Definition 3
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_indirect_defeat
  type: observation
  statement: 'An indirect defeat for argument B is a sequence where a defeat edge
    is followed by support edges: A defeats A2 and A2 supports ... supports B. Defeating
    a supporter indirectly defeats its beneficiaries.

    '
  concepts:
  - indirect_defeat
  - support_relation
  - attack_relation
  reference: Definition 3
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_conflict_free_generalized
  type: observation
  statement: 'A set S is conflict-free in a BAF iff no element of S set-defeats another
    element of S, where set-defeat includes supported defeats and indirect defeats,
    not just direct defeat. This generalizes Dung''s conflict-free definition.

    '
  concepts:
  - conflict_free_set
  - supported_defeat
  - indirect_defeat
  reference: Definition 6
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_safe_set
  type: observation
  statement: 'A set S is safe iff there is no argument B such that S set-defeats B
    and either S set-supports B or B is in S. Safety ensures external coherence: a
    set cannot both support and defeat the same argument.

    '
  concepts:
  - safe_set
  - bipolar_argumentation_framework
  reference: Definition 7
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_safe_implies_conflict_free
  type: observation
  statement: 'If a set S is safe then S is conflict-free. Conversely, if S is conflict-free
    and closed under the support relation R_sup, then S is safe.

    '
  concepts:
  - safe_set
  - conflict_free_set
  - support_relation
  reference: Property 1
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_three_admissibility_levels
  type: observation
  statement: 'Three levels of admissibility of increasing strength are defined for
    BAFs: d-admissible (conflict-free + defends elements), s-admissible (safe + defends
    elements), and c-admissible (conflict-free + closed under support + defends elements).
    c-admissible implies s-admissible implies d-admissible.

    '
  concepts:
  - d_admissible
  - s_admissible
  - c_admissible
  reference: Definitions 9-11
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_d_admissible_def
  type: observation
  statement: 'A set S is d-admissible iff S is conflict-free and S collectively defends
    all its elements, where defence uses set-defeat. This is the weakest BAF admissibility
    level, directly generalizing Dung''s admissibility.

    '
  concepts:
  - d_admissible
  - conflict_free_set
  - admissible_set
  reference: Definition 9
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_s_admissible_def
  type: observation
  statement: 'A set S is s-admissible iff S is safe and S collectively defends all
    its elements. Safety enforces external coherence: accepted arguments cannot simultaneously
    be supported and defeated by the accepted set.

    '
  concepts:
  - s_admissible
  - safe_set
  reference: Definition 10
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_c_admissible_def
  type: observation
  statement: 'A set S is c-admissible iff S is conflict-free, S is closed for R_sup
    (if A in S and A supports B then B in S), and S collectively defends all its elements.
    This is the strongest admissibility level.

    '
  concepts:
  - c_admissible
  - conflict_free_set
  - support_relation
  reference: Definition 11
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_preferred_extensions
  type: observation
  statement: 'Three types of preferred extensions correspond to the three admissibility
    levels: d-preferred (maximal d-admissible), s-preferred (maximal s-admissible),
    and c-preferred (maximal c-admissible).

    '
  concepts:
  - d_admissible
  - s_admissible
  - c_admissible
  - preferred_extension
  reference: Definition 12
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_stable_extension_baf
  type: observation
  statement: 'A stable extension of a BAF is a conflict-free set S that set-defeats
    every argument not in S. This generalizes Dung''s stable extension using set-defeat.

    '
  concepts:
  - stable_extension
  - conflict_free_set
  - bipolar_argumentation_framework
  reference: Definition 8
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_acyclic_unique_stable
  type: observation
  statement: 'In acyclic BAFs, a unique stable extension always exists. The s-preferred
    and c-preferred extensions are subsets of this unique stable extension.

    '
  concepts:
  - stable_extension
  - s_admissible
  - c_admissible
  - bipolar_argumentation_framework
  reference: Property 4
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_stable_not_always_safe
  type: observation
  statement: 'A stable extension of a BAF may not be safe, meaning it can simultaneously
    set-defeat and set-support the same argument. When this happens, the stable extension
    is not s-admissible.

    '
  concepts:
  - stable_extension
  - safe_set
  - s_admissible
  reference: Example 3
- id: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation:cayrol05_reduces_to_dung
  type: observation
  statement: 'When the support relation R_sup is empty, a BAF reduces to Dung''s standard
    argumentation framework. Set-defeat reduces to direct defeat, safety reduces to
    conflict-free, and all three admissibility levels coincide with Dung''s admissibility.

    '
  concepts:
  - bipolar_argumentation_framework
  - argumentation_framework
  - admissible_set
  reference: Implicit throughout paper
