source:
  paper: deKleer_1986_ProblemSolvingATMS
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: deKleer_1986_ProblemSolvingATMS:claim1
  type: observation
  statement: 'The consumer architecture encodes problem-solving steps as modular consumers
    attached to ATMS nodes. Consumers fire when antecedent labels become nonempty,
    execute exactly once per node, and produce new justifications. Running a consumer
    is like compilation: it cannot produce new results if rerun.

    '
  concepts:
  - consumer_architecture
  - assumption_based_tms
  - justification
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 201
    section: Consumer architecture
- id: deKleer_1986_ProblemSolvingATMS:claim2
  type: observation
  statement: 'Consumers must obey four restrictions: only examine data of nodes (not
    labels or justifications), only examine antecedent nodes, include all and only
    antecedent nodes in justification antecedents, and maintain no internal state
    or control decisions.

    '
  concepts:
  - consumer_architecture
  - justification
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 202
    section: Consumer restrictions
- id: deKleer_1986_ProblemSolvingATMS:claim3
  type: observation
  statement: 'Incorrect justifications are far more damaging in the ATMS than in conventional
    reasoning. Too few antecedents make labels too general (nodes appear in wrong
    contexts); too many antecedents make labels too specific (solutions are missed).

    '
  concepts:
  - justification
  - label
  - assumption_based_tms
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 200
    section: Introduction
- id: deKleer_1986_ProblemSolvingATMS:claim4
  type: observation
  statement: 'The scheduler processes nodes with the simplest label (fewest assumptions)
    first. Finding the most general contradiction first avoids useless problem-solving
    steps within ultimately inconsistent environments.

    '
  concepts:
  - consumer_architecture
  - environment
  - nogood
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 204
    section: Scheduling
- id: deKleer_1986_ProblemSolvingATMS:claim5
  type: observation
  statement: 'Control disjunctions partition the search space. The scheduler maintains
    a single current environment guaranteed consistent with all control disjunctions.
    A control disjunction also expresses search preference: solutions containing the
    first alternative are found before solutions containing the second.

    '
  concepts:
  - control_disjunction
  - environment
  - consumer_architecture
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 205
    section: Dependency-directed backtracking
- id: deKleer_1986_ProblemSolvingATMS:claim6
  type: observation
  statement: 'The consumer architecture automatically solves the unouting problem.
    If antecedents do not yield a consistent environment, the consumer does not run.
    When a distant antecedent later becomes justified, the ATMS propagates label updates
    and the consumer fires automatically.

    '
  concepts:
  - consumer_architecture
  - assumption_based_tms
  - label
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 203
    section: Consumer architecture
- id: deKleer_1986_ProblemSolvingATMS:claim7
  type: observation
  statement: 'A simple constraint language built on ATMS primitives provides operations
    including PLUS, TIMES, AND, OR, ONEOF, EQ, NOT, MINUS, and DIVIDE for encoding
    arithmetic and logical constraints over assumption-tracked variables.

    '
  concepts:
  - constraint_language
  - assumption_based_tms
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 209
    section: Constraint language
- id: deKleer_1986_ProblemSolvingATMS:claim8
  type: observation
  statement: 'The kernel environment constrains consumer execution: a consumer is
    not run unless its antecedents hold in some consistent environment not inconsistent
    with the kernel. If the kernel becomes inconsistent, problem solving halts.

    '
  concepts:
  - kernel_environment
  - consumer_architecture
  - environment
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 206
    section: Kernel environment
- id: deKleer_1986_ProblemSolvingATMS:claim9
  type: observation
  statement: 'Control is exercised only before running a consumer. Once a consumer
    has run and constructed its justifications, those justifications are permanent.
    No solution will be missed if the control is later removed, preserving the potential
    for exhaustivity.

    '
  concepts:
  - consumer_architecture
  - control_disjunction
  - justification
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 206
    section: Problem solver responsibility
- id: deKleer_1986_ProblemSolvingATMS:claim10
  type: observation
  statement: 'The ATMS never modifies or adds a justification to avoid a contradiction.
    A contradiction simply ensures that the ATMS will never construct any environment
    containing it. This gives completeness and consistency guarantees that systems
    which modify justifications cannot provide.

    '
  concepts:
  - assumption_based_tms
  - nogood
  - justification
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 219
    section: Comparison with McDermott
- id: deKleer_1986_ProblemSolvingATMS:claim11
  type: observation
  statement: 'Doyle''s CP-justification mechanism is unnecessary in the ATMS. The
    ATMS considers all justifications as conditional-proof and translates them into
    SL-justifications in terms of assumptions, making a separate CP mechanism redundant.

    '
  concepts:
  - assumption_based_tms
  - conditional_proof_justification
  - support_list_justification
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 217
    section: Comparison with Doyle
- id: deKleer_1986_ProblemSolvingATMS:claim12
  type: observation
  statement: 'ATMS consumers are both order-insensitive and status-insensitive: they
    can execute in any order and do not depend on whether antecedent nodes are currently
    in or out. This makes parallelism natural, requiring no coordination between parallel
    processors.

    '
  concepts:
  - consumer_architecture
  - assumption_based_tms
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 222
    section: Parallelism
- id: deKleer_1986_ProblemSolvingATMS:claim13
  type: observation
  statement: 'For problems with many solutions where all are needed, the ATMS has
    an inherent advantage over conventional TMSs because it avoids all dependency-directed
    backtracking and context switching costs. For problems needing only one solution,
    the ATMS may be slower due to database overhead.

    '
  concepts:
  - assumption_based_tms
  - dependency_directed_backtracking
  - context_switching
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 215
    section: Comparison
- id: deKleer_1986_ProblemSolvingATMS:claim14
  type: observation
  statement: 'Without control disjunctions, label sizes can grow exponentially. The
    i-bit parity problem produces 2^(i+2) + 2^i environments without control, but
    only 4i environments with control disjunctions (linear growth).

    '
  concepts:
  - control_disjunction
  - label
  - environment
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 216
    section: 'Example: parity'
- id: deKleer_1986_ProblemSolvingATMS:claim15
  type: observation
  statement: 'Constraint consumers trigger when all but one variable in a constraint
    relation are known, computing the unknown variable via the inverse function. A
    type system prevents retriggering on the consumer''s own outputs.

    '
  concepts:
  - constraint_language
  - consumer_architecture
  provenance:
    paper: deKleer_1986_ProblemSolvingATMS
    page: 207
    section: Constraint consumers
