source:
  paper: Martins_1983_MultipleBeliefSpaces
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: Martins_1983_MultipleBeliefSpaces:claim1
  type: observation
  statement: A context is a set of hypotheses that defines a Belief Space (BS) --
    the set of all propositions derivable from those hypotheses.
  concepts:
  - context
  - belief_space
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 371
    section: Section 3
- id: Martins_1983_MultipleBeliefSpaces:claim2
  type: observation
  statement: The Current Belief Space (CBS) is defined by the Current Context (CO)
    -- the set of all hypotheses currently believed.
  concepts:
  - current_context
  - belief_space
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 371
    section: Section 3
- id: Martins_1983_MultipleBeliefSpaces:claim3
  type: observation
  statement: Supported wffs have the form F!:t,a,p where F is a wff, t is an origin
    tag, a is the origin set, and p is the restriction set.
  concepts:
  - supported_wff
  - origin_tag
  - origin_set
  - restriction_set
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 370
    section: Section 2
- id: Martins_1983_MultipleBeliefSpaces:claim4
  type: observation
  statement: The origin set (OS) is the set of hypotheses actually used to derive
    a proposition; once derived, a proposition's OT and OS remain constant.
  concepts:
  - origin_set
  - supported_wff
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 370
    section: Section 2
- id: Martins_1983_MultipleBeliefSpaces:claim5
  type: observation
  statement: The restriction set (RS) is a set of sets of hypotheses, each of which
    when combined with the hypotheses in the OS forms an inconsistent set.
  concepts:
  - restriction_set
  - origin_set
  - contradiction_handling
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 370
    section: Section 2
- id: Martins_1983_MultipleBeliefSpaces:claim6
  type: observation
  statement: 'MBR uses only two inference rules for contradiction handling: negation
    introduction (~I) and updating of restriction sets (URS).'
  concepts:
  - contradiction_handling
  - restriction_set
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 371
    section: Section 3
- id: Martins_1983_MultipleBeliefSpaces:claim7
  type: observation
  statement: Restriction sets distribute inconsistency information across hypotheses,
    eliminating the need for a separate NOGOOD data structure.
  concepts:
  - restriction_set
  - nogood
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 373
    section: Section 5
- id: Martins_1983_MultipleBeliefSpaces:claim8
  type: observation
  statement: From n hypotheses, up to 2^n distinct belief spaces can be defined using
    contexts over the same knowledge base.
  concepts:
  - belief_space
  - context
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 371
    section: Section 3
- id: Martins_1983_MultipleBeliefSpaces:claim9
  type: observation
  statement: Retrieval operations only return propositions within the Current Belief
    Space, automatically filtering out propositions depending on hypotheses outside
    the current context.
  concepts:
  - current_context
  - belief_space
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 371
    section: Section 3
- id: Martins_1983_MultipleBeliefSpaces:claim10
  type: observation
  statement: MBR eliminates the need to explicitly mark propositions as believed or
    disbelieved; belief status is determined entirely by whether the origin set is
    a subset of the current context.
  concepts:
  - origin_set
  - current_context
  - belief_space
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 373
    section: Section 5
- id: Martins_1983_MultipleBeliefSpaces:claim11
  type: observation
  statement: When a contradiction is detected and both contradictory wffs belong to
    the CBS, the system must select which hypothesis to drop (culprit selection) to
    restore consistency.
  concepts:
  - contradiction_handling
  - culprit_selection
  - current_context
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 371
    section: Section 3
- id: Martins_1983_MultipleBeliefSpaces:claim12
  type: observation
  statement: Previous approaches to contradiction handling (Doyle's TMS, McAllester's
    three-valued TMS, McDermott's contexts) did not handle multiple agents with possibly
    contradictory beliefs in the same knowledge base.
  concepts:
  - truth_maintenance_system
  - contradiction_handling
  - context
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 370
    section: Section 1
- id: Martins_1983_MultipleBeliefSpaces:claim13
  type: observation
  statement: The number of inconsistency checks at any given time is bounded by the
    number of elements in the restriction set of the derived proposition.
  concepts:
  - restriction_set
  - contradiction_handling
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 373
    section: Section 5
- id: Martins_1983_MultipleBeliefSpaces:claim14
  type: observation
  statement: 'Contradiction recovery in MBR is non-destructive: the culprit hypothesis
    is dropped from the current context rather than deleted from the knowledge base.'
  concepts:
  - culprit_selection
  - context
  - contradiction_handling
  provenance:
    paper: Martins_1983_MultipleBeliefSpaces
    page: 373
    section: Section 5
