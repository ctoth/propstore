source:
  paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim1
  type: observation
  statement: 'ASPIC+ is extended to handle incomplete information where some observations
    are unsettled, defining four justification statuses for literals: unsatisfiable,
    defended, out, and blocked.

    '
  concepts:
  - aspic_plus
  - incomplete_information
  - justification_status
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 1
    section: Abstract
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim2
  type: observation
  statement: 'A literal is unsatisfiable if there is no argument with that literal
    as its conclusion, meaning the literal cannot be concluded regardless of what
    information arrives.

    '
  concepts:
  - justification_status
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 4
    section: Justification Statuses under Incomplete Information
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim3
  type: observation
  statement: 'A literal is defended if there is an argument for it in the grounded
    extension, meaning it is justified under grounded semantics.

    '
  concepts:
  - justification_status
  - grounded_extension
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 4
    section: Justification Statuses under Incomplete Information
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim4
  type: observation
  statement: 'A literal is out if it is not unsatisfiable but not defended -- there
    exists an argument for it, but it is not in the grounded extension because it
    is defeated.

    '
  concepts:
  - justification_status
  - grounded_extension
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 4
    section: Justification Statuses under Incomplete Information
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim5
  type: observation
  statement: 'A literal is blocked if there is an argument for it but it is neither
    in the grounded extension nor definitively out, meaning it might be justifiable
    under semantics other than grounded.

    '
  concepts:
  - justification_status
  - grounded_semantics
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 4
    section: Justification Statuses under Incomplete Information
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim6
  type: observation
  statement: 'A literal is j-stable with respect to a set of queryables if its justification
    status j will not change regardless of how the queryables are resolved.

    '
  concepts:
  - stability
  - justification_status
  - queryable
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 5
    section: 'Section 3: Stability and Relevance'
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim7
  type: observation
  statement: 'A queryable q is j-relevant for a literal l if resolving q (positively
    or negatively) could be part of the minimal information needed to stabilize l''s
    status at j.

    '
  concepts:
  - relevance
  - queryable
  - stability
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 5
    section: 'Section 3: Stability and Relevance'
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim8
  type: observation
  statement: 'A future argumentation theory AT'' is defined as a possible state of
    knowledge after resolving some or all queryables, where axioms can only grow by
    adding queryables and ordinary and assumption premises remain unchanged.

    '
  concepts:
  - future_argumentation_theory
  - queryable
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 5
    section: 'Section 3: Stability and Relevance'
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim9
  type: observation
  statement: 'Deciding whether a literal is j-stable in an ASPIC+ argumentation theory
    with respect to a set of queryables is coNP-complete for each of the four justification
    statuses.

    '
  concepts:
  - stability
  - justification_status
  - aspic_plus
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 6
    section: 'Section 4: Complexity Results'
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim10
  type: observation
  statement: 'Deciding whether a queryable is j-relevant for a literal is Sigma_2^P-complete
    for each of the four justification statuses, with hardness holding even without
    preferences.

    '
  concepts:
  - relevance
  - justification_status
  - queryable
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 6
    section: 'Section 4: Complexity Results'
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim11
  type: observation
  statement: 'The ASP-based algorithms for computing justification labels, stability,
    and relevance are practical, handling real-world benchmarks with sub-second performance
    for justification status and seconds for stability and relevance on moderate-sized
    instances.

    '
  concepts:
  - answer_set_programming
  - justification_status
  - stability
  - relevance
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 8
    section: Performance
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim12
  type: observation
  statement: 'The CEGAR approach for relevance computation iteratively refines by
    drawing candidates from an abstract space and verifying them in the concrete semantics,
    proving practical for moderate-sized instances.

    '
  concepts:
  - cegar
  - relevance
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 7
    section: ASP-Based Counterexample Generation
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim13
  type: observation
  statement: 'Both a queryable q and its contradictory can be j-relevant for the same
    literal, because resolving q either way could contribute to stabilizing the literal''s
    status through different minimal future theories.

    '
  concepts:
  - relevance
  - queryable
  - future_argumentation_theory
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 5
    section: 'Section 3: Stability and Relevance'
- id: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation:claim14
  type: observation
  statement: 'The paper focuses exclusively on grounded semantics; extension to preferred,
    stable, or other Dung semantics is left as future work.

    '
  concepts:
  - grounded_semantics
  - aspic_plus
  provenance:
    paper: Odekerken_2023_ArgumentationReasoningASPICIncompleteInformation
    page: 8
    section: Limitations
