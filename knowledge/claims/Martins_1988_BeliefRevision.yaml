source:
  paper: Martins_1988_BeliefRevision
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: Martins_1988_BeliefRevision:claim1
  type: observation
  statement: The SWM deductive system is a relevance logic that tracks propositional
    dependencies via origin sets and restriction sets, preventing introduction of
    irrelevancies.
  concepts:
  - swm_logic
  - origin_set
  - restriction_set
  - relevance
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 32
    section: Section 2
- id: Martins_1988_BeliefRevision:claim2
  type: observation
  statement: A supported wff is a quadruple (A, tau, alpha, rho) where A is a wff,
    tau is the origin tag, alpha is the origin set, and rho is the restriction set.
  concepts:
  - supported_wff
  - origin_tag
  - origin_set
  - restriction_set
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 37
    section: Section 2.2
- id: Martins_1988_BeliefRevision:claim3
  type: observation
  statement: 'The origin tag distinguishes three types of propositions: hyp (hypothesis),
    der (derived), and ext (externally-introduced to prevent smuggling hypotheses
    into conjunctions).'
  concepts:
  - origin_tag
  - supported_wff
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 37
    section: Section 2.2
- id: Martins_1988_BeliefRevision:claim4
  type: observation
  statement: 'All supported wffs have minimal restriction sets: no element of the
    RS is a superset of another element (Theorem 4).'
  concepts:
  - restriction_set
  - supported_wff
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 72
    section: Appendix A
- id: Martins_1988_BeliefRevision:claim5
  type: observation
  statement: If two supported wffs have the same origin set, they have the same restriction
    set (Theorem 5).
  concepts:
  - origin_set
  - restriction_set
  - supported_wff
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 74
    section: Appendix A
- id: Martins_1988_BeliefRevision:claim6
  type: observation
  statement: Every origin set has recorded every known inconsistent set (Corollary
    5.1).
  concepts:
  - origin_set
  - restriction_set
  - contradiction_handling
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 75
    section: Appendix A
- id: Martins_1988_BeliefRevision:claim7
  type: observation
  statement: In a context not known to be inconsistent, for any two supported wffs
    defined by the context, the combinability predicate returns true (Theorem 6, Corollary
    6.1).
  concepts:
  - context
  - supported_wff
  - belief_space
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 76
    section: Appendix A
- id: Martins_1988_BeliefRevision:claim8
  type: observation
  statement: 'The MBR abstract model defines two levels of belief revision: within
    the current context (requiring context change) and within a strictly containing
    context (only recording the inconsistency).'
  concepts:
  - belief_space
  - current_context
  - contradiction_handling
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 50
    section: Section 4
- id: Martins_1988_BeliefRevision:claim9
  type: observation
  statement: SNeBR was the first assumption-based belief revision system implemented.
  concepts:
  - snebr
  - assumption
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 31
    section: Section 1
- id: Martins_1988_BeliefRevision:claim10
  type: observation
  statement: 'No prior system combined all of: a logic-based approach where the system
    computes dependencies, assumption-based support tracking, and manipulation of
    sets of assumptions rather than justifications.'
  concepts:
  - swm_logic
  - origin_set
  - assumption
  - justification
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 25
    section: Section 1
- id: Martins_1988_BeliefRevision:claim11
  type: observation
  statement: Classical logic allows introduction of irrelevancies via the paradoxes
    of implication (anything implies a true proposition, a contradiction implies anything);
    SWM blocks these by tracking origin sets.
  concepts:
  - swm_logic
  - origin_set
  - relevance
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 33
    section: Section 2.1
- id: Martins_1988_BeliefRevision:claim12
  type: observation
  statement: In Doyle's TMS, inferences are made outside the system, which just passively
    records them; the system requires the user to manually specify justifications.
  concepts:
  - truth_maintenance_system
  - justification
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 27
    section: Section 1.3
- id: Martins_1988_BeliefRevision:claim13
  type: observation
  statement: In justification-based systems, the support of each proposition contains
    the propositions that directly produced it, requiring graph traversal to find
    ultimate hypotheses; assumption-based systems record hypotheses directly.
  concepts:
  - justification
  - assumption
  - origin_set
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 28
    section: Section 1.3
- id: Martins_1988_BeliefRevision:claim14
  type: observation
  statement: 'SWM has syntax but no semantics: no model theory or truth conditions
    are defined.'
  concepts:
  - swm_logic
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 32
    section: Section 2
- id: Martins_1988_BeliefRevision:claim15
  type: observation
  statement: 'Belief revision in SNeBR is interactive: the user must choose which
    hypothesis to discard when a contradiction is detected (culprit selection).'
  concepts:
  - snebr
  - culprit_selection
  - contradiction_handling
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 67
    section: Section 6
- id: Martins_1988_BeliefRevision:claim16
  type: observation
  statement: Removing exactly one hypothesis from a set of culprits for a contradiction
    is guaranteed by SWM to produce a context that is not known to be inconsistent.
  concepts:
  - culprit_selection
  - context
  - swm_logic
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 67
    section: Section 6
- id: Martins_1988_BeliefRevision:claim17
  type: observation
  statement: Information derived in one belief space can be shared in another without
    re-derivation, since propositions derived from the same hypotheses share supporting
    nodes.
  concepts:
  - belief_space
  - snebr
  - supported_wff
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 69
    section: Section 6
- id: Martins_1988_BeliefRevision:claim18
  type: observation
  statement: The mu function computes restriction sets for derived wffs from parent
    wffs by filtering RS elements to keep only those disjoint from the combined origin
    set, then removing supersets.
  concepts:
  - restriction_set
  - origin_set
  - supported_wff
  provenance:
    paper: Martins_1988_BeliefRevision
    page: 38
    section: Section 2.2
