source:
  paper: Ginsberg_1985_Counterfactuals
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: Ginsberg_1985_Counterfactuals:claim1
  type: model
  name: counterfactual_truth_function_model
  statement: Counterfactual conditionals can be formalized using three-valued truth
    functions (true/false/unknown) with closure operations over a logical language,
    where the counterfactual 'if p then q' is evaluated by setting p to unknown, computing
    closure, then setting p to true and recomputing closure to determine q's truth
    value.
  concepts:
  - counterfactual_conditional
  - three_valued_truth_function
  - truth_function_closure
  equations:
  - 'phi: L -> {t, f, u}'
  - phi|_p(q) = cl(theta)(q)
  parameters:
  - name: L
    description: Set of sentences in the logical language
  - name: T
    description: Set of truth values {t, f, u} (true, false, unknown)
- id: Ginsberg_1985_Counterfactuals:claim2
  type: equation
  statement: A truth function psi is an extension of phi (phi <= psi) if for all propositions
    p, either phi(p) equals psi(p) or phi(p) is unknown.
  expression: 'phi <= psi iff forall p in L: phi(p) = psi(p) or phi(p) = u'
  sympy: ForAll(p, Implies(Element(p, L), Or(Eq(phi(p), psi(p)), Eq(phi(p), u))))
  variables:
    phi: Original truth function
    psi: Extended truth function
    L: Logical language
    u: Unknown truth value
  concepts:
  - three_valued_truth_function
- id: Ginsberg_1985_Counterfactuals:claim3
  type: observation
  statement: The closure of a consistent truth function phi is the maximally extended
    truth function psi such that every consistent complete extension of phi is also
    an extension of psi, corresponding precisely to logical closure.
  concepts:
  - truth_function_closure
  - three_valued_truth_function
- id: Ginsberg_1985_Counterfactuals:claim4
  type: observation
  statement: A consistent truth function is reduced (all simple extensions are consistent)
    if and only if it is closed (Lemma 3).
  concepts:
  - truth_function_closure
  - three_valued_truth_function
- id: Ginsberg_1985_Counterfactuals:claim5
  type: observation
  statement: The three-valued truth function construction with closure operations
    is formally identical to Lewis's possible world interpretation of counterfactuals
    (Theorem 4).
  concepts:
  - counterfactual_conditional
  - possible_worlds_semantics
  - truth_function_closure
- id: Ginsberg_1985_Counterfactuals:claim6
  type: observation
  statement: Context dependence in counterfactual reasoning is encoded by choosing
    a sublanguage V subset of L, which determines which propositions may change truth
    values under counterfactual evaluation while others remain fixed.
  concepts:
  - sublanguage_selection
  - counterfactual_conditional
- id: Ginsberg_1985_Counterfactuals:claim7
  type: observation
  statement: Counterfactual conditionals do not support contraposition (p > q does
    not imply not-q > not-p), transitivity (p > q and q > r does not imply p > r),
    or strengthening the antecedent (p > r does not imply p and q > r).
  concepts:
  - counterfactual_conditional
  - non_monotonic_reasoning
- id: Ginsberg_1985_Counterfactuals:claim8
  type: observation
  statement: 'The counterfactual framework subsumes the minimal fault assumption used
    in automated diagnosis: device assumptions that components function correctly
    can be recast as counterfactual assumptions, and counterfactual reasoning identifies
    which assumptions must be abandoned when observations contradict predictions.'
  concepts:
  - counterfactual_conditional
  - truth_function_closure
- id: Ginsberg_1985_Counterfactuals:claim9
  type: observation
  statement: No extension of an inconsistent truth function is consistent (Lemma 1),
    and closure is always less than or equal to the original truth function in the
    extension ordering (Lemma 2).
  concepts:
  - truth_function_closure
  - three_valued_truth_function
- id: Ginsberg_1985_Counterfactuals:claim10
  type: observation
  statement: 'Similarity between possible worlds has two sources: the number of propositions
    whose truth values change (fewer is more similar) and the relative importance
    of propositions (unnecessary changes make a world more distant).'
  concepts:
  - possible_worlds_semantics
  - sublanguage_selection
