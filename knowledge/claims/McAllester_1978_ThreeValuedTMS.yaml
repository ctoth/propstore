source:
  paper: McAllester_1978_ThreeValuedTMS
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: McAllester_1978_ThreeValuedTMS:claim1
  type: observation
  statement: A three-valued TMS assigns each proposition one of three truth states
    (true, false, unknown), eliminating the need for separate negation nodes required
    by two-valued systems like Doyle's TMS.
  concepts:
  - three_valued_logic
  - truth_maintenance_system
  - support_status
  provenance:
    paper: McAllester_1978_ThreeValuedTMS
    section: Introduction
- id: McAllester_1978_ThreeValuedTMS:claim2
  type: observation
  statement: All logical relations are represented as disjunctive clauses in conjunctive
    normal form, enabling symmetric deduction where the same clause can deduce a consequent
    or the negation of any antecedent.
  concepts:
  - disjunctive_clause
  - three_valued_logic
  provenance:
    paper: McAllester_1978_ThreeValuedTMS
    section: Clauses
- id: McAllester_1978_ThreeValuedTMS:claim3
  type: observation
  statement: 'Deductions are restricted to one-step clause propagation (unit propagation):
    when a clause has exactly one unknown term remaining, that term''s value is forced,
    avoiding NP-complete satisfiability checking.'
  concepts:
  - unit_propagation
  - disjunctive_clause
  provenance:
    paper: McAllester_1978_ThreeValuedTMS
    section: Design Decisions
- id: McAllester_1978_ThreeValuedTMS:claim4
  type: observation
  statement: When a contradiction occurs (a clause with all terms false), new clauses
    are generated by resolving the contradicting clause with the support chains of
    the terms that caused the contradiction, encoding the deductive path for future
    avoidance.
  concepts:
  - clause_generation
  - nogood
  - disjunctive_clause
  provenance:
    paper: McAllester_1978_ThreeValuedTMS
    section: Contradiction Handling
- id: McAllester_1978_ThreeValuedTMS:claim5
  type: observation
  statement: A node can never transition directly from true to false or vice versa;
    it must pass through the unknown state, ensuring well-founded support chains without
    circular justifications.
  concepts:
  - three_valued_logic
  - well_founded_justification
  provenance:
    paper: McAllester_1978_ThreeValuedTMS
    section: Removing Truth Values
- id: McAllester_1978_ThreeValuedTMS:claim6
  type: observation
  statement: Dependency-directed backtracking selects the default assumption with
    minimum maximum distance from the contradiction, then removes it so the contradicting
    clause can deduce the negation of the default value.
  concepts:
  - dependency_directed_backtracking
  - default_assumption
  provenance:
    paper: McAllester_1978_ThreeValuedTMS
    section: Backtracking
- id: McAllester_1978_ThreeValuedTMS:claim7
  type: observation
  statement: Clauses can be effectively removed without physical deletion by adding
    a validity node to the clause; setting the validity node to false deactivates
    the clause.
  concepts:
  - disjunctive_clause
  - truth_maintenance_system
  provenance:
    paper: McAllester_1978_ThreeValuedTMS
    section: Clause Validity
- id: McAllester_1978_ThreeValuedTMS:claim8
  type: observation
  statement: 'Removing a truth value cascades to all values that critically depend
    on it: those whose supporting clause used the removed value as a necessary condition.'
  concepts:
  - truth_maintenance_system
  - three_valued_logic
  provenance:
    paper: McAllester_1978_ThreeValuedTMS
    section: Removing Truth Values
- id: McAllester_1978_ThreeValuedTMS:claim9
  type: observation
  statement: The three-valued clause-based TMS eliminates non-monotonic dependency
    structures entirely, achieving non-monotonic reasoning solely through default
    assumptions and clause-based contradiction resolution.
  concepts:
  - three_valued_logic
  - non_monotonic_reasoning
  - default_assumption
  provenance:
    paper: McAllester_1978_ThreeValuedTMS
    section: Introduction
- id: McAllester_1978_ThreeValuedTMS:claim10
  type: observation
  statement: Unlike Doyle's TMS, the three-valued TMS does not implement conditional
    proof justifications, trading condensed explanations for simpler architecture.
  concepts:
  - truth_maintenance_system
  - conditional_proof_justification
  - three_valued_logic
  provenance:
    paper: McAllester_1978_ThreeValuedTMS
    section: Limitations
