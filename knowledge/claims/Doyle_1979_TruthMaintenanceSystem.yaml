source:
  paper: Doyle_1979_TruthMaintenanceSystem
  extraction_model: claude-opus-4-20250514
  extraction_date: '2026-03-22'
claims:
- id: Doyle_1979_TruthMaintenanceSystem:claim1
  type: observation
  statement: 'The Truth Maintenance System (TMS) is a problem-solver subsystem that
    records and maintains justifications for beliefs, enabling non-monotonic reasoning,
    dependency-directed backtracking, and automatic belief revision when assumptions
    change.

    '
  concepts:
  - truth_maintenance_system
  - belief_revision
  - non_monotonic_reasoning
  - dependency_directed_backtracking
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 231
    section: Abstract
- id: Doyle_1979_TruthMaintenanceSystem:claim2
  type: observation
  statement: 'The TMS defines two justification types: support-list (SL) justifications
    of the form (SL inlist outlist) for monotonic and non-monotonic deductions, and
    conditional-proof (CP) justifications of the form (CP consequent inhypotheses
    outhypotheses) for hypothetical reasoning.

    '
  concepts:
  - support_list_justification
  - conditional_proof_justification
  - justification
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 239
    section: Justifications
- id: Doyle_1979_TruthMaintenanceSystem:claim3
  type: observation
  statement: 'A node''s support-status is either in (believed, possessing a valid
    justification) or out (not believed, lacking a valid justification). Support-status
    reflects current possession of valid reasons for belief, not truth or falsity.

    '
  concepts:
  - support_status
  - justification
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 238
    section: Reasons for beliefs
- id: Doyle_1979_TruthMaintenanceSystem:claim4
  type: observation
  statement: 'An SL-justification (SL inlist outlist) is valid if and only if every
    node in its inlist is in and every node in its outlist is out.

    '
  concepts:
  - support_list_justification
  - support_status
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 240
    section: Support-list justifications
- id: Doyle_1979_TruthMaintenanceSystem:claim5
  type: observation
  statement: 'A well-founded supporting justification is a non-circular argument:
    the justified node must not appear in its own foundations via the supporting-justification
    chain.

    '
  concepts:
  - well_founded_justification
  - justification
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 236
    section: Overview of the TMS
- id: Doyle_1979_TruthMaintenanceSystem:claim6
  type: observation
  statement: 'A node is in if and only if at least one justification in its justification-set
    is well-founded valid. A node is out if and only if no justification in its justification-set
    is well-founded valid.

    '
  concepts:
  - support_status
  - well_founded_justification
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 238
    section: Reasons for beliefs
- id: Doyle_1979_TruthMaintenanceSystem:claim7
  type: observation
  statement: 'Non-monotonic justifications base an argument for a node not only on
    current belief in other nodes but also on lack of current belief in other nodes,
    via the outlist mechanism in SL-justifications.

    '
  concepts:
  - non_monotonic_reasoning
  - support_list_justification
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 237
    section: Non-monotonic justifications
- id: Doyle_1979_TruthMaintenanceSystem:claim8
  type: observation
  statement: 'Dependency-directed backtracking operates in four steps: find the maximal
    assumptions underlying a contradiction, summarize the cause as a nogood, select
    and reject a culprit assumption, and repeat if the contradiction persists.

    '
  concepts:
  - dependency_directed_backtracking
  - nogood
  - assumption
  - contradiction_handling
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 251
    section: Dependency-directed backtracking
- id: Doyle_1979_TruthMaintenanceSystem:claim9
  type: observation
  statement: 'A nogood records that a particular set of assumptions is jointly inconsistent,
    justified by a CP-justification so that it persists regardless of which assumption
    in the set is retracted.

    '
  concepts:
  - nogood
  - conditional_proof_justification
  - assumption
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 251
    section: Dependency-directed backtracking
- id: Doyle_1979_TruthMaintenanceSystem:claim10
  type: observation
  statement: 'The conventional monotonic view of reasoning -- that beliefs only grow
    and never shrink -- fails to handle the frame problem, commonsense default reasoning,
    and the control problem of deciding what to do next.

    '
  concepts:
  - monotonic_reasoning
  - non_monotonic_reasoning
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 232
    section: Introduction
- id: Doyle_1979_TruthMaintenanceSystem:claim11
  type: observation
  statement: 'The TMS interface consists of exactly three fundamental operations:
    create a new node, add or retract a justification for a node, and mark a node
    as a contradiction.

    '
  concepts:
  - truth_maintenance_system
  - justification
  - contradiction_handling
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 236
    section: Overview of the TMS
- id: Doyle_1979_TruthMaintenanceSystem:claim12
  type: observation
  statement: 'Default assumptions select one of several alternatives using SL-justifications
    where each alternative''s justification has the other alternatives in its outlist,
    ensuring exactly one is believed at any time.

    '
  concepts:
  - default_assumption
  - support_list_justification
  - assumption
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 261
    section: Default assumptions
- id: Doyle_1979_TruthMaintenanceSystem:claim13
  type: observation
  statement: 'Dialectical argumentation organizes problem solving as modular argumentation
    in three steps: make an argument, reply to challenges, and repeat. Argument steps
    are justifications, beliefs are assumptions, and the belief system becomes additive
    -- arguments accumulate monotonically while current beliefs change non-monotonically.

    '
  concepts:
  - dialectical_argumentation
  - justification
  - assumption
  - non_monotonic_reasoning
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 256
    section: Dialectical argumentation
- id: Doyle_1979_TruthMaintenanceSystem:claim14
  type: observation
  statement: 'Three types of circularity exist in TMS justification networks: consistent
    circularities (nodes out consistently with justifications), choice circularities
    (at least one node must be in), and unsatisfiable circularities (no consistent
    assignment exists).

    '
  concepts:
  - well_founded_justification
  - support_status
  - truth_maintenance_system
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 245
    section: Circularities
- id: Doyle_1979_TruthMaintenanceSystem:claim15
  type: observation
  statement: 'Reasoned retraction of assumptions requires giving a recorded reason
    for why an assumption should be retracted. If the reason later becomes invalid,
    the retraction is no longer effective and the assumption is restored.

    '
  concepts:
  - assumption
  - belief_revision
  - justification
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 235
    section: Reasoned assumptions
- id: Doyle_1979_TruthMaintenanceSystem:claim16
  type: observation
  statement: 'The in/out distinction is not the same as true/false. A four-element
    belief state is needed: P in and neg-P out (true), P out and neg-P in (false),
    both out (unknown), both in (contradictory). Three-valued systems cannot represent
    the contradictory state.

    '
  concepts:
  - support_status
  - contradiction_handling
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 238
    section: Reasons for beliefs
- id: Doyle_1979_TruthMaintenanceSystem:claim17
  type: observation
  statement: 'The backtracker operates on the reasons for beliefs rather than on the
    form or content of beliefs, making it the least specialized procedure for revising
    assumptions when inconsistencies are discovered.

    '
  concepts:
  - dependency_directed_backtracking
  - belief_revision
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 235
    section: Reasoned assumptions
- id: Doyle_1979_TruthMaintenanceSystem:claim18
  type: observation
  statement: 'Recording justifications for every program belief prevents the need
    to continually rederive information during large searches caused by changing irrelevant
    assumptions. Discarding derivation sources makes error correction in large evolving
    databases impossible.

    '
  concepts:
  - justification
  - truth_maintenance_system
  provenance:
    paper: Doyle_1979_TruthMaintenanceSystem
    page: 269
    section: Conclusions
