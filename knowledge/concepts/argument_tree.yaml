id: concept461
canonical_name: argument_tree
status: proposed
definition: A finite tree of arguments where the root is an argument for a claim,
  children are canonical undercuts of their parent, and no node's support is a subset
  of its ancestors' combined support; provides exhaustive enumeration of all lines
  of counter-argumentation
domain: argumentation
created_date: '2026-03-24'
form: structural
