id: concept453
canonical_name: burden_based_semantics
status: proposed
definition: A ranking-based semantics for abstract argumentation that iteratively
  computes a burden score for each argument starting from 1+|attackers|, converging
  to a fixed point where lower burden indicates higher acceptability, introduced by
  Amgoud and Ben-Naim (2013)
domain: argumentation
created_date: '2026-03-24'
form: structural
