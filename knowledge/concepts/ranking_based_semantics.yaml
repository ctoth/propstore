id: concept448
canonical_name: ranking_based_semantics
status: proposed
definition: A function that maps an argumentation framework to a total preorder (ranking)
  over its arguments, ordering them from most to least acceptable, providing finer-grained
  evaluation than extension-based semantics which only classify arguments as accepted
  or rejected
domain: argumentation
created_date: '2026-03-24'
form: structural
