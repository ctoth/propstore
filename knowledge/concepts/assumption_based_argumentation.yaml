canonical_name: assumption_based_argumentation
status: proposed
definition: A formal argumentation framework where arguments are built from rules
  and assumptions, with attacks derived from contraries of assumptions; instances
  include ABA (Bondarenko et al. 1997) where acceptability is defined over sets of
  assumptions rather than arguments
