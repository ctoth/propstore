source:
  paper: test_paper_alpha

claims:
  # 1. CONFLICT: two parameter claims, same concept (concept1),
  #    SAME conditions, DIFFERENT values
  - id: claim1
    type: parameter
    concept: concept1
    value: [200.0]
    unit: Hz
    conditions:
      - "task == 'speech'"
    provenance:
      paper: test_paper_alpha
      page: 5

  - id: claim2
    type: parameter
    concept: concept1
    value: [350.0]
    unit: Hz
    conditions:
      - "task == 'speech'"
    provenance:
      paper: test_paper_alpha
      page: 8
      table: "Table 2"

  # 2. PHI-NODE: same concept (concept1), DIFFERENT conditions, different values
  - id: claim3
    type: parameter
    concept: concept1
    value: [180.0]
    unit: Hz
    conditions:
      - "task == 'singing'"
    provenance:
      paper: test_paper_alpha
      page: 12

  # 3. COMPATIBLE: same concept (concept2), same conditions, SAME value
  - id: claim4
    type: parameter
    concept: concept2
    value: [800.0]
    unit: Pa
    conditions:
      - "task == 'speech'"
    provenance:
      paper: test_paper_alpha
      page: 15

  # 4. An observation claim
  - id: claim5
    type: observation
    statement: >
      Fundamental frequency increases with subglottal pressure
      in a roughly logarithmic relationship.
    concepts:
      - concept1
      - concept2
    provenance:
      paper: test_paper_alpha
      page: 20
      section: "Discussion"
