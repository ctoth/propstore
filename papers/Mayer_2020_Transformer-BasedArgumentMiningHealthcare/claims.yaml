- id: claim11
  type: equation
  expression: "P_i = \\frac{e^{V \\cdot C_i}}{\\sum_{j=1}^{n} e^{V \\cdot C_j}}"
  sympy: "exp(V * C_i) / Sum(exp(V * C_j), (j, 1, n))"
  variables:
    - symbol: "V"
      concept: trainable_weight_vector
      role: "parameter"
    - symbol: "C_i"
      concept: choice_vector_representation
      role: "independent"
    - symbol: "P_i"
      concept: choice_probability
      role: "dependent"
    - symbol: "n"
      concept: number_of_choices
      role: "parameter"
  provenance:
    paper: Mayer_2020_Transformer-BasedArgumentMiningHealthcare
    page: 6
    section: "4.2 Relation Classification"
    quote_fragment: "The probability distribution over all possible choices is given by the softmax"
  notes: "MultiChoice architecture softmax over link candidates. H is hidden size of encoder output (768 for BERT base)."

- id: claim12
  type: observation
  statement: "SciBERT with GRU+CRF achieves the best performance for argument component detection in clinical trial abstracts, outperforming general-domain BERT variants."
  concepts:
    - argument_component_detection
    - domain_adapted_transformers
  provenance:
    paper: Mayer_2020_Transformer-BasedArgumentMiningHealthcare
    page: 7
    section: "5 Results"
    quote_fragment: "SciBERT slightly better for sentence classification tasks"
  conditions:
    - "domain == 'clinical_trials'"

- id: claim13
  type: observation
  statement: "RoBERTa shows more stable cross-domain performance than SciBERT for relation classification, dropping only 0.01 F1 on out-of-domain test sets versus SciBERT's 0.06 drop."
  concepts:
    - cross_domain_generalization
    - relation_classification
  provenance:
    paper: Mayer_2020_Transformer-BasedArgumentMiningHealthcare
    page: 8
    section: "5 Results"
    quote_fragment: "RoBERTa stays almost the same and only drops from .67 to .66 F1-score"

- id: claim14
  type: observation
  statement: "The SentClf architecture achieves slightly higher F1 than MultiChoice but produces more false positive links, since it classifies each component pair independently and does not respect the single-outgoing-edge constraint."
  concepts:
    - relation_classification
    - false_positive_rate
  provenance:
    paper: Mayer_2020_Transformer-BasedArgumentMiningHealthcare
    page: 8
    section: "5 Results"
    quote_fragment: "SentClf delivers slightly better results, but the drawback is that this technique tends to link components to multiple components"

- id: claim15
  type: observation
  statement: "The MultiChoice architecture loses predictive power when the number of argument components rises to the double-digit range, limiting its applicability to full-text articles."
  concepts:
    - relation_classification
    - scalability
  provenance:
    paper: Mayer_2020_Transformer-BasedArgumentMiningHealthcare
    page: 8
    section: "5 Results"
    quote_fragment: "with the number of components rising in the double-digit range, the multiple-choice architecture loses its predictive power"
  notes: "Authors note increased false positives in relation classification on full articles"

- id: claim16
  type: observation
  statement: "Polarity of medical measurements cannot be learned from textual features alone; external expert knowledge is needed to determine whether increasing or decreasing a measurement value is beneficial."
  concepts:
    - measurement_polarity
    - external_knowledge
  provenance:
    paper: Mayer_2020_Transformer-BasedArgumentMiningHealthcare
    page: 8
    section: "Error Analysis"
    quote_fragment: "The polarity of a measurement cannot be learnt from textual features alone"
  notes: "Example: 'increased blood pressure' can be positive or negative depending on context"

- id: claim17
  type: observation
  statement: "Fine-tuned transformer models significantly outperform static word embeddings (GloVe, fastText, BPEmb) for argument component detection in clinical text."
  concepts:
    - argument_component_detection
    - transformer_embeddings
  provenance:
    paper: Mayer_2020_Transformer-BasedArgumentMiningHealthcare
    page: 7
    section: "5 Results"
    table: "Table 2"

- id: claim18
  type: observation
  statement: "BIO sequence tagging scheme is necessary for argument component detection because adjacent components would merge into a single component without it, but creates B-token vs I-token class imbalance."
  concepts:
    - sequence_tagging
    - bio_scheme
  provenance:
    paper: Mayer_2020_Transformer-BasedArgumentMiningHealthcare
    page: 8
    section: "Error Analysis"
    quote_fragment: "Training the sequence tagging without the BIO scheme using only claim and evidence as labels, poses problems when multiple components are following each other"
