source:
  paper: McAllester_1978_ThreeValuedTMS
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"

claims:
  - id: claim1
    type: observation
    statement: >
      Each proposition in the three-valued TMS has three truth states: true, false,
      and unknown. This eliminates the need for separate negation nodes required
      by two-valued systems like Doyle's TMS.
    concepts:
      - three_valued_logic
      - truth_maintenance_system
      - support_status
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 4
      section: "Introduction"

  - id: claim2
    type: observation
    statement: >
      All logical relations between propositions are represented as disjunctive
      clauses in conjunctive normal form. An implication P1 ^ P2 ^ P3 -> Q
      becomes (-P1 v -P2 v -P3 v Q), eliminating the distinction between
      antecedents and consequences.
    concepts:
      - disjunctive_clause
      - three_valued_logic
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 3
      section: "Introduction"

  - id: claim3
    type: observation
    statement: >
      The same clause used to deduce a consequent can also deduce the negation
      of antecedents leading to contradictions. This symmetric deduction eliminates
      much of the backtracking mechanisms present in other truth maintenance systems.
    concepts:
      - disjunctive_clause
      - dependency_directed_backtracking
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 3
      section: "Introduction"

  - id: claim4
    type: observation
    statement: >
      Only one-step clause deductions are performed: when a clause has exactly
      one unknown term remaining (PSAT = 1), that term's value is forced.
      Multi-clause resolution is not attempted, avoiding NP-complete
      satisfiability checking.
    concepts:
      - unit_propagation
      - disjunctive_clause
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 7
      section: "Removing truth values"

  - id: claim5
    type: observation
    statement: >
      A contradiction occurs when a clause has PSAT = 0, meaning all its terms
      are false. When this happens, a new clause is generated by resolving the
      contradicting clause with its supporting clauses, enabling deduction of
      the opposite truth value.
    concepts:
      - contradiction_resolution
      - disjunctive_clause
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 9
      section: "Contradiction handling"

  - id: claim6
    type: observation
    statement: >
      Contradictions can only arise from the addition of truth values, not from
      clause addition alone, since in a quiescent state all possible one-step
      deductions have already been made.
    concepts:
      - contradiction_resolution
      - unit_propagation
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 9
      section: "Contradiction handling"

  - id: claim7
    type: observation
    statement: >
      Rather than physically deleting clauses, a validity node is added to each
      clause. Setting the validity node to false effectively removes the clause.
      This also serves as a provenance device for tracking clause origins.
    concepts:
      - clause_validity
      - disjunctive_clause
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 13
      section: "Default values"

  - id: claim8
    type: observation
    statement: >
      The backtracking algorithm selects the default assumption with the minimum
      maximum distance from the contradiction for retraction, ensuring implied
      assumptions further in the support chain are retracted before the
      assumptions they depend on.
    concepts:
      - dependency_directed_backtracking
      - default_assumption
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 13
      section: "Default values"

  - id: claim9
    type: observation
    statement: >
      Assumptions can depend on other assumptions through clause validity nodes,
      enabling hierarchies of assumptions where retracting a base assumption
      cascades to dependent assumptions.
    concepts:
      - assumption
      - clause_validity
      - default_assumption
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 13
      section: "Default values"

  - id: claim10
    type: observation
    statement: >
      A node can never transition directly from true to false or vice versa;
      it must pass through the unknown state. Truth values can only be added
      to nodes that are currently unknown.
    concepts:
      - three_valued_logic
      - support_status
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 5
      section: "Deduction"

  - id: claim11
    type: observation
    statement: >
      Support tracing is always well-founded: supports are premises or clauses,
      never circular. Since support is assigned when a truth value is added and
      truth values can only be added to unknown nodes, the support chain
      cannot loop.
    concepts:
      - well_founded_justification
      - three_valued_logic
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 7
      section: "Removing truth values"

  - id: claim12
    type: observation
    statement: >
      Doyle's TMS uses non-monotonic dependency structures where truth of a node
      can depend on another node being unknown. McAllester's system achieves
      similar non-monotonic power through defaults and clause-based contradiction
      resolution without non-monotonic dependencies.
    concepts:
      - non_monotonic_reasoning
      - truth_maintenance_system
      - default_assumption
      - contradiction_resolution
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 16
      section: "Comparison with other work"

  - id: claim13
    type: observation
    statement: >
      In the three-valued TMS, a contradiction is simply a clause that cannot be
      satisfied (PSAT = 0), which directly allows deduction of opposite truth
      values. No separate contradiction nodes, NOGOOD lists, or per-pair mutual
      exclusion justifications are needed.
    concepts:
      - contradiction_resolution
      - disjunctive_clause
      - nogood
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 16
      section: "Comparison with other work"

  - id: claim14
    type: observation
    statement: >
      Removing a truth value cascades to all truth values that critically
      depend on it. After removal, nodes with default values that were removed
      are re-checked for possible default re-assertion.
    concepts:
      - belief_revision
      - default_assumption
      - three_valued_logic
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 7
      section: "Removing truth values"
