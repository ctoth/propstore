source:
  paper: McAllester_1978_ThreeValuedTMS
  extraction_model: "claude-opus-4-6"
  extraction_date: "2026-03-17"

claims:
  - id: claim1
    type: observation
    statement: "Each proposition in the TMS has exactly three possible truth states: true, false, and unknown, eliminating the need for separate negation nodes."
    concepts:
      - three_valued_logic
      - truth_maintenance
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 4
      section: "Introduction"
      quote_fragment: "the three more intuitive truth states of true, false, and unknown"

  - id: claim2
    type: observation
    statement: "All logical relations between propositions are represented as disjunctive clauses in conjunctive normal form, making the distinction between antecedents and consequents disappear."
    concepts:
      - clause_representation
      - conjunctive_normal_form
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 3
      section: "Introduction"
      quote_fragment: "the negation of an antecedent in the implication can be as easily deduced as the consequent"

  - id: claim3
    type: observation
    statement: "A contradiction is detected when a clause has PSAT = 0, meaning all terms in the clause are false and no truth value assignment can satisfy it."
    concepts:
      - contradiction_detection
      - clause_satisfiability
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 9
      section: "Contradictions"
      quote_fragment: "a clause is in contradiction with the rest of the data base"

  - id: claim4
    type: observation
    statement: "When a contradiction arises, a new clause is generated by resolving the contradicting clause with the supporting clauses of the truth values that caused the contradiction, enabling future avoidance of the same contradiction."
    concepts:
      - clause_generation
      - contradiction_resolution
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 10
      section: "Contradictions"
      quote_fragment: "it is possible to add new clauses that allow deductions based upon this fact"

  - id: claim5
    type: observation
    statement: "Only one-step clause deductions are performed (when PSAT = 1 and one unknown node remains) to avoid NP-complete satisfiability checking."
    concepts:
      - unit_propagation
      - computational_complexity
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 7
      section: "The Algorithm"
      quote_fragment: "in order to avoid such a combinatorial explosion I restrict myself to one clause deductions"

  - id: claim6
    type: observation
    statement: "Truth values are removed by recursively removing all truth values that critically depend on the removed value, then re-checking for possible deductions from other remaining clauses."
    concepts:
      - truth_value_removal
      - dependency_tracking
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 7
      section: "Removing Truth Values"
      quote_fragment: "first recursively remove all candidates for removal therefore removing all truth values that critically depend on them"

  - id: claim7
    type: observation
    statement: "Dependency-directed backtracking resolves contradictions by selecting the default assumption with the minimum maximum distance from the contradiction and removing it."
    concepts:
      - dependency_directed_backtracking
      - assumption_selection
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 13
      section: "Default Values and Backtracking"
      quote_fragment: "choosing for removal the default value with the minimum maximum distance from the contradiction"

  - id: claim8
    type: observation
    statement: "A node can never transition directly from true to false or vice versa; it must pass through the unknown state."
    concepts:
      - truth_state_transitions
      - three_valued_logic
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 19
      section: "Appendix I"
      quote_fragment: "The node can never go directly from being true to being false, or vice-versa, it must first pass through a state of being unknown"

  - id: claim9
    type: observation
    statement: "Assumptions are represented as default truth values on nodes; when a default value leads to a contradiction, the TMS automatically retracts it and deduces the opposite value."
    concepts:
      - default_reasoning
      - assumption_retraction
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 12
      section: "Default Values and Backtracking"
      quote_fragment: "When a contradiction is present in the data base an attempt is made to remove it by removing default truth values"

  - id: claim10
    type: observation
    statement: "The three-valued TMS achieves the non-monotonic power of Doyle's system in a simpler form, but does not implement conditional proofs."
    concepts:
      - nonmonotonic_reasoning
      - conditional_proof
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 16
      section: "Comparison with Other Work"
      quote_fragment: "I believe that this mechanism has most of the non-monotonic power of Doyle's system, but in a much simpler form"

  - id: claim11
    type: model
    name: "Three-Valued TMS Clause Deduction"
    equations:
      - "PSAT(clause) = count of terms that could potentially satisfy the clause"
      - "If PSAT = 1 and one UNKNOWN node exists, deduce that node's value"
      - "If PSAT = 0, clause is a contradiction"
    parameters:
      - name: "PSAT"
        concept: "potential_satisfiers_count"
        note: "Decremented when a term becomes false, incremented when a term becomes unknown"
    provenance:
      paper: McAllester_1978_ThreeValuedTMS
      page: 5
      section: "Adding Clauses and Truth Values"
