source:
  paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"

claims:
  - id: claim1
    type: observation
    statement: >
      An argumentation system is a triple AS = (L, R, n) where L is a logical
      language closed under negation, R is partitioned into strict rules (Rs)
      and defeasible rules (Rd), and n is a naming function for defeasible rules.
    concepts:
      - argumentation_system
      - strict_rule
      - defeasible_rule
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 35
      section: "Definition 3.1"

  - id: claim2
    type: observation
    statement: >
      Arguments in ASPIC+ are recursively constructed from premises and
      inference rules, with functions for premises (Prem), conclusion (Conc),
      sub-arguments (Sub), defeasible rules used (DefRules), and top rule
      (TopRule).
    concepts:
      - structured_argument
      - argumentation_system
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 36
      section: "Definition 3.6"

  - id: claim3
    type: observation
    statement: >
      ASPIC+ defines three types of attack: undermining (attacking an ordinary
      premise), rebutting (attacking a defeasibly-derived conclusion), and
      undercutting (attacking the applicability of a defeasible inference rule).
    concepts:
      - undermining_attack
      - rebutting_attack
      - undercutting_attack
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 38
      section: "Definition 3.10"

  - id: claim4
    type: observation
    statement: >
      Undercutting attacks always succeed as defeats regardless of preferences,
      while undermining and rebutting attacks succeed only when the attacked
      sub-argument is not strictly preferred to the attacker.
    concepts:
      - undercutting_attack
      - preference_ordering
      - undermining_attack
      - rebutting_attack
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 40
      section: "Definition 3.12"

  - id: claim5
    type: observation
    statement: >
      A firm and strict argument (one using only necessary premises and strict
      rules) has no attackers in ASPIC+.
    concepts:
      - structured_argument
      - strict_rule
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 38
      section: "Section 3"

  - id: claim6
    type: observation
    statement: >
      ASPIC+ generates a Dung-style abstract argumentation framework from
      a structured argumentation framework by taking the defeat relation
      derived from attacks and preferences, then applies Dung's semantics
      to determine justified arguments.
    concepts:
      - argumentation_framework
      - structured_argument
      - preference_ordering
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 41
      section: "Definition 3.16"

  - id: claim7
    type: observation
    statement: >
      ASPIC+ satisfies four rationality postulates (sub-argument closure,
      closure under strict rules, direct consistency, indirect consistency)
      when the argumentation system is closed under transposition, axioms are
      consistent, and preferences are reasonable.
    concepts:
      - rationality_postulate
      - transposition_closure
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 49
      section: "Section 4.2"

  - id: claim8
    type: observation
    statement: >
      An argumentation theory is closed under transposition iff for every
      strict rule with antecedents and consequent, all transpositions
      (swapping an antecedent with the negation of the consequent) are
      also strict rules in the system.
    concepts:
      - transposition_closure
      - strict_rule
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 46
      section: "Definition 4.3"

  - id: claim9
    type: observation
    statement: >
      If strict rules are not closed under transposition, extensions can be
      inconsistent because arguments that should have counter-arguments may
      lack them.
    concepts:
      - transposition_closure
      - rationality_postulate
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 49
      section: "Example 4.4"

  - id: claim10
    type: observation
    statement: >
      Walton-style argument schemes can be modeled in ASPIC+ as defeasible
      inference rules, with critical questions mapping to attack types:
      assumption-challenging questions generate undermining attacks,
      conclusion-challenging questions generate rebutting attacks, and
      exception questions generate undercutting attacks.
    concepts:
      - argument_scheme
      - defeasible_rule
      - undermining_attack
      - rebutting_attack
      - undercutting_attack
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 50
      section: "Section 4.3"

  - id: claim11
    type: observation
    statement: >
      The last-link ordering compares only the last defeasible rules applied
      and is appropriate for legal and normative reasoning, while the
      weakest-link ordering compares all defeasible rules and premises and
      is appropriate for epistemic reasoning.
    concepts:
      - preference_ordering
      - defeasible_rule
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 43
      section: "Section 3"

  - id: claim12
    type: observation
    statement: >
      ASPIC+ without defeasible rules (all rules strict, all formulas as
      ordinary premises, conflict resolved through premise preferences)
      corresponds to Brewka's Preferred Subtheories.
    concepts:
      - strict_rule
      - preference_ordering
      - argumentation_system
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 55
      section: "Section 4.5"

  - id: claim13
    type: observation
    statement: >
      Dung's abstract argumentation treats arguments as atomic with no internal
      structure; real argumentation requires structured arguments built from
      premises and inference rules with different types of attack targeting
      different components.
    concepts:
      - argumentation_framework
      - structured_argument
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 31
      section: "Introduction"

  - id: claim14
    type: observation
    statement: >
      Prior structured argumentation formalisms could violate basic rationality
      requirements such as consistency of extensions and closure under strict
      rules, motivating ASPIC+'s design to satisfy these postulates.
    concepts:
      - rationality_postulate
      - structured_argument
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 32
      section: "Introduction"

  - id: claim15
    type: observation
    statement: >
      The general ASPIC+ framework replaces ordinary negation with a
      contrariness function allowing asymmetric conflict relations, where
      contrary-based attacks always succeed like undercutting and
      contradictory-based attacks are preference-dependent.
    concepts:
      - argumentation_system
      - undercutting_attack
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 57
      section: "Section 5"

  - id: claim16
    type: observation
    statement: >
      A knowledge base is partitioned into necessary premises (axioms, cannot
      be attacked) and ordinary premises (can be attacked via undermining),
      reflecting different levels of commitment to the truth of propositions.
    concepts:
      - argumentation_system
      - undermining_attack
    provenance:
      paper: Modgil_2014_ASPICFrameworkStructuredArgumentation
      page: 35
      section: "Definition 3.3"
