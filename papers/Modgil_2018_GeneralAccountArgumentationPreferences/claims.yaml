source:
  paper: Modgil_2018_GeneralAccountArgumentationPreferences
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"

claims:
  - id: claim1
    type: observation
    statement: >
      The standard defeat-based conflict-free definition in ASPIC+ should be
      replaced with an attack-based conflict-free definition where no argument
      in the set attacks another, which is strictly stronger and enables all
      four rationality postulates to hold without additional assumptions.
    concepts:
      - attack_based_conflict_free
      - rationality_postulate
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 14
      section: "Definition 14"

  - id: claim2
    type: observation
    statement: >
      Under attack-based conflict-free with reasonable orderings and
      well-defined c-SAFs, ASPIC+ satisfies sub-argument closure: every
      sub-argument of a justified argument is also justified.
    concepts:
      - rationality_postulate
      - attack_based_conflict_free
      - structured_argument
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 18
      section: "Theorem 12"

  - id: claim3
    type: observation
    statement: >
      Under attack-based conflict-free with reasonable orderings and
      well-defined c-SAFs, ASPIC+ satisfies closure under strict rules:
      conclusions derivable by strict rules from justified conclusions
      are also justified.
    concepts:
      - rationality_postulate
      - strict_rule
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 18
      section: "Theorem 13"

  - id: claim4
    type: observation
    statement: >
      Under attack-based conflict-free with reasonable orderings and
      well-defined c-SAFs, ASPIC+ satisfies direct consistency: the
      conclusions of any complete extension are consistent.
    concepts:
      - rationality_postulate
      - attack_based_conflict_free
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 18
      section: "Theorem 14"

  - id: claim5
    type: observation
    statement: >
      Under attack-based conflict-free with reasonable orderings and
      well-defined c-SAFs, ASPIC+ satisfies indirect consistency: the
      closure under strict rules of any complete extension's conclusions
      is consistent.
    concepts:
      - rationality_postulate
      - strict_rule
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 19
      section: "Theorem 15"

  - id: claim6
    type: observation
    statement: >
      A preference ordering on arguments is reasonable iff strict-firm
      arguments are always strictly preferred to plausible or defeasible
      arguments, strict-firm arguments are never strictly less preferred
      than any argument, and strict continuation preserves preference status.
    concepts:
      - reasonable_ordering
      - structured_argument
      - preference_ordering
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 16
      section: "Definition 18"

  - id: claim7
    type: observation
    statement: >
      Both the last-link and weakest-link preference principles, under both
      Elitist and Democratic set comparisons, produce reasonable argument
      orderings.
    concepts:
      - reasonable_ordering
      - preference_ordering
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 22
      section: "Propositions 19-24"

  - id: claim8
    type: observation
    statement: >
      The general ASPIC+ framework uses a contrariness function mapping
      formulas to sets of contraries (asymmetric conflict) and
      contradictories (symmetric conflict), generalizing beyond classical
      negation.
    concepts:
      - contrariness_function
      - argumentation_system
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 8
      section: "Definition 2"

  - id: claim9
    type: observation
    statement: >
      Stable extensions of classical-logic c-SAFs with preferences
      correspond exactly to Brewka's preferred subtheories, establishing
      that ASPIC+ subsumes this well-known nonmonotonic formalism.
    concepts:
      - stable_extension
      - argumentation_system
      - preference_ordering
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 29
      section: "Theorem 31"

  - id: claim10
    type: observation
    statement: >
      Under the paper's assumptions, attack-based and defeat-based
      conflict-free definitions yield the same extensions for all standard
      Dung semantics (complete, preferred, grounded, stable).
    concepts:
      - attack_based_conflict_free
      - preferred_extension
      - stable_extension
      - grounded_extension
      - complete_extension
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 19
      section: "Proposition 16"

  - id: claim11
    type: observation
    statement: >
      Dung's fundamental lemma holds for c-SAFs under reasonable orderings,
      ensuring admissible extensions form a complete partial order and
      every admissible set can be extended to a preferred extension.
    concepts:
      - admissible_set
      - preferred_extension
      - reasonable_ordering
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 17
      section: "Propositions 9-11"

  - id: claim12
    type: observation
    statement: >
      Attacks should only target fallible elements of an argument: ordinary
      premises (via undermining) or defeasible inference steps (via rebutting
      or undercutting). Conclusions derived purely by strict rules from
      axiom premises cannot be attacked.
    concepts:
      - undermining_attack
      - rebutting_attack
      - undercutting_attack
      - structured_argument
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 5
      section: "Section 2"

  - id: claim13
    type: observation
    statement: >
      ASPIC+ can be instantiated with Amgoud and Besnard's abstract logic
      approach, with premise-minimal ASPIC+ arguments corresponding to
      abstract logic arguments and extensions coinciding.
    concepts:
      - argumentation_system
      - structured_argument
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 25
      section: "Propositions 25-27"

  - id: claim14
    type: observation
    statement: >
      The weakest-link preference principle corrects an anomaly in Prakken
      2010 where premises and defeasible rules were treated asymmetrically;
      the revised definition requires both premises and rules to be compared.
    concepts:
      - preference_ordering
      - defeasible_rule
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 21
      section: "Definition 21"

  - id: claim15
    type: observation
    statement: >
      ASPIC+'s sub-argument structure with attacks on sub-arguments prevents
      the inconsistent extensions that flat preference-based argumentation
      frameworks can produce, because attacking sub-arguments provides
      preference-independent attack paths.
    concepts:
      - structured_argument
      - rationality_postulate
      - preference_ordering
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 32
      section: "Section 6.2"

  - id: claim16
    type: observation
    statement: >
      Attacks serve two distinct roles: encoding mutual incompatibility
      of information (declarative role) and determining which arguments
      prevail (procedural role through preference-based defeat).
    concepts:
      - attack_relation
      - preference_ordering
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 5
      section: "Section 2"

  - id: claim17
    type: observation
    statement: >
      A well-defined structured argumentation framework requires axiom
      consistency, well-formedness, and closure under either contraposition
      or transposition of strict rules.
    concepts:
      - argumentation_system
      - transposition_closure
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 13
      section: "Definition 12"

  - id: claim18
    type: observation
    statement: >
      For classical-logic c-SAFs without preferences, preferred and stable
      extensions correspond to maximal consistent subsets of the knowledge
      base.
    concepts:
      - preferred_extension
      - stable_extension
      - argumentation_system
    provenance:
      paper: Modgil_2018_GeneralAccountArgumentationPreferences
      page: 27
      section: "Section 5.3"
