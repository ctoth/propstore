  - id: baumann2019-harper-identity-fails
    type: impossibility_result
    confidence: high
    text: >
      The Harper Identity — which in classical AGM allows constructing a contraction
      operator from a given revision operator (K - A = K * ~A intersect K) — does not
      hold for Dung logics. There is no analog that allows deriving contraction from
      revision in the AF setting.
    context: "Main negative result of the paper"
    significance: >
      Contraction and revision are more independent for AFs than in classical AGM.
      Systems implementing AF dynamics cannot simply derive contraction from revision.
    tags: ["Harper-Identity", "impossibility", "contraction", "revision"]

  - id: baumann2019-no-unrestricted-contraction
    type: impossibility_result
    confidence: high
    text: >
      There is no unrestricted existence of contraction operators satisfying all six
      AGM contraction postulates (closure, inclusion, vacuity, success, extensionality,
      recovery) for Dung argumentation frameworks.
    context: "Consequence of Harper Identity failure"
    significance: >
      Full AGM contraction is impossible for AFs. Any implementation must weaken
      at least one postulate.
    tags: ["AGM", "contraction", "impossibility", "recovery"]

  - id: baumann2019-recovery-free-contraction-exists
    type: existence_result
    confidence: high
    text: >
      Dropping the recovery postulate (which requires that K subset (K - A) + A)
      restores the existence of well-behaved contraction operators for Dung AFs
      satisfying all remaining AGM postulates.
    context: "Main positive result"
    significance: >
      Recovery-free contraction is the feasible form of AF contraction.
      The recovery postulate is independently controversial in AGM theory
      (Hansson 1989).
    cites: ["Hansson 1989"]
    tags: ["contraction", "recovery-postulate", "existence"]

