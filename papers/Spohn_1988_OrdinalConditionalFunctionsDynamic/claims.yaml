claims:
  - id: claim1
    type: observation
    statement: "An ordinal conditional function (OCF) is a function kappa from propositions to ordinals satisfying kappa(empty)=Omega, kappa(W)=0, and kappa(A)=min{kappa(w)|w in A} for non-empty A."
    concepts:
      - belief_state
      - iterated_belief_revision
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 115
      section: "6. Ordinal Conditional Functions"
      quote_fragment: "we call it an n-minimal ordinal conditional function (A-OCF), if and only if n is a function from W into the class of ordinals such that kappa(empty set) = Omega and for all atoms... kappa(A) = min{kappa(w) | w in A}"

  - id: claim2
    type: observation
    statement: "Simple conditional functions (SCFs) are not closed under conditionalization because A-conditionalization deletes empty terms from the well-ordered partition, making epistemic changes irreversible."
    concepts:
      - belief_state
      - belief_revision_function
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 112
      section: "3. A Problem with Simple Conditional Functions"
      quote_fragment: "empty terms still have to be deleted... this proposal does not fare better with respect to the reversibility and commutativity of epistemic changes"

  - id: claim3
    type: mechanism
    statement: "A_n-conditionalization updates an OCF by shifting the disbelief of A-worlds down by min(kappa(A),n) and Abar-worlds down by min(kappa(Abar),n), where the firmness parameter n controls how firmly A is accepted. This preserves internal structure within both the A-part and the Abar-part while changing only their relative positions."
    concepts:
      - belief_revision_function
      - belief_state
      - iterated_belief_revision
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 117
      section: "6. Ordinal Conditional Functions"
      quote_fragment: "kappa_{A,n}(w) = kappa(w) - min(kappa(A), n) if w in A, kappa(w) - min(kappa(Abar), n) if w in Abar"

  - id: claim4
    type: observation
    statement: "A_n-conditionalization of OCFs is commutative: the order in which two propositions A and B are learned does not affect the resulting epistemic state, provided the firmness parameters are the same."
    concepts:
      - belief_revision_function
      - iterated_belief_revision
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 118
      section: "6. Ordinal Conditional Functions"
      quote_fragment: "Theorem 3. Let kappa be an A-OCF and kappa(A) = 0 and kappa(Abar) = beta. Then we have (kappa_{A,alpha})_{B,beta} = (kappa_{B,beta})_{A,alpha}"

  - id: claim5
    type: observation
    statement: "The class of all OCFs is closed under A_n-conditionalization, unlike simple conditional functions which lose information when empty terms are deleted."
    concepts:
      - belief_state
      - belief_revision_function
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 115
      section: "6. Ordinal Conditional Functions"
      quote_fragment: "It is obvious that OCFs generalize WOPs and thus SCFs. The measurability condition is also obvious; it demands that a set of OCFs does not discriminate possible worlds which are not discriminated"

  - id: claim6
    type: observation
    statement: "Independence for OCFs parallels probabilistic independence: A is independent of B with respect to kappa iff kappa(A intersection C) = kappa(A) + kappa(C) for all atoms C of B."
    concepts:
      - belief_state
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 120
      section: "6. Independence and Conditional Independence"
      quote_fragment: "Definition 8. A is independent of B with respect to kappa iff for all atoms C of B... kappa(A intersection C) = kappa(A) + kappa(C)"

  - id: claim7
    type: observation
    statement: "Independence in OCFs is symmetric: A is independent of B with respect to kappa if and only if B is independent of A with respect to kappa."
    concepts:
      - belief_state
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 121
      section: "6. Independence and Conditional Independence"
      quote_fragment: "Theorem 8. The following three assertions are equivalent"

  - id: claim8
    type: observation
    statement: "Conditional independence for OCFs parallels probabilistic conditional independence: A is conditionally independent of B given D iff for all atoms C of B and D_j of D, kappa(A intersection C | D_j) = kappa(A | D_j) + kappa(C | D_j)."
    concepts:
      - belief_state
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 123
      section: "6. Independence and Conditional Independence"
      quote_fragment: "Definition 10. Let B and C be two complete subfields of A, and A a member of A(empty). Then C is independent of B conditional on A"

  - id: claim9
    type: mechanism
    statement: "OCFs are the qualitative counterpart of probability measures: there exists a homomorphism from nonstandard probability measures to OCFs that preserves the additive structure, with OCF disbelief grades corresponding to orders of infinitesimal probability."
    concepts:
      - belief_state
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 125
      section: "7. Connections with Probability Theory"
      quote_fragment: "we have thereby defined a homomorphism from a class of nonstandard probability measures onto the class of (nonstandard) OCFs which maps first, addition of probabilities into taking the minimum of OCF-values"

  - id: claim10
    type: comparison
    statement: "Unlike Gardenfors (1984) belief sets which track only accepted/rejected propositions, OCFs assign ordinal disbelief grades to every proposition, providing the fine-grained epistemic state structure needed for iterated revision that belief sets cannot capture."
    concepts:
      - belief_state
      - iterated_belief_revision
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 129
      section: "8. Discussion"
      quote_fragment: "Gardenfors' approach therefore seems to me to provide only a restricted solution to our problem"

  - id: claim11
    type: comparison
    statement: "Unlike standard probability theory where conditioning on zero-probability events is undefined, OCFs handle this naturally since kappa(A)=0 means A is most plausible (not certain), and conditionalization is always well-defined."
    concepts:
      - belief_state
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 125
      section: "7. Connections with Probability Theory"
      quote_fragment: "the problem that we could say nothing about the new net content resulting from information incompatible with the old net content; this problem induced us to introduce the SCFs"

  - id: claim12
    type: observation
    statement: "Shackle's functions of potential surprise (FPSs) are equivalent to OCFs up to displacement: FPS axioms y(empty)=1, y(A)=0 or y(Abar)=0, y(A union B)=min(y(A),y(B)) are identical to OCF Theorem 2 conditions."
    concepts:
      - belief_state
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 129
      section: "8. Discussion"
      quote_fragment: "our degrees of disbelief seem more or less identical with the degrees of potential surprise in Shackle (1969). Indeed, the similarity is amazing"

  - id: claim13
    type: limitation
    statement: "OCFs operate only at the first-order epistemic level (beliefs about propositions), not at the higher-order level (beliefs about beliefs); the paper explicitly defers higher-order epistemic states."
    concepts:
      - belief_state
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 109
      section: "2. Simple Conditional Functions"
      quote_fragment: "I shall only try to do is to turn what appears to be a partially undetermined process on the surface level of the net contents of epistemic states into a completely determined process on some suitable deeper level"

  - id: claim14
    type: limitation
    statement: "The paper does not provide a formal language for conditional sentences (propositions whose truth depends on the epistemic state), identifying this as an important open direction."
    concepts:
      - belief_state
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 128
      section: "8. Discussion"
      quote_fragment: "A second related idea is to enrich the language in which propositions are expressed by a conditional and thus by conditional sentences"

  - id: claim15
    type: observation
    statement: "Each well-ordered partition (WOP) corresponds to exactly one simple conditional function (SCF) and vice versa, establishing a bijection between these two representations of epistemic states."
    concepts:
      - belief_state
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 110
      section: "2. Simple Conditional Functions"
      quote_fragment: "Theorem 1. Each SCF is represented by exactly one WOP, and each WOP represents exactly one SCF"

  - id: claim16
    type: mechanism
    statement: "Generalized conditionalization (lambda-conditionalization) handles learning an entire partition rather than a single proposition, by specifying new disbelief grades for each element of the partition. The measurable coarsening property ensures that marginalizing over the partition recovers the original conditional structure."
    concepts:
      - belief_revision_function
      - belief_state
    provenance:
      paper: Spohn_1988_OrdinalConditionalFunctionsDynamic
      page: 119
      section: "5. Conditionalization and Generalized Conditionalization"
      quote_fragment: "Theorem 5. Let kappa be an A-OCF, A a member of A(Omega,W), and lambda that A-OCF for which (kappa,lambda,A,W) - measurable coarsening"
