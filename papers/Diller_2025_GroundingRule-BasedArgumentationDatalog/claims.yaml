claims:
  - id: claim1
    type: observation
    statement: "Translating a first-order ASPIC+ argumentation theory into a Datalog program and querying its minimal model yields exactly the ground substitutions needed to instantiate rules while preserving the complete extensions of the original theory."
    concepts:
      - argumentation_theory
      - datalog_program
      - grounding_procedure
      - complete_extension
      - ground_substitution
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 4
      section: "Transformation 1"
      quote_fragment: "the grounded and propositional argumentation theory has the same complete extensions"

  - id: claim2
    type: observation
    statement: "Non-approximated predicates — those whose ground instances are fully determined by strict rules and facts — can be resolved entirely within the Datalog engine without generating corresponding ASPIC+ ground rules, reducing the size of the grounded theory."
    concepts:
      - non_approximated_predicate
      - strict_rule
      - datalog_program
      - grounding_procedure
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 5
      section: "Section 3.2"
      quote_fragment: "non-approximated predicates... can be resolved entirely within Datalog"

  - id: claim3
    type: mechanism
    statement: "The grounding procedure works by translating each ASPIC+ rule into a Datalog rule with the same body atoms, querying the Datalog engine's least fixpoint for satisfying ground substitutions, and then applying those substitutions to the original ASPIC+ rules to produce the ground theory."
    concepts:
      - grounding_procedure
      - datalog_program
      - immediate_consequence_operator
      - ground_substitution
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 3
      section: "Section 2.2"
      quote_fragment: "we translate the first-order ASPIC+ instance into a Datalog program and query a Datalog engine"

  - id: claim4
    type: observation
    statement: "Transformation 1 preserves complete extensions: for an argumentation theory T and its grounding T' via Transformation 1, the complete extensions of the induced argumentation frameworks coincide."
    concepts:
      - complete_extension
      - grounding_procedure
      - argumentation_theory
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 6
      section: "Theorem 3"
      quote_fragment: "the complete extensions of the induced AFs coincide"

  - id: claim5
    type: observation
    statement: "Transformation 2 preserves complete extensions: for an argumentation theory T and its simplified grounding T'' via Transformation 2, the complete extensions of the induced argumentation frameworks coincide."
    concepts:
      - complete_extension
      - grounding_procedure
      - argumentation_theory
      - non_approximated_predicate
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 7
      section: "Theorem 5"
      quote_fragment: "the complete extensions coincide"

  - id: claim6
    type: mechanism
    statement: "Non-approximated predicate identification works by finding predicates that depend only on strict rules and facts through a fixpoint analysis: a predicate is non-approximated if it is a fact predicate, or depends positively only on non-approximated predicates via strict rules, or depends negatively only on non-approximated predicates."
    concepts:
      - non_approximated_predicate
      - strict_rule
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 5
      section: "Definition 12"
      quote_fragment: "the minimal set satisfying these conditions"

  - id: claim7
    type: comparison
    statement: "Unlike ASPforASPIC which only supports propositional ASPIC+ rules, this Datalog-based grounding approach handles first-order rules with variables by performing intelligent grounding before passing to a propositional solver."
    concepts:
      - grounding_procedure
      - argumentation_theory
      - datalog_program
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 0
      section: "Introduction"
      quote_fragment: "most existing approaches to reason over rule-based argumentation only support propositional rules"

  - id: claim8
    type: comparison
    statement: "The Datalog-based grounding with ASPIC+-specific simplifications (Transformation 2) produces significantly smaller ground theories than naive grounding or Transformation 1 alone, particularly when non-approximated predicates are present."
    concepts:
      - grounding_procedure
      - non_approximated_predicate
      - datalog_program
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 8
      section: "Evaluation - Scenario S2"
      quote_fragment: "Transformation 2 produces significantly smaller ground theories"

  - id: claim9
    type: mechanism
    statement: "Fact-only rule deletion is sound because a ground rule whose body consists entirely of facts and whose conclusion is already derivable adds no argumentative value — it cannot be attacked and produces no new information for extension computation."
    concepts:
      - grounding_procedure
      - strict_rule
      - complete_extension
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 4
      section: "Algorithm 2"
      quote_fragment: "rules that have no influence on the reasoning process"

  - id: claim10
    type: mechanism
    statement: "Contrary elimination is sound because removing contrary relations where the attacking predicate has no ground instances cannot affect the attack relation or extension computation, since no argument can be constructed from non-existent ground atoms."
    concepts:
      - contrariness_function
      - grounding_procedure
      - complete_extension
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 4
      section: "Algorithm 2"
      quote_fragment: "eliminate contraries with no ground attacking instances"

  - id: claim11
    type: limitation
    statement: "The grounding approach assumes function-free first-order ASPIC+: no function symbols beyond constants are supported, which limits the expressiveness compared to full first-order logic."
    concepts:
      - grounding_procedure
      - argumentation_theory
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 2
      section: "Preliminaries"
      quote_fragment: "function-free first-order"

  - id: claim12
    type: limitation
    statement: "The correctness proofs cover only complete extensions semantics; preservation of other Dung semantics (preferred, stable, grounded) under the grounding transformations is not formally established."
    concepts:
      - complete_extension
      - grounding_procedure
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 6
      section: "Section 3"

  - id: claim13
    type: limitation
    statement: "The Datalog translation overhead can cause slower performance on small or trivial ASPIC+ instances compared to direct propositional solvers, making the approach most beneficial for larger theories."
    concepts:
      - datalog_program
      - grounding_procedure
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 9
      section: "Evaluation"
      quote_fragment: "some loss of performance on small instances due to overhead of Datalog translation"

  - id: claim14
    type: limitation
    statement: "Non-approximated predicate detection is conservative: some predicates that could in principle be simplified may not be identified by the fixpoint analysis, resulting in unnecessary ground rules."
    concepts:
      - non_approximated_predicate
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 5
      section: "Section 3.2"

  - id: claim15
    type: observation
    statement: "Stratified negation in the Datalog translation is required to handle the contrariness function, since contraries introduce negation-like relationships between predicates that must be evaluated in a well-defined order."
    concepts:
      - stratified_negation
      - contrariness_function
      - datalog_program
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 3
      section: "Section 2.2"

  - id: claim16
    type: mechanism
    statement: "Datalog's bottom-up fixpoint evaluation naturally computes exactly the ground atoms derivable from rules and facts, making it a better fit for the grounding task than ASP's answer-set computation, which solves a harder problem than what grounding requires."
    concepts:
      - datalog_program
      - immediate_consequence_operator
      - grounding_procedure
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 3
      section: "Section 2.2"
      quote_fragment: "we translate the first-order ASPIC+ instance into a Datalog program"

  - id: claim17
    type: observation
    statement: "The ANGRY prototype demonstrates that Datalog-based grounding scales to instances with up to 100 strict rules, 30 constants, and 3 variables per rule within a 5-minute time limit, configurations that naive grounding cannot handle."
    concepts:
      - grounding_procedure
      - datalog_program
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 8
      section: "Evaluation - Scenario S1"

  - id: claim18
    type: observation
    statement: "The ground substitutions obtained from the Datalog engine are exactly those that make rule bodies true in the minimal Herbrand model, ensuring no spurious or missing ground instances."
    concepts:
      - ground_substitution
      - immediate_consequence_operator
      - datalog_program
    provenance:
      paper: Diller_2025_GroundingRule-BasedArgumentationDatalog
      page: 3
      section: "Definition 9"
