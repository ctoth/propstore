  - id: claim4
    type: equation
    expression: "SF(a) = 0.5 + 0.5 * (prod(1 - s_i) - prod(1 - a_j))"
    sympy: "Eq(SF_a, Rational(1,2) + Rational(1,2) * (Product(1 - s_i, (i, 1, n)) - Product(1 - a_j, (j, 1, m))))"
    variables:
      - symbol: "SF_a"
        concept: "argument_score"
        role: "dependent"
      - symbol: "s_i"
        concept: "supporter_strength"
        role: "independent"
      - symbol: "a_j"
