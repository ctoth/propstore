    type: limitation
    statement: "The closure computation propagates all identity assertions without quality assessment, meaning a single erroneous owl:sameAs statement can contaminate an entire identity set through transitivity."
    concepts:
      - error_propagation
      - identity_closure
      - quality_assessment
    provenance:
      paper: Beek_2018_SameAs.ccClosure500MOwl
      page: 9
      section: "4.2 Implicit Identity Relation"
    notes: "The 177,794-member identity set is direct evidence of this problem"

