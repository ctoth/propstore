claims:
  - id: claim1
    type: observation
    statement: "Two entities are identical if and only if they share all properties (Leibniz's Law / Identity of Indiscernibles)."
    concepts:
      - identity
      - leibniz_law
      - indiscernibility
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 0
      section: "Abstract / Introduction"
      quote_fragment: "sameAs links are intended to express that two identifiers are equivalent in all respects"

  - id: claim2
    type: observation
    statement: "There is no universal agreed-upon way of determining which properties should count as salient in determining near-identity and similarity."
    concepts:
      - near_identity
      - salience
      - similarity
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 1
      section: "3 Criteria for Near-Identity and Similarity"
      quote_fragment: "There is no universal agreed-upon way of determining which properties should count as salient"

  - id: claim3
    type: mechanism
    statement: "Many existing owl:sameAs links do not reflect genuine identity because publishers use them informally to express similarity, relatedness, or approximate equivalence rather than strict Leibniz's Law identity."
    concepts:
      - owl_sameas
      - identity
      - near_identity
      - linked_data
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 0
      section: "Abstract"
      quote_fragment: "many existing ones do not reflect such genuine identity"

  - id: claim4
    type: observation
    statement: "Within a single dataset, distinct URIs refer to distinct entities (Unique Name Assumption), so sameAs links that create equivalence classes merging URIs from the same dataset violate this constraint."
    concepts:
      - unique_name_assumption
      - identity_constraint
      - equivalence_class
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 2
      section: "Unique Name Constraints"
      quote_fragment: "any two URIs of the two resources is not a valid DBpedia URI"

  - id: claim5
    type: observation
    statement: "Finding a minimum-weight set of sameAs edges to remove in order to restore consistency with distinctness constraints is equivalent to the minimum multicut problem."
    concepts:
      - minimum_multicut
      - identity_constraint
      - graph_optimization
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 2
      section: "Combinatorial Optimization Problem"

  - id: claim6
    type: observation
    statement: "Computing an optimal cut C for identity constraint satisfaction is NP-hard and APX-hard, by reduction from the minimum multicut problem."
    concepts:
      - computational_complexity
      - minimum_multicut
      - np_hard
      - apx_hard
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 2
      section: "Theorem 6"
      quote_fragment: "a gap-preserving problem reduction of this form shows that our problem is at least as hard as the minimum multicut problem"

  - id: claim7
    type: mechanism
    statement: "The LP relaxation of the minimum multicut formulation can be solved in polynomial time using region growing techniques, yielding a logarithmic approximation guarantee for the identity constraint satisfaction problem."
    concepts:
      - lp_relaxation
      - minimum_multicut
      - approximation_algorithm
      - region_growing
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 3
      section: "Linear Program Relaxation Algorithm"
      quote_fragment: "we use the region growing technique of Garg, Vazirani, and Vazirani (1996)"

  - id: claim8
    type: mechanism
    statement: "When linking exactly two data sources, the identity constraint problem reduces to a bipartite matching solvable in polynomial time via the Hungarian algorithm (LSAP), because pairwise non-adjacency implies connected components span at most one node from each side."
    concepts:
      - hungarian_algorithm
      - bipartite_matching
      - linear_sum_assignment
      - identity_constraint
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 3
      section: "Relationship to the Hungarian Algorithm / Theorem 7"
      quote_fragment: "computing the minimal cut is equivalent to solving the LSAP"

  - id: claim9
    type: equation
    expression: "minimize sum(d_ij * w_ij) subject to path constraints and 0 <= d_ij <= 1"
    sympy: "Minimize(Sum(d_ij * w_ij), {Sum(d_ij, path) >= 1 for all demand pairs})"
    variables:
      - symbol: "d_ij"
        concept: "edge_cut_indicator"
        role: "decision_variable"
      - symbol: "w_ij"
        concept: "edge_weight"
        role: "parameter"
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 3
      section: "Linear Program Relaxation Algorithm"

