      table: "Table 4"

  - id: claim16
    type: observation
    statement: "The number of edges removed to restore consistency is lower than the number of constraint violations, because removing a single strategically placed sameAs link can satisfy multiple constraints simultaneously."
    concepts:
      - minimum_multicut
      - identity_constraint
      - graph_optimization
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 6
      section: "Constraint-Based Cleaning"
      quote_fragment: "the algorithm explicitly aims at deleting a minimal number of edges in order to ensure that the constraints are no longer violated"

  - id: claim17
    type: observation
    statement: "The most frequent domains of entity URIs in the BTC 2011 sameAs graph are DBpedia, Freebase, linkeddata.uriburner.com, lib-onv, and Max Planck Institute for Informatics, each involved in over 250,000 undirected edges."
    concepts:
      - linked_data
      - owl_sameas
      - knowledge_graph
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 4
      section: "Graph Construction"

  - id: claim18
    type: comparison
    statement: "Unlike prior empirical studies of sameAs usage (Halpin et al. 2010, Ding et al. 2010) which analyzed the problem, this work provides a computational method for detecting and repairing erroneous identity links via graph-based constraint satisfaction."
    concepts:
      - identity_constraint
      - graph_optimization
      - owl_sameas
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 6
      section: "Implications and Suggestions"

  - id: claim19
    type: limitation
    statement: "The OWL standard does not make a Unique Name Assumption and instead provides owl:differentFrom, but in practice almost no publishers issue owl:differentFrom statements between entity pairs, making explicit distinctness assertions unavailable."
    concepts:
      - unique_name_assumption
      - owl_different_from
      - linked_data
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 1
      section: "2 Criteria for Identity"

  - id: claim20
    type: limitation
    statement: "Some constraint violations may stem not from incorrect sameAs links but from inadvertent duplicates within a dataset, such as two Wikipedia articles with different titles describing the same entity."
    concepts:
      - identity_constraint
      - false_positive
      - unique_name_assumption
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 5
      section: "Constraint Analysis"

  - id: claim21
    type: observation
    statement: "The owl:sameAs property as it appears in the wild frequently cannot be interpreted as strict identity, and there are no signs of this changing; a separate predicate for genuine identity is needed."
    concepts:
      - owl_sameas
      - identity
      - near_identity
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 5
      section: "6 Implications and Suggestions"
      quote_fragment: "owl:sameAs as it appears in the wild frequently cannot be interpreted as strict identity"

  - id: claim22
    type: observation
    statement: "Additional properties should be used to describe the exact nature of relationships between different entities when possible, such as distinguishing between a university as an institution versus a geographical entity."
    concepts:
      - near_identity
      - identity
      - relationship_typing
    provenance:
      paper: Melo_2013_NotQuiteSameIdentity
      page: 5
      section: "6 Implications and Suggestions"

