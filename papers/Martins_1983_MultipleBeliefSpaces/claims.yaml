source:
  paper: Martins_1983_MultipleBeliefSpaces
  extraction_model: "claude-opus-4-6"
  extraction_date: "2026-03-17"

claims:
  - id: claim1
    type: observation
    statement: "A context (set of hypotheses) uniquely defines a Belief Space (BS) consisting of all propositions derivable from those hypotheses within SWM logic."
    concepts:
      - belief_space
      - context
      - hypothesis
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 2
      section: "3. Contexts and Belief Spaces"
      quote_fragment: "A context represents the set of assumptions of some user. A context determines a Belief Spaces (BS) which is the set of all the hypotheses defining the context and all the propositions which were derived from them."

  - id: claim2
    type: observation
    statement: "Once a proposition is derived, its origin tag (OT) and origin set (OS) remain constant; only the restriction set (RS) changes as new contradictions are discovered."
    concepts:
      - origin_set
      - restriction_set
      - origin_tag
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 1
      section: "Introduction"
      quote_fragment: "Once a proposition is derived its OT and OS remain constant."

  - id: claim3
    type: observation
    statement: "The origin set (OS) of a proposition records the hypotheses actually used in its derivation, while the restriction set (RS) records sets of hypotheses that, combined with the OS, form inconsistent sets."
    concepts:
      - origin_set
      - restriction_set
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 1
      section: "Introduction"
      quote_fragment: "The origin set (OS) contains all the hypotheses which were actually used in the derivation of F. The restriction set (RS) contains sets of hypotheses, each of which when unfoned with the hypotheses in the OS forms a set which is known to be inconsistant."

  - id: claim4
    type: observation
    statement: "Contradiction detection in MBR requires following only two types of arcs in the SNePS network, without needing to explicitly mark propositions as believed or disbelieved, without worrying about circular proofs, and without a separate data structure for recording contradictions."
    concepts:
      - contradiction_detection
      - belief_space
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 1
      section: "Introduction"
      quote_fragment: "the detection of the hypotheses underlying the contradiction is done by following only two types of arcs; there is no need to explicitly mark propositions as believed or disbelieved; there is no need to worry about circular proofs; there is no need to keep a separate data structure to record previous contradictions."

  - id: claim5
    type: observation
    statement: "When only one of two contradictory wffs belongs to the Current Belief Space (CBS), the contradiction is recorded via URS application but does not trigger belief revision — it merely records that some hypothesis set containing the current context is inconsistent."
    concepts:
      - contradiction_handling
      - belief_space
      - restriction_set
    conditions:
      - "contradictory_wffs_in_cbs == 1"
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 2
      section: "4. The handling of contradictions"
      quote_fragment: "If only one of the contradictory wffs belongs to the CBS, the contradiction is recorded (through the application of URS) but nothing more happens."

  - id: claim6
    type: observation
    statement: "When both contradictory wffs belong to the CBS, the URS rule is applied AND the negation introduction rule (~I) also fires, adding new wffs to the knowledge base and causing the current context (CC) to be revised."
    concepts:
      - contradiction_handling
      - belief_space
      - negation_introduction
    conditions:
      - "contradictory_wffs_in_cbs == 2"
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 2
      section: "4. The handling of contradictions"
      quote_fragment: "If both contradictory wffs belong to the CBS. Then the rule of URS is applied but, in addition, the rule of 1 is also applied."

  - id: claim7
    type: model
    name: "Supported Well-Formed Formula (supported wff)"
    equations:
      - "F!:t,a,p"
    parameters:
      - name: "F"
        concept: "well_formed_formula"
        note: "A wff (well-formed formula) in SWM logic"
      - name: "t"
        concept: "origin_tag"
        note: "Origin tag: hyp (hypothesis), der (derived), or ext (extended)"
      - name: "a"
        concept: "origin_set"
        note: "Origin set: the set of hypotheses used in derivation"
      - name: "p"
        concept: "restriction_set"
        note: "Restriction set: set of hypothesis sets that combined with OS form inconsistent sets"
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 1
      section: "Introduction"
      quote_fragment: "The SUM system deals with objects called supported wffs which are of the form F!:t,a,p"

  - id: claim8
    type: observation
    statement: "Restriction sets (RS) distributed across individual hypotheses eliminate the need for a centralized NOGOOD list (as in Doyle's TMS), because all inconsistency information is encoded locally in each hypothesis's RS."
    concepts:
      - restriction_set
      - nogood
    stances:
      - type: contradicted_by
        target: "Doyle_1979_TruthMaintenanceSystem"
        strength: "moderate"
        note: "MBR's distributed RS mechanism replaces Doyle's centralized NOGOOD list"
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 4
      section: "6. Concluding Remarks"
      quote_fragment: "Finally the definition of RSs waives the need to keep a separate data strucure to record all the previous contradictions (e.g., the NOGOOD list ([2]))."

  - id: claim9
    type: observation
    statement: "MBR can support as many contexts (and therefore belief spaces) as the power set of the hypotheses in the system, since a context is defined simply as a set of hypotheses."
    concepts:
      - context
      - belief_space
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 4
      section: "6. Concluding Remarks"
      quote_fragment: "By defining a context as a set of hypotheses we can have as many contexts in tha system as the power set of the hypotheses introduced."

  - id: claim10
    type: observation
    statement: "In MBR, propositions are represented by network nodes linked by arcs, and the number of arcs that must be traversed to find all hypotheses underlying a contradiction is known a priori."
    concepts:
      - contradiction_detection
      - network_representation
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 4
      section: "6. Concluding Remarks"
      quote_fragment: "This way of representing propositions makes it possible to know a priori the number of arcs that has to be traversed to find out all the hypotheses underlying a contradiction."

  - id: claim11
    type: observation
    statement: "When a contradiction is detected and a culprit hypothesis is selected, disbelief in all propositions depending on that hypothesis is achieved by simply dropping the hypothesis from the current context — no retraction or explicit disbelief marking is needed."
    concepts:
      - belief_revision
      - contradiction_handling
      - context
    provenance:
      paper: Martins_1983_MultipleBeliefSpaces
      page: 4
      section: "6. Concluding Remarks"
      quote_fragment: "the disbelief in all tha propositions depending on such hypothesis (hypotheses) is done just by dropping it (them) from the CC."
