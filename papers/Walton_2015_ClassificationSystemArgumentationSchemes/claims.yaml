source:
  paper: Walton_2015_ClassificationSystemArgumentationSchemes
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"

claims:
  - id: claim1
    type: observation
    statement: >
      Argumentation schemes should be organized in a hierarchical tree structure
      rather than a flat list, allowing schemes to inherit properties of parent
      categories and making navigation from general to specific possible.
    concepts:
      - argumentation_scheme_classification
      - argumentation_scheme
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 9
      section: "Desiderata"

  - id: claim2
    type: observation
    statement: >
      The most fundamental organizing principle for argumentation schemes is
      source-dependency: whether an argument's strength depends on the
      characteristics of its source (source-based) or is independent of the
      source (source-independent).
    concepts:
      - source_based_argument
      - source_independent_argument
      - argumentation_scheme_classification
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 9
      section: "Classification Taxonomy"

  - id: claim3
    type: observation
    statement: >
      Source-independent schemes are further divided into epistemic reasoning
      (aimed at establishing what is true) and practical reasoning (aimed at
      deciding what to do), reflecting the Aristotelian distinction between
      theoretical and practical reason.
    concepts:
      - source_independent_argument
      - practical_reasoning
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 13
      section: "Classification Taxonomy"

  - id: claim4
    type: observation
    statement: >
      Argument from expert opinion is a sub-species of argument from position
      to know, since an expert is a special case of someone in a position to
      know. This allows hierarchical organization where specific schemes inherit
      properties of parent categories.
    concepts:
      - argument_from_expert_opinion
      - argumentation_scheme_classification
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 8
      section: "Classifying Schemes as Sub-species"

  - id: claim5
    type: observation
    statement: >
      Each argumentation scheme has a formal premise-conclusion structure
      (major premise, minor premise, conclusion) and an associated set of
      critical questions that identify potential ways to challenge an argument
      of that type.
    concepts:
      - argumentation_scheme
      - critical_question
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 10
      section: "Key Scheme Definitions"

  - id: claim6
    type: observation
    statement: >
      Some argumentation schemes are hybrids that combine elements of multiple
      categories. The sunk cost argument is a sub-species of both argument from
      commitment and practical reasoning.
    concepts:
      - hybrid_scheme
      - practical_reasoning
      - argumentation_scheme
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 15
      section: "Hybrid Schemes"

  - id: claim7
    type: observation
    statement: >
      Six desiderata for evaluating classification systems: helpful for
      identification, handles borderline cases, accommodates new schemes,
      captures fine distinctions, is hierarchical not flat, and reflects
      differences in use.
    concepts:
      - argumentation_scheme_classification
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 9
      section: "Desiderata"

  - id: claim8
    type: observation
    statement: >
      Prior classifications of argumentation schemes used inconsistent organizing
      principles and presented them as flat lists without hierarchical structure,
      failing to capture sub-scheme relationships.
    concepts:
      - argumentation_scheme_classification
      - argumentation_scheme
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 4
      section: "Survey of Prior Classification Systems"

  - id: claim9
    type: observation
    statement: >
      Source-based argumentation schemes include arguments from position to know,
      argument from expert opinion, argument from witness testimony, ad hominem
      arguments, and arguments from popular acceptance.
    concepts:
      - source_based_argument
      - argument_from_expert_opinion
      - argumentation_scheme
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 22
      section: "Classification Taxonomy"

  - id: claim10
    type: observation
    statement: >
      Critical questions for argumentation schemes map to potential
      counterarguments: some challenge an argument's premise (pointing to
      rebutting attacks) and others challenge the inferential link (pointing
      to undercutting attacks).
    concepts:
      - critical_question
      - rebutting_defeat
      - undercutting_defeat
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 11
      section: "Critical Questions"

  - id: claim11
    type: observation
    statement: >
      The classification system was empirically tested by having six participants
      classify 388 collected arguments from Ontario election campaigns into the
      proposed categories, identifying 14 argument types with frequencies.
    concepts:
      - argumentation_scheme_classification
      - argument_mining
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 7
      section: "Empirical Study"

  - id: claim12
    type: observation
    statement: >
      The classification is designed to support argument mining applications,
      where automated systems need a taxonomy of argument types to classify
      detected arguments in natural language text.
    concepts:
      - argument_mining
      - argumentation_scheme_classification
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 3
      section: "Connection to Argument Mining"

  - id: claim13
    type: observation
    statement: >
      The classification is not yet complete: more sub-types need to be added,
      rules-based arguments need further development, and classical argument
      forms from the Aristotelian tradition have not been fully integrated.
    concepts:
      - argumentation_scheme_classification
    provenance:
      paper: Walton_2015_ClassificationSystemArgumentationSchemes
      page: 24
      section: "Revising the Classification"
