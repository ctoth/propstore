source:
  paper: Dung_1995_AcceptabilityArguments
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"

claims:
  - id: claim1
    type: observation
    statement: >
      An argumentation framework is defined as an abstract pair AF = (AR, attacks)
      where AR is a set of arguments and attacks is a binary relation on AR.
      Arguments are abstract entities whose role is solely determined by their
      relations to other arguments.
    concepts:
      - argumentation_framework
      - attack_relation
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 326
      section: "Definition 2"

  - id: claim2
    type: observation
    statement: >
      A set S of arguments is conflict-free if there are no arguments A and B
      in S such that A attacks B.
    concepts:
      - conflict_free_set
      - attack_relation
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 326
      section: "Definition 5"

  - id: claim3
    type: observation
    statement: >
      An argument A is acceptable with respect to a set S iff for each argument B
      that attacks A, there exists an argument in S that attacks B.
    concepts:
      - acceptability
      - attack_relation
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 326
      section: "Definition 6(1)"

  - id: claim4
    type: observation
    statement: >
      A conflict-free set of arguments S is admissible iff each argument in S
      is acceptable with respect to S.
    concepts:
      - admissible_set
      - conflict_free_set
      - acceptability
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 326
      section: "Definition 6(2)"

  - id: claim5
    type: observation
    statement: >
      A preferred extension of an argumentation framework is a maximal
      (with respect to set inclusion) admissible set.
    concepts:
      - preferred_extension
      - admissible_set
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 327
      section: "Definition 7"

  - id: claim6
    type: observation
    statement: >
      A conflict-free set of arguments S is a stable extension iff S attacks
      each argument which does not belong to S.
    concepts:
      - stable_extension
      - conflict_free_set
      - attack_relation
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 328
      section: "Definition 13"

  - id: claim7
    type: observation
    statement: >
      The characteristic function F_AF maps each set S of arguments to the set
      of all arguments acceptable with respect to S.
    concepts:
      - characteristic_function
      - acceptability
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 329
      section: "Definition 16"

  - id: claim8
    type: observation
    statement: >
      The grounded extension is the least fixed point of the characteristic
      function F_AF.
    concepts:
      - grounded_extension
      - characteristic_function
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 329
      section: "Definition 20"

  - id: claim9
    type: observation
    statement: >
      An admissible set S is a complete extension iff each argument which is
      acceptable with respect to S belongs to S.
    concepts:
      - complete_extension
      - admissible_set
      - acceptability
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 329
      section: "Definition 23"

  - id: claim10
    type: observation
    statement: >
      Every argumentation framework possesses at least one preferred extension.
    concepts:
      - argumentation_framework
      - preferred_extension
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 327
      section: "Corollary 12"

  - id: claim11
    type: observation
    statement: >
      Every stable extension is a preferred extension, but not vice versa.
    concepts:
      - stable_extension
      - preferred_extension
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 328
      section: "Lemma 15"

  - id: claim12
    type: observation
    statement: >
      The characteristic function F_AF is monotonic with respect to set inclusion.
    concepts:
      - characteristic_function
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 329
      section: "Lemma 19"

  - id: claim13
    type: observation
    statement: >
      Each preferred extension is a complete extension, but not vice versa.
    concepts:
      - preferred_extension
      - complete_extension
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 330
      section: "Theorem 25(1)"

  - id: claim14
    type: observation
    statement: >
      The grounded extension is the least (with respect to set inclusion)
      complete extension.
    concepts:
      - grounded_extension
      - complete_extension
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 330
      section: "Theorem 25(2)"

  - id: claim15
    type: observation
    statement: >
      An argumentation framework is finitary iff for each argument A, there
      are only finitely many arguments that attack A.
    concepts:
      - finitary_framework
      - attack_relation
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 330
      section: "Definition 27"

  - id: claim16
    type: observation
    statement: >
      An argumentation framework is well-founded iff there exists no infinite
      sequence of arguments where each attacks its predecessor.
    concepts:
      - well_founded_framework
      - attack_relation
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 331
      section: "Definition 29"

  - id: claim17
    type: observation
    statement: >
      Every well-founded argumentation framework has exactly one complete
      extension which is simultaneously grounded, preferred, and stable.
    concepts:
      - well_founded_framework
      - complete_extension
      - grounded_extension
      - preferred_extension
      - stable_extension
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 331
      section: "Theorem 30"

  - id: claim18
    type: observation
    statement: >
      An argumentation framework is coherent if every preferred extension
      is also a stable extension.
    concepts:
      - coherent_framework
      - preferred_extension
      - stable_extension
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 332
      section: "Definition 31(1)"

  - id: claim19
    type: observation
    statement: >
      Every limited controversial argumentation framework is coherent.
    concepts:
      - controversial_argument
      - coherent_framework
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 332
      section: "Theorem 33(1)"

  - id: claim20
    type: observation
    statement: >
      Every limited controversial argumentation framework possesses at least
      one stable extension.
    concepts:
      - controversial_argument
      - stable_extension
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 334
      section: "Corollary 36"

  - id: claim21
    type: observation
    statement: >
      R-extensions of Reiter's default logic correspond exactly to stable
      extensions of the corresponding argumentation framework, establishing
      default logic as a special case of abstract argumentation.
    concepts:
      - default_logic
      - stable_extension
      - argumentation_framework
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 341
      section: "Theorem 43"

  - id: claim22
    type: observation
    statement: >
      Pollock's indefeasible arguments are contained in the grounded extension,
      with equality holding for finitary frameworks, establishing defeasible
      reasoning as a special case of abstract argumentation.
    concepts:
      - grounded_extension
      - finitary_framework
      - nonmonotonic_reasoning
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 342
      section: "Theorem 47"

  - id: claim23
    type: observation
    statement: >
      Stable models of a logic program correspond to stable extensions of the
      argumentation framework constructed via negation as possibly infinite failure.
    concepts:
      - logic_programming
      - stable_extension
      - argumentation_framework
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 344
      section: "Theorem 49"

  - id: claim24
    type: observation
    statement: >
      The well-founded model of a logic program corresponds to the grounded
      extension of the argumentation framework constructed via negation as
      possibly infinite failure.
    concepts:
      - logic_programming
      - grounded_extension
      - argumentation_framework
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 344
      section: "Theorem 50"

  - id: claim25
    type: observation
    statement: >
      An argumentation system can be decomposed into an Argument Generation Unit
      (AGU) that generates arguments and attack relations, and an Argument
      Processing Unit (APU) that determines acceptability, acting as a
      domain-independent meta-interpreter schema analogous to a compiler-compiler.
    concepts:
      - meta_interpreter
      - argumentation_framework
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 348
      section: "Section 5"

  - id: claim26
    type: observation
    statement: >
      Preferred extensions capture credulous reasoning where a proposition is
      accepted if it belongs to at least one extension, while the grounded
      extension captures skeptical reasoning where only forced conclusions
      are accepted.
    concepts:
      - credulous_reasoning
      - skeptical_reasoning
      - preferred_extension
      - grounded_extension
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 327
      section: "Section 2"

  - id: claim27
    type: observation
    statement: >
      Prior work on argument structure (Birnbaum, Cohen, Vreeswijk) had not
      formalized the central question of which arguments a rational agent
      should accept, leaving acceptability undefined.
    concepts:
      - acceptability
      - argumentation_framework
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 322
      section: "Introduction"

  - id: claim28
    type: observation
    statement: >
      The abstract treatment of arguments, where their role is solely determined
      by relations to other arguments rather than internal structure, enables
      the framework to unify default logic, logic programming, and n-person
      game theory as special cases.
    concepts:
      - argumentation_framework
      - default_logic
      - logic_programming
      - nonmonotonic_reasoning
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 326
      section: "Section 2"

  - id: claim29
    type: observation
    statement: >
      A knowledge base lacking stable semantics does not necessarily contain a
      bug; the Stable Marriage Problem with Gays naturally has no stable
      semantics when a love triangle exists, reflecting genuine indeterminacy.
    concepts:
      - stable_extension
      - argumentation_framework
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 338
      section: "Section 3.2"

  - id: claim30
    type: observation
    statement: >
      The set of arguments in the argumentation framework constructed via
      negation as possibly infinite failure is in general not recursively
      decidable, making stable, well-founded, and preferred extension
      semantics in general incomputable.
    concepts:
      - logic_programming
      - stable_extension
      - grounded_extension
      - preferred_extension
    provenance:
      paper: Dung_1995_AcceptabilityArguments
      page: 345
      section: "Theorem 52"
