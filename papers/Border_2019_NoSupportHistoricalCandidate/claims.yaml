source:
  paper: Border_2019_NoSupportHistoricalCandidate

claims:
  - id: claim1
    type: parameter
    concept: significance_threshold
    value: 0.00000001
    unit: "dimensionless"
    conditions:
      - "correction == 'bonferroni'"
      - "domain == 'candidate_gene_depression'"
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 6
      section: "Analyses"
      quote_fragment: "Bonferroni-corrected significance threshold of alpha = 0.05/(18 × 2.78 × 10^5)"
    notes: "Corrected for 18 candidate genes times estimated number of polymorphism-wise tests"

  - id: claim2
    type: parameter
    concept: power_target
    value: 0.80
    unit: "dimensionless"
    conditions:
      - "effect_size == 'OR_1.05'"
      - "alpha == 0.0005"
      - "maf > 0.05"
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 7
      section: "Results"
      quote_fragment: "80% power to detect OR=1.05 at alpha=0.0005 in UK Biobank sample for MAF>0.05"
    notes: "UK Biobank sample size provides adequate power for very small genetic effects"

  - id: claim3
    type: parameter
    concept: sampling_scope
    value: 443264
    unit: "individuals"
    conditions:
      - "sample == 'PGC_GWAS_lifetime_depression'"
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 5
      section: "Methods"
      quote_fragment: "PGC GWAS data (N=443,264 for lifetime depression)"
    notes: "Largest sample used; includes 120,201 cases"

  - id: claim4
    type: parameter
    concept: sampling_scope
    value: 502682
    unit: "individuals"
    conditions:
      - "sample == 'UK_Biobank_total'"
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 5
      section: "Methods"
      quote_fragment: "UK Biobank population sample of 502,682 individuals"
    notes: "European-ancestry population-based sample; subsamples vary by phenotype"

  - id: claim5
    type: observation
    statement: "No candidate gene polymorphism among 18 tested shows statistically significant association with any depression phenotype after correction for multiple testing in samples exceeding 60,000 individuals."
    concepts:
      - false_positive_rate
      - significance_threshold
      - replication_success
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 6
      section: "Results"
      quote_fragment: "No clear evidence was found for any candidate gene polymorphism associations with depression phenotypes"

  - id: claim6
    type: observation
    statement: "Depression candidate genes as a set are no more associated with depression phenotypes than randomly selected non-candidate genes."
    concepts:
      - false_positives
      - replication_success
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 6
      section: "Results"
      quote_fragment: "depression candidate genes were no more associated with depression phenotypes than noncandidate genes"

  - id: claim7
    type: observation
    statement: "The 5-HTTLPR polymorphism in SLC6A4 shows no main effect on any depression phenotype and no interaction with childhood maltreatment in samples exceeding 100,000 individuals."
    concepts:
      - false_positives
      - replication_success
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 7
      section: "Results"
      quote_fragment: "5-HTTLPR showed no association with any depression phenotype or interaction"
    notes: "5-HTTLPR was examined in 38.1% of all depression candidate gene studies"

  - id: claim8
    type: observation
    statement: "Phenotypic measurement error cannot account for the null findings in candidate gene association tests, as disattenuated effect sizes remain non-significant."
    concepts:
      - false_positives
      - replication_failure_causes
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 9
      section: "Sensitivity of Results to Measurement Error"
      quote_fragment: "phenotypic measurement error is unlikely to account for these null findings"

  - id: claim9
    type: mechanism
    statement: "The large number of positive candidate gene findings in the depression literature are likely false positives generated by small sample sizes, flexible analytic strategies, and publication bias rather than true genetic effects."
    concepts:
      - false_positives
      - publication_bias
      - effect_size_inflation
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 1
      section: "Conclusions"
      quote_fragment: "early hypotheses about depression candidate genes were incorrect and the large number of associations are likely to be false positives"

  - id: claim10
    type: comparison
    statement: "Unlike hundreds of small-sample candidate gene studies reporting large genetic effects, this study using samples 100-1000x larger finds no evidence for any of the same associations, demonstrating that prior positive findings do not replicate."
    concepts:
      - effect_size_shrinkage
      - replication_success
      - sampling_scope
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 1
      section: "Conclusions"
      quote_fragment: "large genetic effects are frequently reported in samples orders of magnitude smaller than those examined here"

  - id: claim11
    type: observation
    statement: "Only 27% of replication attempts for candidate gene associations found significant results, and replication studies reporting null findings had larger sample sizes than those reporting positive findings."
    concepts:
      - replication_significance_rate
      - sampling_scope
      - publication_bias
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 3
      section: "Introduction"
      quote_fragment: "only 27% of replication attempts were significant, compared with only 27% of replication attempts"

  - id: claim12
    type: measurement
    target_concept: replication_significance_rate
    measure: accuracy
    value: 0.27
    unit: "proportion"
    conditions:
      - "domain == 'candidate_gene_depression'"
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 3
      section: "Introduction"
      quote_fragment: "only 27% of replication attempts were significant"
    methodology: "Count of significant replication attempts across candidate gene depression literature"

  - id: claim13
    type: limitation
    statement: "VNTRs including 5-HTTLPR were not directly genotyped; proxy SNPs with r-squared > 0.888 were used, though the authors argue tag SNPs may capture broader haplotype effects."
    concepts:
      - replication_failure_causes
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 9
      section: "Discussion"
      quote_fragment: "VNTRs were not directly genotyped; proxy SNPs were used"

  - id: claim14
    type: limitation
    statement: "The UK Biobank sample is subject to healthy volunteer selection bias, which may reduce the prevalence of severe depression phenotypes."
    concepts:
      - generalizability
      - sampling_scope
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 9
      section: "Discussion"
      quote_fragment: "UK Biobank sample is healthier than general population"

  - id: claim15
    type: observation
    statement: "Gene-level analyses via MAGMA confirm that no candidate gene shows association with depression at a gene level, not just at the single-polymorphism level."
    concepts:
      - false_positives
      - replication_success
    provenance:
      paper: Border_2019_NoSupportHistoricalCandidate
      page: 8
      section: "Gene-Level Analyses"
      quote_fragment: "Investigating the effects of the 18 genes together as a set revealed no associations with depression"
