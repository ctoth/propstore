source:
  paper: Pollock_1987_DefeasibleReasoning
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"

claims:
  - id: claim1
    type: observation
    statement: >
      A prima facie reason is a defeasible reason for belief where there exists
      some additional information R consistent with the reason P such that
      (P & R) is no longer a reason for the conclusion Q.
    concepts:
      - prima_facie_reason
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 484
      section: "Definition 2.2"

  - id: claim2
    type: observation
    statement: >
      A conclusive (nondefeasible) reason logically entails its conclusion
      and cannot be defeated by any additional information.
    concepts:
      - conclusive_reason
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 484
      section: "Section 2"

  - id: claim3
    type: observation
    statement: >
      A rebutting defeater is a defeater that provides a reason for believing
      the negation of the conclusion.
    concepts:
      - rebutting_defeater
      - prima_facie_reason
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 485
      section: "Definition 2.4"

  - id: claim4
    type: observation
    statement: >
      An undercutting defeater attacks the connection between reason and
      conclusion rather than the conclusion itself, by providing a reason
      for denying that the reason-conclusion link holds.
    concepts:
      - undercutting_defeater
      - prima_facie_reason
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 485
      section: "Definition 2.5"

  - id: claim5
    type: observation
    statement: >
      Undercutting defeaters have been generally overlooked both in philosophy
      and in AI, yet they are essential for an adequate theory of defeasible
      reasoning.
    concepts:
      - undercutting_defeater
      - nonmonotonic_reasoning
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 485
      section: "Section 2"

  - id: claim6
    type: observation
    statement: >
      A proposition is warranted relative to an epistemic basis iff it is
      supported by some ultimately undefeated argument proceeding from
      that epistemic basis.
    concepts:
      - warrant
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 492
      section: "Principle 4.3"

  - id: claim7
    type: observation
    statement: >
      An argument is ultimately undefeated iff there exists some m such that
      the argument is a level n argument for every n greater than m, where
      level n+1 arguments are those not defeated by any level n argument.
    concepts:
      - defeat_level
      - warrant
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 492
      section: "Definition 4.2"

  - id: claim8
    type: observation
    statement: >
      A self-defeating argument is one that supports a defeater for one of
      its own defeasible steps; such arguments should be excluded from
      competition in the defeat hierarchy.
    concepts:
      - self_defeating_argument
      - defeat_level
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 495
      section: "Definition 4.5"

  - id: claim9
    type: observation
    statement: >
      If a set of propositions is believed and each member has an equally
      good defeasible argument, but the conjunction of their premises
      defeats the original argument, then none of the propositions in the
      set is warranted on those defeasible arguments (collective defeat).
    concepts:
      - collective_defeat
      - warrant
      - prima_facie_reason
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 493
      section: "Principle 4.4"

  - id: claim10
    type: observation
    statement: >
      The set of warranted propositions is deductively consistent.
    concepts:
      - warrant
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 499
      section: "Principle 5.4"

  - id: claim11
    type: observation
    statement: >
      Warrant is closed under deductive consequence: if all premises are
      warranted and the conclusion follows deductively, then the conclusion
      is warranted.
    concepts:
      - warrant
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 499
      section: "Principle 5.6"

  - id: claim12
    type: observation
    statement: >
      When a defeater is itself defeated, the original conclusion should
      be restored through reinstatement.
    concepts:
      - reinstatement
      - defeat_level
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 492
      section: "Section 4"

  - id: claim13
    type: observation
    statement: >
      Reasoning begins from foundational states (perceptual states, memory
      states) that are nondoxastic and can serve as reasons without
      themselves being beliefs, avoiding infinite regress.
    concepts:
      - foundational_state
      - prima_facie_reason
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 483
      section: "Section 1"

  - id: claim14
    type: observation
    statement: >
      Justified belief is what a real reasoner with finite resources should
      believe, using local reasoning rules that appeal to the arguments
      actually constructed rather than the global argument structure.
    concepts:
      - justified_belief
      - warrant
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 504
      section: "Section 6"

  - id: claim15
    type: observation
    statement: >
      AI theories of nonmonotonic reasoning are simplistic and overlook
      the fine structure of defeasible reasoning that epistemologists have
      identified, particularly the distinction between rebutting and
      undercutting defeaters.
    concepts:
      - nonmonotonic_reasoning
      - rebutting_defeater
      - undercutting_defeater
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 482
      section: "Introduction"

  - id: claim16
    type: observation
    statement: >
      The lottery paradox is resolved by identifying the extended argument
      as self-defeating: the argument from individual ticket probabilities
      to each ticket not winning collectively generates a defeater for
      its own premises.
    concepts:
      - self_defeating_argument
      - collective_defeat
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 494
      section: "Section 4.4-4.5"

  - id: claim17
    type: observation
    statement: >
      The OSCAR system stores only immediate bases for beliefs rather than
      entire argument chains, contrasting with Doyle's TMS which stores
      all arguments and creates an excessive memory burden.
    concepts:
      - justified_belief
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 508
      section: "Section 7"

  - id: claim18
    type: observation
    statement: >
      A theory that looks good in the abstract may not work when implemented
      as a program; implementation serves as a mechanical way of generating
      counterexamples to epistemological theories.
    concepts:
      - warrant
      - justified_belief
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 482
      section: "Introduction"

  - id: claim19
    type: observation
    statement: >
      Defeaters can themselves be defeated, creating chains of arbitrary
      depth that the defeat level hierarchy is designed to handle.
    concepts:
      - defeat_level
      - rebutting_defeater
      - undercutting_defeater
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 485
      section: "Section 2"

  - id: claim20
    type: observation
    statement: >
      The deduction theorem analogue holds for warrant: if P is warranted
      relative to the epistemic basis augmented with Q, then the material
      conditional (Q implies P) is warranted relative to the original basis.
    concepts:
      - warrant
    provenance:
      paper: Pollock_1987_DefeasibleReasoning
      page: 499
      section: "Principle 5.7"
