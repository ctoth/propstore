  - id: claim12
    type: mechanism
    statement: "Studies with larger original sample sizes replicate more often because larger samples provide more precise effect estimates that are less likely to be inflated by sampling variability, and the model cannot separate this mechanical effect from the power increase."
    concepts:
      - replication_success
      - original_effect_size
      - effect_size_inflation
    provenance:
      paper: Altmejd_2019_PredictingReplicabilitySocialScience
      page: 14
      section: "S4 Fig"
      quote_fragment: "the model is not very good at capturing the mechanical increase in replication probability from increase sample size"

  - id: claim13
    type: limitation
    statement: "The model is trained on only 131 replication attempts from lab experiments in psychology and economics, and does not generalize to field experiments, observational studies, or other scientific domains."
    concepts:
      - replication_success
    provenance:
      paper: Altmejd_2019_PredictingReplicabilitySocialScience
      page: 10
      section: "Discussion"
      quote_fragment: "our data set is not representative for all experimental social science"

  - id: claim14
    type: limitation
    statement: "The out-of-sample validation set contains only 21 studies (SSRP), limiting the precision of accuracy estimates for the pre-registered test."
    concepts:
