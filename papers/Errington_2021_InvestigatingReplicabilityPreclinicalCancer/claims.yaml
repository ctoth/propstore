  - id: claim18
    type: comparison
    statement: "Unlike Begley and Ellis (2012), who reported only 11% replication in preclinical cancer research, the RPCB finds replication rates ranging from 3% to 82% depending on criterion, showing that the discrepancy arises from criterion choice rather than a single definitive rate."
    concepts:
      - replication_success
      - cognitive_replication_rate
    provenance:
      paper: Errington_2021_InvestigatingReplicabilityPreclinicalCancer
      page: 1
      section: "Introduction"
      quote_fragment: "Begley and Ellis reported only 11% replication"
    notes: "Begley and Ellis may have conflated replicability with other quality measures"

  - id: claim19
    type: comparison
    statement: "Preclinical cancer biology shows approximately 85% effect size shrinkage upon replication, compared to approximately 50% shrinkage in psychology (Open Science Collaboration 2015) and approximately 34% in economics (Camerer et al. 2016), suggesting domain-dependent deflation magnitude."
    concepts:
      - effect_size_shrinkage
      - discipline_replication_asymmetry
    provenance:
      paper: Errington_2021_InvestigatingReplicabilityPreclinicalCancer
      page: 9
      section: "Results"
      quote_fragment: "the median effect size in the replications was 85% smaller"
    notes: "Cross-domain comparison synthesized from this paper and its related work citations"

  - id: claim20
    type: mechanism
    statement: "The approximately 85% shrinkage in replication effect sizes relative to originals is consistent with publication bias inflating original estimates, because selective reporting and p-hacking practices produce inflated effect sizes that shrink toward the true value upon replication."
    concepts:
      - effect_size_shrinkage
      - publication_bias
      - false_positive_rate
    provenance:
      paper: Errington_2021_InvestigatingReplicabilityPreclinicalCancer
      page: 16
      section: "Discussion"
      quote_fragment: "research practices such as p-hacking on the inflation of false positives in the published literature"

