source:
  paper: Alchourron_1985_TheoryChange
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"
claims:
  - id: claim1
    type: observation
    statement: "A theory (belief set) is a deductively closed set of sentences under a consequence operation Cn satisfying inclusion, idempotence, monotonicity, compactness, and introduction of disjunctions in premises."
    concepts:
      - theory
      - belief_set
      - deductive_closure
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 511
      section: "Section 1"

  - id: claim2
    type: observation
    statement: "Partial meet contraction is defined as the intersection of the elements selected by a selection function from the remainder set: K - x = intersection of gamma(K _|_ x)."
    concepts:
      - partial_meet_contraction
      - selection_function
      - remainder_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 512
      section: "Section 2"

  - id: claim3
    type: observation
    statement: "The remainder set K _|_ x consists of all maximal subsets of K that do not imply x."
    concepts:
      - remainder_set
      - theory
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 512
      section: "Section 2"

  - id: claim4
    type: observation
    statement: "The Levi identity defines revision in terms of contraction: K * x = (K - ~x) + x, where + denotes expansion by deductive closure."
    concepts:
      - levi_identity
      - revision
      - contraction
      - expansion
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 511
      section: "Section 1"

  - id: claim5
    type: observation
    statement: "The Harper identity defines contraction in terms of revision: K - x = K intersect K * ~x."
    concepts:
      - harper_identity
      - contraction
      - revision
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 513
      section: "Section 2"

  - id: claim6
    type: observation
    statement: "The six basic AGM contraction postulates (-1 through -6) are: closure, inclusion, vacuity, success, preservation, and recovery."
    concepts:
      - agm_postulates
      - contraction
      - recovery_postulate
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 513
      section: "Section 2"

  - id: claim7
    type: observation
    statement: "A function is a partial meet contraction operation over A if and only if it satisfies postulates (-1) through (-6) (Observation 2.5, representation theorem)."
    concepts:
      - partial_meet_contraction
      - agm_postulates
      - representation_theorem
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 514
      section: "Section 2"

  - id: claim8
    type: observation
    statement: "Every partial meet contraction function satisfies the Gardenfors postulates for contraction, and its associated partial meet revision function satisfies the Gardenfors postulates for revision (Observation 2.3)."
    concepts:
      - partial_meet_contraction
      - agm_postulates
      - contraction
      - revision
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 513
      section: "Section 2"

  - id: claim9
    type: observation
    statement: "Supplementary postulates (-7) and (-8) together characterize exactly the class of transitively relational partial meet contraction functions (Corollary 4.5)."
    concepts:
      - agm_postulates
      - transitively_relational
      - partial_meet_contraction
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 520
      section: "Section 4"

  - id: claim10
    type: observation
    statement: "Full meet contraction, where the selection function always selects the entire remainder set, is the most conservative contraction option."
    concepts:
      - full_meet_contraction
      - selection_function
      - remainder_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 512
      section: "Section 2"

  - id: claim11
    type: observation
    statement: "Maxichoice contraction, where the selection function always selects a singleton from the remainder set, always yields complete (maximal) theories."
    concepts:
      - maxichoice_contraction
      - selection_function
      - remainder_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 512
      section: "Section 2"

  - id: claim12
    type: observation
    statement: "Expansion is defined as K + x = Cn(K union {x}), the deductive closure of the union of the theory with the new sentence."
    concepts:
      - expansion
      - deductive_closure
      - theory
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 511
      section: "Section 1"

  - id: claim13
    type: observation
    statement: "Ventilation (-V) is equivalent to satisfying both supplementary postulates (-7) and (-8) (Observation 6.5)."
    concepts:
      - agm_postulates
      - partial_meet_contraction
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 526
      section: "Section 6"

  - id: claim14
    type: observation
    statement: "In the finite case, the hierarchy of conditions (gamma7:1) through (gamma7:infinity) collapses differently than in the infinite case: (gamma7:1) does not imply (gamma7:2)."
    concepts:
      - selection_function
      - transitively_relational
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 522
      section: "Section 4"

  - id: claim15
    type: observation
    statement: "Connectivity of the ordering relation adds nothing beyond transitivity in the infinite case but matters in the finite case (Observation 5.1)."
    concepts:
      - transitively_relational
      - selection_function
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 523
      section: "Section 5"

  - id: claim16
    type: observation
    statement: "The AGM framework assumes deductively closed (infinite) theories, which raises computability issues for implementation."
    concepts:
      - theory
      - deductive_closure
      - agm_postulates
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 511
      section: "Section 1"

  - id: claim17
    type: observation
    statement: "The selection function is left abstract: the paper does not specify how to choose among remainder sets in practice."
    concepts:
      - selection_function
      - remainder_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 512
      section: "Section 2"

  - id: claim18
    type: observation
    statement: "Maxichoice contraction is characterized by the fullness condition (-F): if y is in A and y is not in A - x, then ~y v x is in A - x (Observation 6.1)."
    concepts:
      - maxichoice_contraction
      - contraction
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 524
      section: "Section 6"
