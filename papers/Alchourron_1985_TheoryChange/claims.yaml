source:
  paper: Alchourron_1985_TheoryChange
  extraction_model: "claude-opus-4-6-20260317"
  extraction_date: "2026-03-17"

claims:
  - id: claim1
    type: observation
    statement: "The class of partial meet contraction functions is precisely the class of operations satisfying the six basic Gardenfors postulates for contraction (K-1 through K-6)."
    concepts:
      - partial_meet_contraction
      - agm_contraction_postulates
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 12
      section: "2. Contraction Functions"
      quote_fragment: "a contraction function satisfies the six basic Gardenfors postulates iff it is a partial meet contraction function"
    notes: "Observation 2.5 in the paper. This is the central representation theorem for contraction."

  - id: claim2
    type: observation
    statement: "The supplementary Gardenfors postulates (K-7 and K-8) characterize exactly the class of transitively relational partial meet contraction functions."
    concepts:
      - partial_meet_contraction
      - transitively_relational
      - agm_supplementary_postulates
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 14
      section: "3. Transitively Relational Partial Meet Functions"
      quote_fragment: "satisfies also the two supplementary postulates iff it is a transitively relational partial meet contraction function"
    notes: "Observation 2.6. Transitively relational means the selection function can be generated by a transitive ordering over remainder sets."

  - id: claim3
    type: observation
    statement: "Revision can be defined in terms of contraction and expansion via the Levi identity: K*x = (K-~x)+x."
    concepts:
      - agm_revision
      - agm_contraction
      - levi_identity
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 17
      section: "4. Revision Functions"
      quote_fragment: "K*x = (K - not-x) + x"
    notes: "The Levi identity shows revision is contraction by the negation followed by expansion."

  - id: claim4
    type: observation
    statement: "Contraction can be defined in terms of revision via the Harper identity: K-x = K intersect K*~x."
    concepts:
      - agm_contraction
      - agm_revision
      - harper_identity
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 18
      section: "4. Revision Functions"
      quote_fragment: "K - x = K intersect K * not-x"
    notes: "The Harper identity establishes the converse direction: contraction from revision."

  - id: claim5
    type: observation
    statement: "Maxichoice contraction (selection function picks exactly one remainder) always produces complete (maximal consistent) theories."
    concepts:
      - maxichoice_contraction
      - complete_theory
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 8
      section: "1. Partial Meet Contraction"
      quote_fragment: "maxichoice contraction function yields a complete theory for every non-tautological sentence"
    notes: "Observation 1.4. This shows maxichoice is too liberal for most applications, since real agents do not hold beliefs on every proposition."

  - id: claim6
    type: observation
    statement: "Full meet contraction (selection function picks all remainders) contracts too much, removing all beliefs not deducible from the remaining axioms minus the target sentence."
    concepts:
      - full_meet_contraction
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 7
      section: "1. Partial Meet Contraction"
    notes: "Full meet is the intersection of ALL remainder sets, which is overly conservative. Partial meet balances between full meet and maxichoice."

  - id: claim7
    type: observation
    statement: "The remainder set K_|_x of a theory K with respect to a sentence x is non-empty whenever x is not a tautology and K is non-empty."
    concepts:
      - remainder_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 5
      section: "1. Partial Meet Contraction"
      quote_fragment: "the remainder set is non-empty iff x is not in Cn(empty)"
    notes: "Proved using Zorn's lemma. This is the fundamental existence result ensuring partial meet contraction is well-defined."

  - id: claim8
    type: observation
    statement: "The recovery postulate (K-5) states that the original theory K can be recovered by first contracting by x and then expanding by x: K is a subset of (K-x)+x."
    concepts:
      - recovery_postulate
      - agm_contraction
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 10
      section: "2. Contraction Functions"
      quote_fragment: "K subset (K - x) + x"
    notes: "The recovery postulate has been the most controversial of the AGM postulates. Subsequent work (e.g., Hansson, Makinson) has explored contraction without recovery."

  - id: claim9
    type: observation
    statement: "If the Levi identity is used to define revision from a partial meet contraction satisfying (K-1)-(K-6), the resulting revision function satisfies the six basic revision postulates (K*1)-(K*6)."
    concepts:
      - levi_identity
      - agm_revision_postulates
      - partial_meet_contraction
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 18
      section: "4. Revision Functions"
    notes: "Observation 4.4. This establishes that the representation theorems transfer cleanly between contraction and revision via the Levi identity."

  - id: claim10
    type: observation
    statement: "The six basic revision postulates (K*1)-(K*6) guarantee that revision preserves consistency (K*x is not the absurd theory) whenever x is not itself contradictory."
    concepts:
      - agm_revision
      - consistency_preservation
    provenance:
      paper: Alchourron_1985_TheoryChange
      page: 17
      section: "4. Revision Functions"
      quote_fragment: "K * x = K_absurd iff x is a contradiction"
    notes: "Postulate K*5. This is a core rationality requirement: revision should not introduce inconsistency unless the new information itself is contradictory."
