source:
  paper: Alchourron_1985_TheoryChange
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"

claims:
  - id: claim1
    type: observation
    statement: "A belief set (theory) is a set of sentences closed under logical consequence, i.e. K = Cn(K)."
    concepts:
      - belief_set
      - deductive_closure
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Preliminaries"

  - id: claim2
    type: observation
    statement: "Contraction postulate K-1: The result of contracting a belief set is itself a belief set (closure under consequence)."
    concepts:
      - contraction
      - agm_postulates
      - belief_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim3
    type: observation
    statement: "Contraction postulate K-2: K-x is a subset of K (contraction never adds new beliefs)."
    concepts:
      - contraction
      - agm_postulates
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim4
    type: observation
    statement: "Contraction postulate K-3 (vacuity): If x is not in K, then K-x = K."
    concepts:
      - contraction
      - agm_postulates
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim5
    type: observation
    statement: "Contraction postulate K-4 (success): If x is not a tautology, then x is not in K-x."
    concepts:
      - contraction
      - agm_postulates
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim6
    type: observation
    statement: "Contraction postulate K-5 (recovery): K is a subset of (K-x)+x, meaning expanding the contracted set by x recovers the original theory."
    concepts:
      - contraction
      - agm_postulates
      - recovery_postulate
      - expansion
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim7
    type: observation
    statement: "Contraction postulate K-6 (extensionality): If Cn(x) = Cn(y), then K-x = K-y."
    concepts:
      - contraction
      - agm_postulates
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim8
    type: observation
    statement: "The remainder set K_|_x consists of all maximal subsets of K that do not logically imply x."
    concepts:
      - remainder_set
      - belief_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 1"

  - id: claim9
    type: observation
    statement: "A selection function gamma picks a non-empty subset of the remainder set K_|_x when K_|_x is non-empty, and returns {K} otherwise."
    concepts:
      - selection_function
      - remainder_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim10
    type: equation
    statement: "Partial meet contraction is defined as the intersection of remainders chosen by the selection function."
    expression: "K - x = intersection(gamma(K _|_ x))"
    sympy: "Intersection(*gamma(remainder(K, x)))"
    variables:
      K: "belief set"
      x: "sentence to contract"
      gamma: "selection function"
    concepts:
      - partial_meet_contraction
      - selection_function
      - remainder_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim11
    type: equation
    statement: "The Levi identity defines revision in terms of contraction followed by expansion."
    expression: "K * x = (K - ~x) + x"
    sympy: "expansion(contraction(K, Not(x)), x)"
    variables:
      K: "belief set"
      x: "sentence to revise by"
    concepts:
      - levi_identity
      - revision
      - contraction
      - expansion
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 3"

  - id: claim12
    type: equation
    statement: "The Harper identity defines contraction in terms of revision."
    expression: "K - x = K intersect (K * ~x)"
    sympy: "Intersection(K, revision(K, Not(x)))"
    variables:
      K: "belief set"
      x: "sentence to contract"
    concepts:
      - harper_identity
      - contraction
      - revision
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 3"

  - id: claim13
    type: equation
    statement: "Expansion adds a sentence and closes under consequence."
    expression: "K + x = Cn(K union {x})"
    sympy: "Cn(Union(K, FiniteSet(x)))"
    variables:
      K: "belief set"
      x: "sentence to add"
    concepts:
      - expansion
      - deductive_closure
      - belief_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 3"

  - id: claim14
    type: observation
    statement: "Representation theorem (Observation 2.5): A contraction function satisfies postulates K-1 through K-6 if and only if it is a partial meet contraction function."
    concepts:
      - representation_theorem
      - agm_postulates
      - partial_meet_contraction
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim15
    type: observation
    statement: "Representation theorem (Observation 2.6): The supplementary postulates K-7 and K-8 together with the basic postulates characterize exactly the transitively relational partial meet contraction functions."
    concepts:
      - representation_theorem
      - agm_postulates
      - partial_meet_contraction
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim16
    type: observation
    statement: "Maxichoice contraction, where the selection function always picks exactly one remainder, yields complete (maximal) theories."
    concepts:
      - maxichoice_contraction
      - selection_function
      - remainder_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 1"

  - id: claim17
    type: observation
    statement: "Full meet contraction, where the selection function picks all remainders, is the most conservative contraction operation."
    concepts:
      - full_meet_contraction
      - selection_function
      - remainder_set
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 2"

  - id: claim18
    type: observation
    statement: "Revision postulate K*2 (success): x is in K*x, meaning the new information is always accepted."
    concepts:
      - revision
      - agm_postulates
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 4"

  - id: claim19
    type: observation
    statement: "Revision postulate K*5 (consistency preservation): K*x is inconsistent if and only if x itself is logically contradictory."
    concepts:
      - revision
      - agm_postulates
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 4"

  - id: claim20
    type: observation
    statement: "The Levi and Harper identities establish a duality between contraction and revision: each operation can be defined in terms of the other, and the postulates for one can be derived from the postulates for the other via these identities."
    concepts:
      - levi_identity
      - harper_identity
      - contraction
      - revision
    provenance:
      paper: Alchourron_1985_TheoryChange
      section: "Section 3"
