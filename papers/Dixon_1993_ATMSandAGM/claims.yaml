source:
  paper: Dixon_1993_ATMSandAGM
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"
claims:
  - id: claim1
    type: observation
    statement: "ATMS context switching (environment changes) can be modelled as sequences of AGM expansion and contraction operations."
    concepts:
      - assumption_based_tms
      - environment
      - expansion
      - contraction
      - agm_postulates
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 534
      section: "Section 1"

  - id: claim2
    type: observation
    statement: "The ATMS and AGM systems are behaviourally equivalent: for all propositions p, E proves p in the ATMS if and only if p is in the AGM belief set K (Theorem 1)."
    concepts:
      - assumption_based_tms
      - agm_postulates
      - belief_set
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 538
      section: "Section 5"

  - id: claim3
    type: observation
    statement: "The ATMS_to_AGM algorithm translates ATMS justificational information into an epistemic entrenchment ordering that simulates ATMS behaviour in the AGM model."
    concepts:
      - assumption_based_tms
      - epistemic_entrenchment
      - justification
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 537
      section: "Section 4.3"

  - id: claim4
    type: observation
    statement: "Five discrete entrenchment levels (E1 < E2 < E3 < E4 < E5) suffice to encode all distinctions needed for ATMS-AGM behavioural equivalence."
    concepts:
      - epistemic_entrenchment
      - assumption_based_tms
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 536
      section: "Section 4"

  - id: claim5
    type: observation
    statement: "The entrenchment equality Ent(a) = Ent(a v b) encodes that assumption a essentially supports proposition b, while Ent(a) < Ent(a v b) encodes independence."
    concepts:
      - epistemic_entrenchment
      - assumption
      - foundational_belief
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 536
      section: "Section 4"

  - id: claim6
    type: observation
    statement: "The essential support ES(p,E) is the intersection of all foundational belief sets for p in environment E: the assumptions appearing in every support for p."
    concepts:
      - foundational_belief
      - environment
      - assumption
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 537
      section: "Section 4.2"

  - id: claim7
    type: observation
    statement: "Coherence-based AGM logic can mimic foundational behaviour through appropriate choice of epistemic entrenchment, bridging the foundational/coherence divide."
    concepts:
      - agm_postulates
      - epistemic_entrenchment
      - foundational_belief
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 534
      section: "Section 1"

  - id: claim8
    type: observation
    statement: "Only a partial entrenchment ordering is needed because many entrenchment values need not be consulted -- only relationships involving atoms in the current environment matter."
    concepts:
      - epistemic_entrenchment
      - environment
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 536
      section: "Section 4"

  - id: claim9
    type: observation
    statement: "The minimal change principle cannot apply to the entrenchment relation itself: extensive revisions of entrenchment are often necessary to keep the system effectively independent of its previous state."
    concepts:
      - epistemic_entrenchment
      - revision
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 537
      section: "Section 4.3"

  - id: claim10
    type: observation
    statement: "The ATMS cannot perform rule revision: justifications cannot be altered once added without restarting the entire system."
    concepts:
      - assumption_based_tms
      - justification
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 537
      section: "Section 4.3"

  - id: claim11
    type: observation
    statement: "The AGM framework's ability to decrease entrenchment of any formula provides a natural mechanism for rule revision, which the ATMS cannot support without full restart."
    concepts:
      - agm_postulates
      - epistemic_entrenchment
      - assumption_based_tms
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 537
      section: "Section 4.3"

  - id: claim12
    type: observation
    statement: "For all a in E and all b: Ent_E(a) = Ent_E(a v b) if and only if a is in ES(b,E) (Lemma 1)."
    concepts:
      - epistemic_entrenchment
      - foundational_belief
      - environment
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 538
      section: "Section 5"

  - id: claim13
    type: observation
    statement: "Determining whether Ent(a) = Ent(a v y) (essential support) or Ent(a) < Ent(a v y) (independence) is the job of the problem solver, not the TMS."
    concepts:
      - epistemic_entrenchment
      - truth_maintenance_system
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 537
      section: "Section 4.3"

  - id: claim14
    type: observation
    statement: "The AGM operations all produce closed theories which are usually infinite; solutions using finite theory bases weaken the AGM postulates."
    concepts:
      - agm_postulates
      - theory
      - deductive_closure
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 535
      section: "Section 3"

  - id: claim15
    type: observation
    statement: "The foundational and coherence traditions of belief management had developed in near-complete isolation from each other."
    concepts:
      - foundational_belief
      - belief_set
      - truth_maintenance_system
    provenance:
      paper: Dixon_1993_ATMSandAGM
      page: 534
      section: "Section 1"
