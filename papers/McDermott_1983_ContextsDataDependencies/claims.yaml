source:
  paper: McDermott_1983_ContextsDataDependencies
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"
claims:
  - id: claim1
    type: observation
    statement: "Data pools (contexts) and data dependencies are not separate mechanisms: a bead in a data pool is equivalent to a premiss justification, and pool membership is equivalent to a dependency label."
    concepts:
      - data_pool
      - data_dependency
      - bead
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 240
      section: "Part II"

  - id: claim2
    type: observation
    statement: "A data pool is a pair (b, S) where b is a bead (natural number) and S is a set of natural numbers, with operations for copying, pushing down, adding, and erasing assertions."
    concepts:
      - data_pool
      - bead
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 237
      section: "Part I"

  - id: claim3
    type: observation
    statement: "A justification is a tuple (in-justifiers, out-justifiers, justificand), replacing Doyle's support-list justifications."
    concepts:
      - justification
      - data_dependency
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 239
      section: "Part I"

  - id: claim4
    type: observation
    statement: "Labels are Boolean combinations of beads stored in disjunctive normal form, encoding an assertion's status across all data pools simultaneously."
    concepts:
      - boolean_label
      - bead
      - data_pool
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 241
      section: "Part II"

  - id: claim5
    type: observation
    statement: "The Boolean substitution algorithm for finding consistent, well-founded labelings always halts because every substitution eliminates one variable."
    concepts:
      - boolean_label
      - well_founded_labeling
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 242
      section: "Part II"

  - id: claim6
    type: observation
    statement: "An odd loop is a cycle of justifications with an odd number of negative links (out-justifier appearances), which prevents any consistent labeling."
    concepts:
      - odd_loop
      - well_founded_labeling
      - data_dependency
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 242
      section: "Part II"

  - id: claim7
    type: observation
    statement: "Even loops always have consistent labelings; only odd loops must be forbidden in dependency networks."
    concepts:
      - odd_loop
      - well_founded_labeling
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 242
      section: "Part II"

  - id: claim8
    type: observation
    statement: "When a self-referential equation A = f(A) has multiple solutions, the algorithm picks A = f(OUT), the outest (most OUT) solution, ensuring no assertion is IN without grounded support."
    concepts:
      - well_founded_labeling
      - boolean_label
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 242
      section: "Part II"

  - id: claim9
    type: observation
    statement: "Worst-case label computation complexity is n^2 substitutions when every assertion is directly connected to every other, but typical case is much better."
    concepts:
      - boolean_label
      - data_dependency
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 242
      section: "Part II"

  - id: claim10
    type: observation
    statement: "Bead subsumption optimization: when B1 is created by pushing from B2's pool, B1 subsumes B2, and the label B1 V B2 simplifies to B2."
    concepts:
      - bead
      - boolean_label
      - data_pool
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 241
      section: "Part II"

  - id: claim11
    type: observation
    statement: "Blocking beads are attached to latent assertions and checked every time a bead enters or leaves a data pool; when the transition causes a latent assertion to become present, it is indexed and forward chaining proceeds."
    concepts:
      - blocking_bead
      - latent_assertion
      - data_pool
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 243
      section: "Part III"

  - id: claim12
    type: observation
    statement: "Signal functions provide a decoupled communication interface between the knowledge-representation level and the data-dependency level, signaling when an assertion changes status."
    concepts:
      - signal_function
      - data_dependency
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 240
      section: "Part II"

  - id: claim13
    type: observation
    statement: "In Doyle's original algorithm, status assignments were never explicitly computed; they were determined from the justification set and recomputed on each pool switch. The Boolean label approach summarizes all status computations simultaneously."
    concepts:
      - boolean_label
      - truth_maintenance_system
      - data_pool
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 241
      section: "Part II"

  - id: claim14
    type: observation
    statement: "Labels can grow exponentially with the depth of well-founded support when assertions have multiple proofs, though this is rare in practice."
    concepts:
      - boolean_label
      - well_founded_labeling
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 242
      section: "Part II"

  - id: claim15
    type: observation
    statement: "Implementation benchmark: approximately 0.3 ms per node for adding a justification, about 3 CONSes per node for label computation, on a 200-node test network."
    concepts:
      - data_dependency
      - boolean_label
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 244
      section: "Part III"

  - id: claim16
    type: observation
    statement: "Data pools offer only coarse-grained control (fast switching but no reason tracking), while data dependencies offer fine-grained reason tracking but expensive status recomputation; the combined framework preserves the advantages of each."
    concepts:
      - data_pool
      - data_dependency
    provenance:
      paper: McDermott_1983_ContextsDataDependencies
      page: 237
      section: "Part I"
