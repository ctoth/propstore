source:
  paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"

claims:
  - id: claim1
    type: observation
    statement: >
      A bipolar argumentation framework is a tuple (A, R_def, R_sup) where A is
      a finite set of arguments, R_def is a defeat relation, and R_sup is a
      support relation, with the two relations being entirely independent.
    concepts:
      - bipolar_argumentation_framework
      - attack_relation
      - support_relation
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 382
      section: "Definition 1"

  - id: claim2
    type: observation
    statement: >
      A supported defeat for argument B is a sequence where support edges lead
      to an argument that directly defeats B, combining positive and negative
      interactions.
    concepts:
      - supported_defeat
      - support_relation
      - attack_relation
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 383
      section: "Definition 3"

  - id: claim3
    type: observation
    statement: >
      An indirect defeat for argument B is a sequence where an initial defeat
      edge is followed by support edges leading to B, so that defeating a
      supporter indirectly defeats the supported argument.
    concepts:
      - indirect_defeat
      - support_relation
      - attack_relation
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 383
      section: "Definition 3"

  - id: claim4
    type: observation
    statement: >
      A set S is safe iff no argument is simultaneously set-defeated and
      either set-supported or a member of S, capturing external coherence
      between support and defeat.
    concepts:
      - safe_set
      - bipolar_argumentation_framework
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 385
      section: "Definition 7"

  - id: claim5
    type: observation
    statement: >
      If a set S is safe then S is conflict-free; if S is conflict-free and
      closed under the support relation then S is safe.
    concepts:
      - safe_set
      - conflict_free_set
      - support_relation
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 385
      section: "Property 1"

  - id: claim6
    type: observation
    statement: >
      A d-admissible set is conflict-free and defends all its elements using
      set-defeat, directly generalizing Dung's admissibility.
    concepts:
      - d_admissible
      - conflict_free_set
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 386
      section: "Definition 9"

  - id: claim7
    type: observation
    statement: >
      An s-admissible set is safe and defends all its elements, enforcing
      external coherence between support and defeat relations.
    concepts:
      - s_admissible
      - safe_set
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 386
      section: "Definition 10"

  - id: claim8
    type: observation
    statement: >
      A c-admissible set is conflict-free, closed under the support relation,
      and defends all its elements, providing the strongest bipolar admissibility.
    concepts:
      - c_admissible
      - conflict_free_set
      - support_relation
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 386
      section: "Definition 11"

  - id: claim9
    type: observation
    statement: >
      The admissibility hierarchy for bipolar frameworks is:
      c-admissible implies s-admissible implies d-admissible.
    concepts:
      - c_admissible
      - s_admissible
      - d_admissible
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 386
      section: "Section 5"

  - id: claim10
    type: observation
    statement: >
      There exists at least one d-preferred, s-preferred, and c-preferred
      extension for any bipolar argumentation framework.
    concepts:
      - d_admissible
      - s_admissible
      - c_admissible
      - bipolar_argumentation_framework
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 386
      section: "Property 2"

  - id: claim11
    type: observation
    statement: >
      For acyclic bipolar argumentation frameworks, the s-preferred and
      c-preferred extensions are subsets of the unique stable extension.
    concepts:
      - s_admissible
      - c_admissible
      - stable_extension
      - bipolar_argumentation_framework
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 387
      section: "Property 4"

  - id: claim12
    type: observation
    statement: >
      When the unique stable extension of an acyclic BAF is safe, it equals
      the unique s-preferred extension and is also a d-preferred extension.
    concepts:
      - stable_extension
      - s_admissible
      - d_admissible
      - safe_set
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 387
      section: "Property 4(2)"

  - id: claim13
    type: observation
    statement: >
      A stable extension of a bipolar argumentation framework is not safe iff
      it set-supports an element outside the extension.
    concepts:
      - stable_extension
      - safe_set
      - support_relation
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 386
      section: "Consequence 1"

  - id: claim14
    type: observation
    statement: >
      Dung's framework models only defeat between arguments; however, arguments
      can also support each other independently, and this support relation
      cannot be reduced to or derived from the defeat relation.
    concepts:
      - argumentation_framework
      - support_relation
      - bipolar_argumentation_framework
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 378
      section: "Introduction"

  - id: claim15
    type: observation
    statement: >
      Dung's notion of conflict-free is insufficient for bipolar coherence
      because a set can be conflict-free yet still externally incoherent by
      simultaneously defeating and supporting the same argument.
    concepts:
      - conflict_free_set
      - safe_set
      - bipolar_argumentation_framework
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 384
      section: "Section 4"

  - id: claim16
    type: observation
    statement: >
      The bipolar argumentation framework can be reduced to a standard Dung
      framework by using set-defeats (incorporating supported and indirect
      defeats) as the attack relation, ensuring Dung's extension existence
      results carry over.
    concepts:
      - bipolar_argumentation_framework
      - argumentation_framework
      - supported_defeat
      - indirect_defeat
    provenance:
      paper: Cayrol_2005_AcceptabilityArgumentsBipolarArgumentation
      page: 385
      section: "Section 4"
