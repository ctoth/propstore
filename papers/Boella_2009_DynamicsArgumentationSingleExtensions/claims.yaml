claims:
  - id: claim1
    type: observation
    statement: "Single-extension semantics can be represented as a partial acceptance function A that maps each argumentation framework to exactly one subset of its arguments, making grounded and skeptical preferred semantics amenable to principle-based dynamic analysis."
    concepts:
      - acceptability
      - dung_framework
    context: ctx_abstract_argumentation
    provenance:
      paper: Boella_2009_DynamicsArgumentationSingleExtensions
      page: 4
      section: "2.3 The single extension case"
      quote_fragment: "A single extension acceptance function A ... maps an argumentation framework to a subset of the set of all multiple extensions acceptance functions"

  - id: claim2
    type: observation
    statement: "For a conflict-free extension, the framework is partitioned into accepted arguments A(AF), rejected arguments R(AF) attacked by some accepted argument, and undecided arguments U(AF) that are in neither of the first two sets."
    concepts:
      - acceptability
      - dung_framework
    context: ctx_abstract_argumentation
    provenance:
      paper: Boella_2009_DynamicsArgumentationSingleExtensions
      page: 5
      section: "2.5 Caminada labeling"
      quote_fragment: "then B is partitioned into A(AF), R(AF) and U(AF)"

  - id: claim3
    type: comparison
    statement: "Grounded semantics has no attack from an undecided argument to an accepted argument, whereas skeptical preferred semantics does not satisfy this property."
    concepts:
      - acceptability
      - dung_framework
    context: ctx_abstract_argumentation
    provenance:
      paper: Boella_2009_DynamicsArgumentationSingleExtensions
      page: 6
      section: "3 Attack abstraction principles"
      quote_fragment: "The grounded semantics satisfies the following principle, whereas the skeptical preferred semantics does not"

  - id: claim4
    type: observation
    statement: "Any attack outgoing from a rejected argument can be removed without changing the grounded extension."
    concepts:
      - acceptability
      - dung_framework
    context: ctx_abstract_argumentation
    provenance:
      paper: Boella_2009_DynamicsArgumentationSingleExtensions
      page: 6
      section: "Proposition 1"
      quote_fragment: "The grounded semantics satisfies the ... RA, RR, RU attack abstraction principles"

  - id: claim5
    type: mechanism
    statement: "Conditional attack abstraction for grounded semantics succeeds when the deleted attack is not the only reason its target stays out of the grounded extension, for example because another accepted argument attacks the source or target, or because acyclicity and non-backattack conditions preserve the same rejection structure."
    concepts:
      - acceptability
      - dung_framework
    context: ctx_abstract_argumentation
    provenance:
      paper: Boella_2009_DynamicsArgumentationSingleExtensions
      page: 7
      section: "3 Attack abstraction principles"
      quote_fragment: "the challenge is therefore to define suitable conditions ... there must be another reason why b does not become accepted"
    notes: "Summarizes Principles 2-4 and Propositions 2-4."

  - id: claim6
    type: observation
    statement: "Removing a rejected argument never changes the grounded extension."
    concepts:
      - acceptability
      - dung_framework
    context: ctx_abstract_argumentation
    provenance:
