      quote_fragment: "The following proposition shows that only R abstraction is satisfied"

  - id: claim7
    type: limitation
    statement: "Full undecided-argument abstraction does not hold for grounded semantics because an undecided argument can block another argument from becoming accepted."
    concepts:
      - acceptability
      - dung_framework
    context: ctx_abstract_argumentation
    provenance:
      paper: Boella_2009_DynamicsArgumentationSingleExtensions
      page: 10
      section: "4 Argument abstraction principles"
      quote_fragment: "an attack from an undecided argument may 'block' an argument, i.e., prevents the argument to be accepted"

  - id: claim8
    type: observation
    statement: "Grounded semantics does satisfy three restricted undecided-argument abstraction principles: deleting an undecided argument is safe when it attacks only accepted arguments, only rejected arguments, or only undecided arguments that are also attacked by another undecided argument."
    concepts:
