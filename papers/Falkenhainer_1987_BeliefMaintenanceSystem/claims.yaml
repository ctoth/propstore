source:
  paper: Falkenhainer_1987_BeliefMaintenanceSystem
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"
claims:
  - id: claim1
    type: observation
    statement: "A Belief Maintenance System (BMS) extends justification-based Truth Maintenance Systems to manage probabilistic beliefs using Dempster-Shafer intervals [s(A), p(A)], replacing binary true/false states with continuous belief values while preserving TMS-like dependency-driven propagation."
    concepts:
      - belief_maintenance_system
      - truth_maintenance_system
      - dempster_shafer_theory
      - belief_propagation
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 71
      section: "Key Contributions"

  - id: claim2
    type: observation
    statement: "The BMS reduces to a standard TMS when all beliefs are absolute (0 or 1), ensuring backward compatibility with existing TMS applications."
    concepts:
      - belief_maintenance_system
      - truth_maintenance_system
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 71
      section: "Key Contributions"

  - id: claim3
    type: observation
    statement: "Support links in the BMS are of two types: hard links (provide absolute statement of consequent's belief via conjunctive/disjunctive formulas) and invertible links (allow old evidence to be subtracted via inverse Dempster's rule before new evidence is added)."
    concepts:
      - support_link
      - belief_maintenance_system
      - dempster_shafer_theory
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 72
      section: "Support Link Types"

  - id: claim4
    type: observation
    statement: "Belief propagation terminates when both positive and negative belief changes are below a propagation-delta threshold (default 10^-3), preventing infinite propagation cascades in large networks."
    concepts:
      - belief_propagation
      - belief_maintenance_system
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 73
      section: "Belief Propagation"

  - id: claim5
    type: observation
    statement: "Circular support structures are prohibited in the BMS because they cause three problems: evidence amplification around loops, ambiguous source attribution, and quadratic retraction cost."
    concepts:
      - belief_maintenance_system
      - belief_propagation
      - support_link
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 73
      section: "Circular Support Handling"

  - id: claim6
    type: observation
    statement: "The BMS handles non-monotonic reasoning more elegantly than two or three valued logic systems: the classic birds-fly default can be represented as (bird ?x) -> (fly ?x)_{[0.90, 0.95]} with exceptions overriding automatically without special control structure changes."
    concepts:
      - belief_maintenance_system
      - non_monotonic_reasoning
      - dempster_shafer_theory
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 74
      section: "Non-Monotonic Reasoning Support"

  - id: claim7
    type: observation
    statement: "Frames of discernment allow user-defined exhaustive sets of mutually exclusive possibilities, where new evidence for one body node automatically computes updated beliefs for all nodes in the frame via Dempster's rule."
    concepts:
      - frame_of_discernment
      - dempster_shafer_theory
      - belief_maintenance_system
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 73
      section: "Frames of Discernment"

  - id: claim8
    type: observation
    statement: "The BMS basic design is semi-independent of the specific belief system used: a simple parser translates user assertions into control primitives, and the Dempster-Shafer formalism should be fairly easy to replace with alternative uncertainty calculi."
    concepts:
      - belief_maintenance_system
      - dempster_shafer_theory
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 71
      section: "Methodology"

  - id: claim9
    type: observation
    statement: "The BMS rule engine supports three trigger types: INTERN (fires on fact addition), BELIEF+ (fires when support exceeds threshold), and BELIEF- (fires when counter-support exceeds threshold), enabling both structural pattern matching and belief-level-sensitive reasoning."
    concepts:
      - belief_maintenance_system
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 74
      section: "Rule Engine"

  - id: claim10
    type: observation
    statement: "Doyle's non-monotonic TMS fails to account for degrees of belief and cannot combine evidence from multiple uncertain sources, motivating the extension to continuous-valued beliefs."
    concepts:
      - truth_maintenance_system
      - belief_maintenance_system
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 71
      section: "Problem Addressed"

  - id: claim11
    type: observation
    statement: "Previous probabilistic reasoning systems (Pearl 1983, Buchanan et al 1984) used static networks that cannot be dynamically modified, lacking the ability to add or retract nodes and links at runtime."
    concepts:
      - belief_maintenance_system
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 71
      section: "Problem Addressed"

  - id: claim12
    type: observation
    statement: "In a probabilistic architecture, each source of support adds to and removes from belief via Dempster's rule; retracting a support link does not necessarily change a node's status if other supports remain, unlike binary TMS where a single justification suffices."
    concepts:
      - belief_propagation
      - dempster_shafer_theory
      - support_link
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 73
      section: "Belief Propagation"

  - id: claim13
    type: observation
    statement: "Explicit transitivity relations cause problems in the BMS: asserting A->C based on A->B and B->C increases C's belief even though it makes explicit information that already existed in the dependency chain."
    concepts:
      - belief_maintenance_system
      - belief_propagation
    provenance:
      paper: Falkenhainer_1987_BeliefMaintenanceSystem
      page: 73
      section: "Circular Support Handling"
