source:
  paper: Falkenhainer_1987_BeliefMaintenanceSystem
  extraction_model: "claude-opus-4-20250514"
  extraction_date: "2026-03-22"

claims:
  - id: claim1
    type: model
    name: belief_maintenance_system
    statement: "A Belief Maintenance System (BMS) extends justification-based Truth Maintenance Systems to manage probabilistic beliefs using Dempster-Shafer intervals [s(A), p(A)] instead of binary true/false states, with automatic dependency-driven propagation through support links."
    concepts:
      - belief_maintenance_system
      - dempster_shafer_interval
      - truth_maintenance_system
      - support_link
    equations:
      - "[s(A), p(A)] where p(A) = 1 - s(not-A)"
    parameters:
      - name: s_A
        description: "Current amount of support for proposition A (belief function value)"
      - name: p_A
        description: "Plausibility of A, equal to 1 - s(not-A)"

  - id: claim2
    type: equation
    statement: "Dempster's rule for combining two belief sources in the two-valued case uses the orthogonal sum formula."
    expression: "(a b) + (c d) = (1 - (1-a)(1-c)/(1-(ad+bc)), 1 - (1-b)(1-d)/(1-(ad+bc)))"
    sympy: "((1 - (1-a)*(1-c)/(1-(a*d+b*c))), (1 - (1-b)*(1-d)/(1-(a*d+b*c))))"
    variables:
      a: "Support for A from source 1"
      b: "Plausibility of A from source 1"
      c: "Support for A from source 2"
      d: "Plausibility of A from source 2"
    concepts:
      - dempster_shafer_interval
      - belief_maintenance_system

  - id: claim3
    type: equation
    statement: "The NOT operator on Dempster-Shafer intervals inverts the interval: NOT(A_[s,p]) = A_[1-p, 1-s]."
    expression: "NOT(A_[s,p]) = A_[1-p, 1-s]"
    sympy: "(1 - p, 1 - s)"
    variables:
      s: "Support for A"
      p: "Plausibility of A"
    concepts:
      - dempster_shafer_interval

  - id: claim4
    type: equation
    statement: "The AND operator for conjuncts uses the formula: (A & B & C)_[max(s_A + s_B + s_C - 2, 0), min(s_A, s_B, s_C)] where -2 represents (1 - cardinality of conjuncts)."
    expression: "AND(A,B,C) = [max(s_A + s_B + s_C - 2, 0), min(s_A, s_B, s_C)]"
    sympy: "(Max(s_A + s_B + s_C - 2, 0), Min(s_A, s_B, s_C))"
    variables:
      s_A: "Support for conjunct A"
      s_B: "Support for conjunct B"
      s_C: "Support for conjunct C"
    concepts:
      - dempster_shafer_interval

  - id: claim5
    type: observation
    statement: "The BMS reduces to standard TMS behavior when all beliefs are absolute (0 or 1), making it a proper generalization of justification-based truth maintenance."
    concepts:
      - belief_maintenance_system
      - truth_maintenance_system

  - id: claim6
    type: observation
    statement: "Support links in the BMS have two types: hard links that provide an absolute statement of the consequent's belief, and invertible links that allow evidence subtraction via inverted Dempster's rule before new evidence is added."
    concepts:
      - support_link
      - belief_maintenance_system

  - id: claim7
    type: observation
    statement: "Belief propagation terminates early when both positive and negative belief changes at a node fall below the propagation-delta threshold, preventing infinite propagation cascades."
    concepts:
      - belief_propagation
      - belief_maintenance_system

  - id: claim8
    type: parameter
    statement: "The default propagation-delta threshold below which belief changes are not propagated further is 10^-3."
    target_concept: belief_propagation
    concept: belief_propagation
    value: 0.001
    unit: dimensionless

  - id: claim9
    type: observation
    statement: "Circular support structures are not handled by the BMS; the system signals an error when one is discovered, because circular evidence amplifies belief along the loop and retraction requires quadratic propagation cost."
    concepts:
      - support_link
      - belief_propagation
      - belief_maintenance_system

  - id: claim10
    type: observation
    statement: "The BMS handles non-monotonic reasoning more elegantly than binary logic systems: the classic 'birds fly' default can be expressed as a graded implication (bird ?x) -> (fly ?x)_[0.90, 0.95] that is naturally overridden by stronger evidence without special control structures."
    concepts:
      - belief_maintenance_system
      - non_monotonic_reasoning
      - dempster_shafer_interval

  - id: claim11
    type: observation
    statement: "The BMS rule engine supports three trigger types: INTERN (fires when new fact is added), BELIEF+ (fires when support for a pattern exceeds threshold), and BELIEF- (fires when support against a pattern exceeds threshold)."
    concepts:
      - belief_maintenance_system
      - belief_propagation

  - id: claim12
    type: observation
    statement: "Frames of discernment enable the BMS to reason about user-defined possibility spaces of mutually exclusive hypotheses, with Dempster's rule combining evidence across the frame."
    concepts:
      - frame_of_discernment
      - dempster_shafer_interval

  - id: claim13
    type: observation
    statement: "For any node in the BMS, belief uncertainty equals 1 minus the sum of support for and support against: uncertainty = 1 - belief+(node) - belief-(node), which must be non-negative."
    concepts:
      - dempster_shafer_interval
      - belief_maintenance_system
