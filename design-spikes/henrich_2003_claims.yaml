source:
  paper: Henrich_2003_JND_OpenQuotient
  extraction_model: hand-written-design-spike
  extraction_date: "2026-03-17"

claims:

  # --- JND absolute measurements ---

  - id: claim1
    type: measurement
    target_concept: open_quotient
    measure: jnd_absolute
    value: 0.058
    uncertainty: 0.019
    uncertainty_type: sd
    unit: ratio
    listener_population: "untrained (G1, n=20)"
    methodology: "3-interval forced-choice, 2-down 1-up adaptive staircase"
    sample_size: 20
    provenance:
      paper: Henrich_2003_JND_OpenQuotient
      page: 0
      table: "Table 2"
    conditions:
      - "open_quotient == 0.4"

  - id: claim2
    type: measurement
    target_concept: open_quotient
    measure: jnd_absolute
    value: 0.037
    uncertainty: 0.010
    uncertainty_type: sd
    unit: ratio
    listener_population: "trained (G2, n=10, 3 repetitions)"
    methodology: "3-interval forced-choice, 2-down 1-up adaptive staircase"
    sample_size: 10
    provenance:
      paper: Henrich_2003_JND_OpenQuotient
      page: 0
      table: "Table 2"
    conditions:
      - "open_quotient == 0.4"

  - id: claim3
