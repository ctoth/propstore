- name: depysible_bird_tina
  description: Tina is definitely and defeasibly a bird by the strict chicken rule.
  tags: [bird, tina]
  theory:
    facts:
      chicken: [[tina]]
      penguin: [[tweety]]
      scared: [[tina]]
    strict_rules:
      - id: r1
        head: "bird(X)"
        body: ["chicken(X)"]
      - id: r2
        head: "bird(X)"
        body: ["penguin(X)"]
      - id: r3
        head: "~flies(X)"
        body: ["penguin(X)"]
    defeasible_rules:
      - id: r4
        head: "flies(X)"
        body: ["bird(X)"]
      - id: r5
        head: "flies(X)"
        body: ["chicken(X)", "scared(X)"]
      - id: r6
        head: "~flies(X)"
        body: ["chicken(X)"]
      - id: r7
        head: "nests_in_trees(X)"
        body: ["flies(X)"]
    defeaters: []
    superiority: []
  expect:
    'yes':
      bird: [[tina], [tweety]]
