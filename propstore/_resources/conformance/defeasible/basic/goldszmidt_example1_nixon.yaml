- name: goldszmidt_example1_pacifist_conflict
  description: >
    Adapted from Goldszmidt and Pearl 1992 Example 1 as recorded in local notes. The pacifist
    query is unresolved in the supported blocking implementation because the opposing defaults
    remain in conflict.
  tags: [nixon, pacifist, conflict]
  theory:
    facts:
      nixonian: [[nixon]]
      quaker: [[nixon]]
    strict_rules: []
    defeasible_rules:
      - id: r1
        head: "republican(X)"
        body: ["nixonian(X)"]
      - id: r2
        head: "pacifist(X)"
        body: ["quaker(X)"]
      - id: r3
        head: "~pacifist(X)"
        body: ["republican(X)"]
    defeaters: []
    superiority: []
  expect:
    undecided:
      pacifist: [[nixon]]
      "~pacifist": [[nixon]]
