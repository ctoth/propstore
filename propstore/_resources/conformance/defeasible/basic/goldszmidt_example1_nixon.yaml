tests:
- name: goldszmidt_example1_nixonian_nixon
  description: >
    Adapted from Goldszmidt and Pearl 1992 Example 1 as recorded in local notes. Nixon is
    explicitly Nixonian.
  tags: [nixon, nixonian]
  theory:
    facts:
      nixonian: [[nixon]]
      quaker: [[nixon]]
    strict_rules: []
    defeasible_rules:
      - id: r1
        head: "republican(X)"
        body: ["nixonian(X)"]
      - id: r2
        head: "pacifist(X)"
        body: ["quaker(X)"]
      - id: r3
        head: "~pacifist(X)"
        body: ["republican(X)"]
    defeaters: []
    superiority: []
  expect:
    'yes':
      nixonian: [[nixon]]
- name: goldszmidt_example1_quaker_nixon
