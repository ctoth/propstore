id: speech_0017
canonical_name: harmonic_richness_factor
status: proposed
definition: Ratio of the sum of amplitudes of all harmonics above the fundamental
  to the amplitude of the fundamental. Higher values indicate more energy in upper
  harmonics (pressed voice); lower values indicate fundamental dominance (breathy
  voice).
domain: speech
created_date: '2026-03-15'
form: level
form_parameters:
  reference: "fundamental amplitude (ratio of upper harmonics to fundamental, expressed in dB)"
