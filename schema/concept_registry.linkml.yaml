id: https://propstore.local/schema/concept-registry
name: concept_registry
title: Propositional Knowledge Store — Concept Registry
version: 0.2.0

prefixes:
  linkml: https://w3id.org/linkml/
  propstore: https://propstore.local/schema/
  skos: http://www.w3.org/2004/02/skos/core#
  qudt: http://qudt.org/vocab/unit/
  prov: http://www.w3.org/ns/prov#

imports:
  - linkml:types

default_range: string


enums:

  ConceptStatus:
    description: >
      Lifecycle state. Concepts are born proposed, reviewed to accepted,
      and never deleted — only deprecated with a successor link.
    permissible_values:
      proposed:
        description: Extracted by LLM or noted by human. Not yet reviewed.
      accepted:
        description: Reviewed and confirmed as a distinct, well-defined concept.
      deprecated:
        description: Superseded or found to be a duplicate. MUST have replaced_by.

  RelationshipType:
    permissible_values:
      broader:
        description: "Target is a more general concept (SKOS broader)"
      narrower:
        description: "Target is a more specific concept (SKOS narrower)"
      related:
        description: "Associative, non-hierarchical (SKOS related)"
      component_of:
        description: "This concept is a part/component of the target"
      derived_from:
        description: "This concept is computable/derivable from the target"
      contested_definition:
        description: >
          Same term, genuinely different meaning across traditions.
          Both concepts retain first-class status. The edge documents
          the dispute, not a resolution. MUST have a note.

  FormulaExactness:
    description: >
      Whether a parameterization relationship is definitional or empirical.
    permissible_values:
      exact:
        description: "Algebraic identity, holds by definition"
      approximate:
        description: "Empirical regression or simplifying assumption"
      conditional:
        description: >
          Exact under stated conditions, approximate otherwise.
          MUST have conditions field populated.

  UnitConversionType:
    permissible_values:
      multiplicative:
        description: "target = source * multiplier"
      affine:
        description: "target = source * multiplier + offset"


classes:

  LogicalId:
    description: >
      Human-facing namespaced handle for a first-class object.
      Serialized as namespace:value.
    attributes:
      namespace:
        range: string
        required: true
      value:
        range: string
        required: true

  Concept:
    description: >
      A true-named quantity, phenomenon, or structural category.
      One YAML file per concept. Filename matches canonical_name.
      Concepts have an artifact_id, one or more logical_ids, and a
      version_id; raw local IDs are not storage identity.
    tree_root: true
    attributes:

      artifact_id:
        description: >
          Durable opaque storage identity for this concept.
          Format: ps:concept:<opaque-token>.
        range: string
        required: true

      logical_ids:
        description: >
          Human-facing namespaced handles for this concept.
          Old source-local IDs survive only here, never as the storage key.
          The first entry is the primary display handle.
        range: LogicalId
        multivalued: true
        inlined_as_list: true
        required: true

      version_id:
        description: >
          Immutable content-derived version identifier for this serialized
          concept state. Format: sha256:<64 hex chars>.
        range: string
        required: true

      canonical_name:
        description: >
          The preferred human-readable name. Lowercase, underscored.
          Filename MUST match this.
        range: string
        required: true

      status:
        range: ConceptStatus
        required: true

      definition:
        description: >
          One to three sentences. What IS this thing, precisely enough
          to distinguish it from near-neighbors.
        range: string
        required: true

      definition_source:
        description: Paper directory name where the definition is drawn from.
        range: string

      domain:
        description: >
          Short domain tag for conceptual grouping and logical-id minting.
        range: string

      created_date:
        description: ISO 8601 date when the concept was first added.
        range: date

      last_modified:
        description: ISO 8601 date of last substantive edit.
        range: date

      replaced_by:
        description: >
          Artifact ID of the successor. REQUIRED when status=deprecated.
        range: string

      aliases:
        description: "All known names for this concept across the literature"
        range: Alias
        multivalued: true
        inlined_as_list: true

      form:
        description: >
          Reference to a form definition in forms/. The concept's
          dimensional type signature.
        range: string
        required: true

      form_parameters:
        description: >
          Overrides for form-level parameters (e.g. dB reference,
          compound construction).
        range: FormParameters
        inlined: true

      range:
        description: >
          Valid value range [min, max]. Moved from the old QuantityKind.
        range: float
        multivalued: true

      relationships:
        description: "Typed edges to other concepts"
        range: ConceptRelationship
        multivalued: true
        inlined_as_list: true

      parameterization_relationships:
        description: >
          Algebraic/functional relationships to other parameterizations
          of the same phenomenon.
        range: ParameterizationRelationship
        multivalued: true
        inlined_as_list: true

      notes:
        description: Free-text notes.
        range: string


  Alias:
    description: A name used for this concept in a specific paper or tradition.
    attributes:
      name:
        range: string
        required: true
      source:
        range: string
        required: true
      note:
        range: string


  FormParameters:
    description: >
      Per-concept overrides for form-level parameters. Used when a form
      defines parameterized slots (e.g. dB reference for level forms,
      construction formula for dimensionless compounds, category values).
    attributes:
      reference:
        description: >
          For level-form concepts, the reference quantity for the dB scale.
        range: string
      construction:
        description: >
          For dimensionless_compound concepts, the formula that constructs
          the compound quantity.
        range: string
      values:
        description: >
          For category-form concepts, the valid value set. CEL expressions
          comparing this concept against a string not in this set trigger
          warnings (if extensible) or errors (if not extensible).
        range: string
        multivalued: true
      extensible:
        description: >
          For category-form concepts, whether unrecognized values are
          warnings (true) or errors (false). Defaults to true.
        range: boolean
      note:
        description: Free-text note about the form parameterization.
        range: string


  UnitConversion:
    description: Conversion from an alternative unit to the concept's primary unit.
    attributes:
      unit:
        range: string
        required: true
      type:
        range: UnitConversionType
        required: true
      multiplier:
        range: float
        required: true
      offset:
        range: float


  ConceptRelationship:
    description: A typed, sourced edge to another concept.
    attributes:
      type:
        range: RelationshipType
        required: true
      target:
        description: "Artifact ID of the related concept"
        range: string
        required: true
      source:
        range: string
      note:
        range: string
      conditions:
        description: CEL expressions defining when this relationship holds.
        range: string
        multivalued: true


  ParameterizationRelationship:
    description: >
      An algebraic or functional relationship between different
      parameterizations of the same underlying phenomenon.
    attributes:
      formula:
        range: string
        required: true
      sympy:
        range: string
      inputs:
        description: Artifact IDs of all quantities appearing in the formula.
        range: string
        multivalued: true
        required: true
      exactness:
        range: FormulaExactness
        required: true
      conditions:
        range: string
        multivalued: true
      source:
        range: string
        required: true
      bidirectional:
        range: boolean
        required: true
      fit_statistics:
        range: string
      note:
        range: string
