id: https://propstore.local/schema/claim
name: claim
title: Propositional Knowledge Store — Claim Schema
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  propstore: https://propstore.local/schema/

imports:
  - linkml:types

default_range: string


enums:

  ClaimType:
    description: >
      The type of propositional claim extracted from a paper.
    permissible_values:
      parameter:
        description: "A numeric value binding for a concept under stated conditions."
      equation:
        description: "An explicit mathematical relationship with variable bindings."
      observation:
        description: "A qualitative claim that resists parameterization."
      model:
        description: "A parameterized equation system (multi-equation framework)."
      measurement:
        description: "A perceptual or behavioral measurement (JND, threshold, rating) about a concept."
      algorithm:
        description: "A procedural computation (Python function body) that transforms inputs to outputs."
      mechanism:
        description: "A causal or architectural argument — how or why something works, design rationale."
      comparison:
        description: "A contrastive claim positioning this work against prior approaches."
      limitation:
        description: "An acknowledged scope boundary, failure mode, or unsolved problem."

  StanceType:
    description: >
      The type of epistemic relation between two claims.
      Active voice: the claim holding this stance performs the action on the target.
      Attack: rebuts (conclusion), undercuts (inference), undermines (premise).
      Support: supports (evidence), explains (mechanism).
      Preference: supersedes (replaces).
    permissible_values:
      rebuts:
        description: "This claim attacks the target's conclusion (rebutting defeater)."
      undercuts:
        description: "This claim attacks the target's inference step (undercutting defeater)."
      undermines:
        description: "This claim attacks the target's premise or evidence."
      supports:
        description: "This claim provides supporting evidence for the target."
      explains:
        description: "This claim provides a mechanistic or causal explanation for the target."
      supersedes:
        description: "This claim replaces the target (newer methodology, corrected data)."
      none:
        description: "No meaningful epistemic relationship (logged for analysis, not used in resolution)."

  ResolutionMethod:
    description: >
      How a stance classification was produced.
    permissible_values:
      nli_first_pass:
        description: "Standard NLI classification of top-K similar claims."
      nli_second_pass:
        description: "Re-classification of high-similarity none verdicts with enriched prompt."
      human:
        description: "Human-assigned stance."
      extraction:
        description: "Stance asserted during claim extraction from paper text."

  MeasureType:
    description: >
      The type of perceptual or behavioral measurement.
      These are documented examples; validators accept any string.
    permissible_values:
      jnd_absolute:
        description: "Absolute just-noticeable difference."
      jnd_relative:
        description: "Relative just-noticeable difference (Weber fraction)."
      discrimination_threshold:
        description: "Discrimination threshold between stimuli."
      preference_rating:
        description: "Preference rating on a scale."
      detection_threshold:
        description: "Detection threshold for a stimulus."
      correlation:
        description: "Correlation coefficient between variables."
      effect_size:
        description: "Standardized effect size measure."

  UncertaintyType:
    description: >
      The type of uncertainty measure associated with a parameter claim.
    permissible_values:
      sd:
        description: "Standard deviation."
      se:
        description: "Standard error."
      ci95:
        description: "95% confidence interval half-width."
      range:
        description: "Observed range (min-max distance)."


classes:

  ClaimFile:
    description: >
      Top-level container for claims extracted from a single paper.
      One YAML file per paper at claims/<paper_dir_name>.yaml.
    tree_root: true
    attributes:

      source:
        description: "Extraction provenance for this claim file."
        range: ClaimSource
        inlined: true
        required: true

      claims:
        description: "List of propositional claims extracted from the paper."
        range: Claim
        multivalued: true
        inlined_as_list: true
        required: true


  ClaimSource:
    description: >
      Metadata about how claims were extracted from the source paper.
    attributes:
      paper:
        description: "Paper directory name (e.g., Gobl_1988)."
        range: string
        required: true
      extraction_model:
        description: "LLM model used for extraction (e.g., claude-opus-4-20250514)."
        range: string
      extraction_date:
        description: "ISO 8601 date when extraction was performed."
        range: date
      extraction_prompt_hash:
        description: "Hash of the extraction prompt for reproducibility."
        range: string


  Claim:
    description: >
      A single propositional claim extracted from a paper. All claims
      have an id, type, provenance, and optional conditions and stances.
      Type-specific fields (concept/value/unit for parameter, expression/sympy
      for equation, etc.) are all present on this class; the validator
      enforces which are required per claim type.
    attributes:

      id:
        description: >
          Stable identifier. Format: [source:]claim + sequential integer.
          Paper-local files use bare IDs (claim1, claim42).
          After import, IDs are prefixed with the knowledge source
          (e.g., Dung_1995_AcceptabilityArguments:claim1).
        range: string
        required: true

      type:
        description: "The claim type: parameter, equation, observation, or model."
        range: ClaimType
        required: true

      conditions:
        description: >
          CEL expressions defining when this claim holds.
          Each string is a CEL expression (e.g., "context == 'vowels'").
          The conflict detector compares sorted CEL expression lists.
        range: string
        multivalued: true

      provenance:
        description: "Where in the paper this claim was found."
        range: Provenance
        inlined: true
        required: true

      stances:
        description: >
          Epistemic relations to other claims. Populated during
          reconciliation, not during initial extraction.
        range: Stance
        multivalued: true
        inlined_as_list: true

      notes:
        description: "Free-text methodological context, experimental conditions, or caveats."
        range: string

      # --- parameter fields ---

      concept:
        description: >
          Concept ID this parameter claim binds to (e.g., concept12).
          Required for parameter claims.
        range: string

      value:
        description: >
          Numeric point value. Optional if lower_bound/upper_bound provided.
          At least one of value or lower_bound+upper_bound must be present
          for parameter claims.
        range: float

      lower_bound:
        description: >
          Lower bound of a range estimate. Must appear together with upper_bound.
        range: float

      upper_bound:
        description: >
          Upper bound of a range estimate. Must appear together with lower_bound.
        range: float

      uncertainty:
        description: >
          Uncertainty measure (e.g., standard deviation). Must appear together
          with uncertainty_type.
        range: float

      uncertainty_type:
        description: >
          Type of uncertainty measure. Must appear together with uncertainty.
        range: UncertaintyType

      sample_size:
        description: >
          Number of observations the parameter estimate is based on.
        range: integer

      unit:
        description: >
          Unit of measurement. Should match the concept's primary unit
          or a declared alternative. Required for parameter claims.
        range: string

      # --- measurement fields ---

      target_concept:
        description: >
          Concept ID this measurement is about (e.g., concept2).
          Required for measurement claims.
        range: string

      measure:
        description: >
          Type of measurement (e.g., jnd_absolute, preference_rating).
          Required for measurement claims. Any string accepted.
        range: string

      listener_population:
        description: >
          Description of the listener population tested
          (e.g., native_english, hearing_impaired).
          Optional for measurement claims.
        range: string

      methodology:
        description: >
          Description of the experimental methodology used.
          Optional for measurement claims.
        range: string

      # --- equation fields ---

      expression:
        description: >
          Human-readable equation string.
          Required for equation claims.
        range: string

      sympy:
        description: >
          SymPy-parseable equation string.
          Required for equation claims.
        range: string

      variables:
        description: >
          Variable bindings mapping symbols to concept IDs.
          Required for equation claims.
        range: VariableBinding
        multivalued: true
        inlined_as_list: true

      fit:
        description: "Fit statistics for equation claims."
        range: FitStatistics
        inlined: true

      # --- observation fields ---

      statement:
        description: >
          Prose description of the observation.
          Required for observation claims.
        range: string

      concepts:
        description: >
          List of concept IDs relevant to this observation.
          Required for observation claims.
        range: string
        multivalued: true

      # --- model fields ---

      name:
        description: >
          Name of the model (e.g., "Exponential transition model (Model IVb)").
          Required for model claims.
        range: string

      equations:
        description: >
          List of equation strings that make up this model.
          Required for model claims.
        range: string
        multivalued: true

      parameters:
        description: >
          Parameter bindings for this model, mapping names to concept IDs.
          Required for model claims.
        range: ParameterBinding
        multivalued: true
        inlined_as_list: true

      # --- algorithm fields ---

      body:
        description: >
          Python function body for algorithm claims.
        range: string

      stage:
        description: >
          Processing stage this algorithm belongs to
          (e.g., 'excitation', 'filtering', 'radiation').
        range: string


  Provenance:
    description: >
      Where in the source paper a claim was found.
      Paper and page are required; other fields are optional.
    attributes:
      paper:
        description: "Paper directory name."
        range: string
        required: true
      page:
        description: "Page number in the paper."
        range: integer
        required: true
      table:
        description: "Table identifier (e.g., 'III', 'Table 2')."
        range: string
      figure:
        description: "Figure identifier (e.g., 'Fig. 6')."
        range: string
      section:
        description: "Section name or number."
        range: string
      quote_fragment:
        description: "Brief quote from the paper supporting this claim."
        range: string


  Stance:
    description: >
      An epistemic relation between two claims. Active voice: the claim
      holding this stance performs the action on the target.
      Attack types: rebuts (conclusion), undercuts (inference), undermines (premise).
      Support types: supports (evidence), explains (mechanism).
      Preference: supersedes (replaces).
    attributes:
      type:
        description: "The stance relation type."
        range: StanceType
        required: true
      target:
        description: "Claim ID of the related claim."
        range: string
        required: true
      strength:
        description: "Qualitative strength (e.g., strong, moderate, weak)."
        range: string
      conditions_differ:
        description: "Note about how conditions differ between claims."
        range: string
      note:
        description: "Free-text note about this stance relation."
        range: string
      resolution:
        description: "Provenance for how this stance was classified. Optional."
        range: Resolution
        inlined: true


  Resolution:
    description: >
      Provenance metadata for how a stance was classified. Optional on Stance.
    attributes:
      method:
        description: "How this stance was classified."
        range: ResolutionMethod
        required: true
      model:
        description: "LLM model used for classification (litellm model string)."
        range: string
      embedding_model:
        description: "Embedding model used to find candidates."
        range: string
      embedding_distance:
        description: "Cosine distance between source and target claim embeddings."
        range: float
      pass_number:
        description: "Which NLI pass found this relationship (1 or 2)."
        range: integer
      confidence:
        description: "Classification confidence 0.0-1.0, derived from pass and strength."
        range: float


  VariableBinding:
    description: >
      Maps a symbol in an equation to a concept in the registry.
    attributes:
      symbol:
        description: "The variable symbol as it appears in the equation."
        range: string
        required: true
      concept:
        description: "Concept ID the symbol refers to."
        range: string
        required: true
      role:
        description: "Role of this variable (e.g., dependent, independent)."
        range: string


  FitStatistics:
    description: >
      Statistical fit measures for an empirical equation.
    attributes:
      r:
        description: "Correlation coefficient."
        range: float
      r_sd:
        description: "Standard deviation of correlation coefficient."
        range: float
      slope:
        description: "Regression slope."
        range: float
      slope_sd:
        description: "Standard deviation of slope."
        range: float


  ParameterBinding:
    description: >
      Maps a parameter name in a model to a concept in the registry.
    attributes:
      name:
        description: "Parameter name as it appears in the model equations."
        range: string
        required: true
      concept:
        description: "Concept ID this parameter refers to."
        range: string
        required: true
      note:
        description: "Description of what this parameter represents."
        range: string
